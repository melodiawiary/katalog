<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonia Forest | Pracownia Autorska</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #1D2B36; 
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Comfortaa', cursive;
            color: var(--dark-blue);
            background-color: var(--white);
            scroll-behavior: smooth;
        }

        .hero {
            position: relative;
            height: 80vh; 
            width: 100%;
            overflow: hidden;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* KLUCZ: Film przyklejony do góry, boki chowają się naturalnie */
        #player {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 177.78vh; /* Proporcja 16:9 względem wysokości sekcji */
            height: 100%;
            min-width: 100vw;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                rgba(255, 255, 255, 0) 70%, 
                rgba(255, 255, 255, 1) 100%);
            z-index: 1;
        }

        #mute-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--dark-blue);
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Comfortaa', cursive;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-top: 15vh;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        @media (max-width: 850px) {
            .hero { height: 70vh; }
            #player { width: 150vh; } /* Mniejszy offset boków na mobile dla okna ~1:1 */
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="video-background">
            <div id="player"></div>
        </div>
        <div class="video-overlay"></div>
        
        <button id="mute-btn">
            <span id="mute-icon">🔈</span> <span id="mute-text">Włącz dźwięk</span>
        </button>

        <div class="hero-content">
            <h1>Zatrzymaj się i odnajdź spokój</h1>
        </div>
    </section>

    <div class="main-container">
        <p><strong>Harmonia Forest</strong> to ogólnopolska pracownia autorska...</p>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth <= 850;
            var currentVideoId = isMobile ? 'fYAvT76Nsco' : 'a6b-OhYAXQs';

            player = new YT.Player('player', {
                videoId: currentVideoId,
                playerVars: {
                    'autoplay': 1,
                    'mute': 1,
                    'controls': 0,
                    'loop': 1,
                    'playlist': currentVideoId,
                    'showinfo': 0,
                    'modestbranding': 1,
                    'rel': 0
                },
                events: { 'onReady': function(e) { e.target.playVideo(); } }
            });
        }

        document.getElementById('mute-btn').addEventListener('click', function() {
            if (player.isMuted()) {
                player.unMute();
                document.getElementById('mute-text').innerText = "Wycisz";
            } else {
                player.mute();
                document.getElementById('mute-text').innerText = "Włącz dźwięk";
            }
        });
    </script>
</body>
</html>
