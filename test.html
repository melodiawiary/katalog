<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v62 Auto-Top</title>
    <style>
        :root { 
            --active-orange: #fbda80;
            --bg: #f4f9f8; --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; --deep-brown: #3b2a00; --sidebar-width: 220px;
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; --f-card-title: 14px; --f-list-title: 1em; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; --f-card-title: 20px; --f-list-title: 1.4em; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width);
            background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02); }
        .sidebar-top { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 15px; }
        .section-label { font-size: 16px; font-weight: 900; color: var(--deep-brown); text-transform: uppercase; margin: 15px 0 0 0; display: block; border-bottom: 3px solid var(--active-orange); padding-bottom: 5px; text-align: center; }
        
        .nav-btn, .size-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 800; text-align: left; text-transform: uppercase; font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); display: flex; align-items: center; gap: 8px; transition: transform 0.2s; box-sizing: border-box; }
        .nav-btn:hover { background: var(--active-orange); transform: scale(1.02); }
        .nav-btn.active, .size-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown) !important; }
            
        .nav-btn.fav-btn { background: #fff1f1; border-color: #ffb3b3; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; min-height: 60px; }

        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; width: calc(100% - var(--sidebar-width)); }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); width: 100%; box-sizing: border-box; }
        
        .top-padding { display: flex; width: 100%; box-sizing: border-box; gap: 0; padding: 0; }
        .header-left { width: 50%; padding: 20px 25px 15px 25px; box-sizing: border-box; }
        .header-right { width: 50%; background: var(--bg); border-left: 2px solid var(--active-orange); box-sizing: border-box; padding: 20px 25px 15px 25px; display: flex; flex-direction: column; min-height: 250px; }
        
        .top-header-title { font-weight: 900; text-transform: uppercase; font-size: 1.1em; text-align: center; margin-bottom: 10px; color: var(--deep-brown); line-height: 1.2; background: #ffcccc; border: 2px solid var(--deep-brown); padding: 8px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .top-mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .top-btn-more { width: 100%; padding: 8px; background: var(--active-orange); border: 2px solid var(--deep-brown); border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; display: flex; align-items: center; justify-content: center; text-align: center; }

        .search-box { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: bold; text-align: center; background: var(--card-bg); box-sizing: border-box; }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .ctrl-btn { flex: 1; padding: 12px 4px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 800; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: var(--f-ctrl); }
        .ctrl-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown); }

        #main-display { padding: 0 0 400px 0; min-height: 100vh; width: 100%; }
        .display-padding { padding: 0 25px; width: 100%; box-sizing: border-box; }
        .view-title-header { background: var(--soft-cyan); color: var(--deep-brown); padding: 15px 25px; font-weight: 900; text-transform: uppercase; font-size: 1.5em; border-bottom: 5px solid var(--active-orange); border-top: 2px solid var(--active-orange); }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08); padding: 12px; border-radius: 15px; text-align: center; position: relative; transition: 0.3s; cursor: pointer; }
        .card:hover { border: 2px solid var(--deep-brown); background: var(--soft-cyan); transform: translateY(-5px); }
        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; margin-bottom: 10px; position: relative; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: var(--active-orange); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; color: var(--deep-brown); font-weight: 900; text-transform: uppercase; border: 2px solid var(--deep-brown); border-radius: 10px; box-sizing: border-box; }
        .card:hover .play-overlay { opacity: 1; }
        .btn-fav-toggle { margin-top: 10px; padding: 10px; border-radius: 10px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 900; font-size: 12px; text-transform: uppercase; cursor: pointer; width: 100%; }
        .btn-fav-toggle.is-active { background: var(--active-orange); border-width: 2.5px; }
    </style>
</head>
<body class="standard">
<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/120?text=LOGO'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            <span>❤️ MOJE ULUBIONE</span>
            <span id="count" style="font-weight:900;">0 UTWORÓW</span>
        </button>
        <div style="margin-top:10px; padding:5px; border: 1px solid var(--deep-brown); border-radius:10px;">
            <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
            <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
        </div>
        <span class="section-label">KATEGORIE</span>
    </div>
    <div class="sidebar-scroll"><div id="cat-list"></div></div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-padding">
            <div class="header-left">
                <input type="text" id="search" class="search-box" placeholder="SZUKAJ PIEŚNI..." onkeyup="doSearch()">
                <div class="btn-group">
                    <button class="ctrl-btn" id="s-new" onclick="setSort('newest')">Najnowsze</button>
                    <button class="ctrl-btn" id="s-az" onclick="setSort('az')">A-Z</button>
                </div>
            </div>
            <div class="header-right" id="top-panel">
                <div class="top-header-title">ŁADOWANIE PANELU TOP...</div>
            </div>
        </div>
    </div>
    <div id="main-display"></div>
</div>

<script>
    // TWOJE LINKI
    const CSV_MAIN = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    const CSV_TOP_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQeNOmR7SJ-G5j8DMMXjR1KE4h5w1UiNY5nHhV1mvGNJ63I_-3SQPDMNxNFpakUL4VLFacWFUOmycPB/pub?output=csv';
    
    const STORAGE_KEY = 'melodia_wiary_perm';
    let songs = [], top50 = [], cart = [], currentView = 'all', query = "", sortType = 'newest', activeTopName = "";

    function openYT(id) { window.open(`https://www.youtube.com/watch?v=${id}`, '_blank', 'width=800,height=600'); }

    function parseCSVLine(text) {
        const result = []; let cur = '', inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim()); return result;
    }

    async function init() {
        let saved = localStorage.getItem(STORAGE_KEY);
        if(saved) cart = JSON.parse(saved);

        try {
            // 1. Pobierz Katalog Główny i Arkusz Sterujący TOP_LISTA
            const [rMain, rList] = await Promise.all([
                fetch(CSV_MAIN + '&cb=' + Date.now()),
                fetch(CSV_TOP_BASE + '&sheet=TOP_LISTA&cb=' + Date.now())
            ]);
            
            const tMain = await rMain.text();
            const tList = await rList.text();

            // 2. Parsuj Katalog
            const rowsM = tMain.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            let catsSet = new Set();
            songs = rowsM.map((line, index) => {
                const cols = parseCSVLine(line);
                let cats = (cols[1] || "Inne").split(',').map(c => c.trim()).filter(c => c.length > 2);
                cats.forEach(c => catsSet.add(c));
                return { tytul: cols[0], kategorie: cats, yt: (cols[2] || "").trim(), originalIndex: index };
            });

            // 3. Znajdź aktywny TOP z TOP_LISTA
            const listRows = tList.split(/\r?\n/).filter(x => x.trim() !== "");
            activeTopName = listRows[listRows.length - 1].trim(); 

            if (activeTopName) {
                // 4. Pobierz dane z konkretnej zakładki (np. TOP_01)
                const rTop = await fetch(CSV_TOP_BASE + '&sheet=' + activeTopName + '&cb=' + Date.now());
                const tTop = await rTop.text();
                const rowsT = tTop.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
                top50 = rowsT.map((line, index) => {
                    const cols = parseCSVLine(line);
                    return { tytul: cols[0], yt: (cols[1] || "").trim(), originalIndex: index };
                });
            }

            // Kategorie
            const catBox = document.getElementById('cat-list');
            catBox.innerHTML = '<button class="nav-btn" onclick="setView(\'all\')">WSZYSTKIE PIEŚNI</button>';
            Array.from(catsSet).sort().forEach(c => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = c;
                b.onclick = () => setView(c); catBox.appendChild(b);
            });

            render();
        } catch(e) { 
            console.error(e); 
            document.getElementById('top-panel').innerHTML = "Błąd ładowania danych TOP.";
        }
    }

    function renderTopPanel() {
        const panel = document.getElementById('top-panel');
        if (!top50.length) return;
        
        const top3 = top50.slice(0, 3);
        let html = `<div class="top-header-title">AKTUALNE: ${activeTopName}</div>`;
        html += `<div style="display: flex; gap: 10px; align-items: stretch;">`;
        html += `<div class="top-mini-grid" style="flex: 2;">`;
        top3.forEach(s => {
            const isFav = cart.some(x => x.tytul === s.tytul);
            html += `
                <div class="card" onclick="openYT('${s.yt}')" style="padding: 6px;">
                    <div class="thumb-container" style="margin-bottom: 5px;">
                        <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                        <div class="play-overlay">GRAJ</div>
                    </div>
                    <div class="card-title" style="font-size: 9px; height: 2.4em; overflow: hidden;">${s.tytul}</div>
                </div>`;
        });
        html += `</div>`;
        html += `<button class="top-btn-more" style="flex: 1;" onclick="setView('top50')">ZOBACZ<br>CAŁE ${activeTopName}</button></div>`;
        panel.innerHTML = html;
    }

    function render() {
        const out = document.getElementById('main-display');
        out.innerHTML = '';
        document.getElementById('count').innerText = cart.length + " UTWORÓW";
        renderTopPanel();

        let list = (currentView === 'cart') ? [...cart] : (currentView === 'top50' ? [...top50] : (currentView === 'all' ? [...songs] : songs.filter(s => s.kategorie.includes(currentView))));
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));
        
        if(sortType === 'az') list.sort((a,b) => a.tytul.localeCompare(b.tytul, 'pl'));
        else list.sort((a,b) => b.originalIndex - a.originalIndex);

        const h = document.createElement('div'); h.className = 'view-title-header';
        h.innerText = currentView === 'all' ? 'WSZYSTKIE' : (currentView === 'cart' ? 'ULUBIONE' : (currentView === 'top50' ? activeTopName : currentView));
        out.appendChild(h);

        const grid = document.createElement('div'); grid.className = 'display-padding items-grid';
        list.forEach(s => {
            const isFav = cart.some(x => x.tytul === s.tytul);
            const item = document.createElement('div'); item.className = 'card';
            item.onclick = () => openYT(s.yt);
            item.innerHTML = `
                <div class="thumb-container">
                    <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                    <div class="play-overlay">ODTWÓRZ 🎶</div>
                </div>
                <div class="card-title">${s.tytul}</div>
                <button class="btn-fav-toggle ${isFav ? 'is-active' : ''}" onclick="event.stopPropagation(); toggleFav('${s.tytul.replace(/'/g, "\\'")}')">
                    ${isFav ? '❌ USUŃ' : '➕ DODAJ'}
                </button>`;
            grid.appendChild(item);
        });
        out.appendChild(grid);
    }

    function toggleFav(t) {
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else { const s = [...songs, ...top50].find(x => x.tytul === t); if(s) cart.push(s); }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cart)); render();
    }

    function setView(v) { currentView = v; render(); window.scrollTo(0,0); }
    function setSort(s) { sortType = s; render(); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    function updateSize(s) { document.body.className = s; }
    init();
</script>
</body>
</html>
