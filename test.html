<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v63</title>
    <style>
        :root { 
            --active-orange: #fbda80;
            --bg: #f4f9f8; --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; --deep-brown: #3b2a00; --sidebar-width: 220px;
            --fav-red: #e63946; 
        }
        
        body.standard { 
            --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; 
            --f-card-title: 14px; --f-list-title: 1em;
        }
        body.senior { 
            --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; 
            --f-card-title: 20px; --f-list-title: 1.4em;
        }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.02); }
        .sidebar-top { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 15px; }
        
        .section-label { font-size: 16px; font-weight: 900; color: var(--deep-brown); text-transform: uppercase; margin: 15px 0 0 0; display: block; border-bottom: 3px solid var(--active-orange); padding-bottom: 5px; text-align: center; }
        
        .nav-btn, .size-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 800; text-align: left; text-transform: uppercase; font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); display: flex; align-items: center; gap: 8px; transition: 0.2s; box-sizing: border-box; }
        .nav-btn:hover, .size-btn:hover { background: var(--active-orange); transform: scale(1.02); }
        .nav-btn.active, .size-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown) !important; }
            
        .nav-btn.fav-btn { background: #fff1f1; border-color: var(--fav-red); color: var(--fav-red); flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; min-height: 60px; }

        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; width: calc(100% - var(--sidebar-width)); }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); width: 100%; box-sizing: border-box; }
        .top-padding { display: flex; width: 100%; gap: 0; padding: 0; }
        
        .header-left { width: 50%; padding: 20px 25px 15px 25px; box-sizing: border-box; }
        .header-right { width: 50%; border-left: 2px solid var(--active-orange); padding: 20px 25px 15px 25px; display: flex; flex-direction: column; background: var(--bg); box-sizing: border-box; }
        
        /* PANEL TOP */
        .top-header-title { font-weight: 900; text-transform: uppercase; font-size: 1.1em; text-align: center; margin-bottom: 10px; color: var(--deep-brown); padding: 8px; border: 2px solid var(--deep-brown); border-radius: 8px; background: #ffcccc; width: 100%; box-sizing: border-box; }
        .top-mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .top-list-text { margin-top: 10px; padding: 5px; font-weight: 800; font-size: var(--f-card-title); line-height: 1.3; text-transform: uppercase; }
        .top-btn-more { margin-top: 10px; width: 100%; padding: 12px; background: var(--fav-red); color: white; border: 2px solid var(--deep-brown); border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px; transition: 0.2s; }

        /* GRID & CARDS */
        #main-display { padding: 0 0 400px 0; min-height: 100vh; width: 100%; }
        .display-padding { padding: 0 25px; width: 100%; box-sizing: border-box; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08); padding: 12px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .card:hover { border: 2px solid var(--deep-brown); background: var(--soft-cyan); transform: translateY(-5px); }
        
        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; margin-bottom: 10px; position: relative; border: 1px solid rgba(0,0,0,0.1); }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .card-title { font-weight: 900; font-size: var(--f-card-title); text-transform: uppercase; padding: 5px; line-height: 1.2; flex-grow: 1; }

        .play-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: var(--active-orange); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; color: var(--deep-brown); font-weight: 900; text-align: center; padding: 10px; font-size: 0.9em; text-transform: uppercase; border: 2px solid var(--deep-brown); border-radius: 10px; box-sizing: border-box; }
        .card:hover .play-overlay { opacity: 1; }

        .btn-fav-toggle { margin-top: 10px; padding: 10px; border-radius: 10px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 900; font-size: 12px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-fav-toggle:hover { background: var(--active-orange); }
        .btn-fav-toggle.is-active { background: var(--active-orange); border-width: 2.5px; }

        .search-box { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: bold; text-align: center; background: var(--card-bg); box-sizing: border-box; }
        .ctrl-btn { flex: 1; padding: 12px 4px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); font-weight: 800; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: var(--f-ctrl); transition: 0.2s; }
        .ctrl-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown); }
        
        .view-title-header { background: var(--soft-cyan); color: var(--deep-brown); padding: 15px 25px; font-weight: 900; text-transform: uppercase; font-size: 1.5em; border-bottom: 5px solid var(--active-orange); border-top: 2px solid var(--active-orange); }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/120?text=LOGO'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            <span class="fav-label">❤️ MOJE ULUBIONE</span>
            <span id="count" style="font-weight:900;">0 UTWORÓW</span>
        </button>
        <div style="margin-top:10px; padding:5px; border: 1px solid var(--deep-brown); border-radius:10px;">
            <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
            <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
        </div>
        <span class="section-label">KATEGORIE</span>
    </div>
    <div class="sidebar-scroll"><div id="cat-list"></div></div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-padding">
            <div class="header-left">
                <input type="text" id="search" class="search-box" placeholder="SZUKAJ PIEŚNI..." onkeyup="doSearch()">
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button class="ctrl-btn" onclick="setSort('newest')">Sortuj od najnowszych</button>
                    <button class="ctrl-btn" onclick="setSort('az')">Sortuj od A do Z</button>
                </div>
            </div>
            <div class="header-right" id="top-panel">
                </div>
        </div>
    </div>
    <div id="main-display"></div>
</div>

<script>
    // Linki do arkuszy
    const CSV_KATALOG = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    const CSV_TOP_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQeNOmR7SJ-G5j8DMMXjR1KE4h5w1UiNY5nHhV1mvGNJ63I_-3SQPDMNxNFpakUL4VLFacWFUOmycPB/pub?output=csv';

    let songs = [], topSongs = [], cart = [], currentView = 'all', query = "", sortType = 'newest';
    const STORAGE_KEY = 'melodia_wiary_permanent_storage';

    function openYT(id) {
        const width = 800; const height = 600;
        const left = (window.screen.width / 2) - (width / 2);
        const top = (window.screen.height / 2) - (height / 2);
        window.open(`https://www.youtube.com/watch?v=${id}`, 'YouTubePlayer', `width=${width},height=${height},top=${top},left=${left},resizable=yes,scrollbars=yes`);
    }

    async function init() {
        let saved = localStorage.getItem(STORAGE_KEY);
        if(saved) cart = JSON.parse(saved);
        updateSize(localStorage.getItem('mv_font_permanent') || 'standard');

        try {
            // 1. Pobierz katalog główny
            const r1 = await fetch(CSV_KATALOG + '&cb=' + Date.now());
            const t1 = await r1.text();
            const rows1 = t1.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            songs = rows1.map((line, index) => {
                const cols = parseCSVLine(line);
                return { tytul: cols[0], yt: cols[2], originalIndex: index };
            });

            // 2. Pobierz ustawienia TOP (którą zakładkę ładować)
            const rSet = await fetch(CSV_TOP_BASE + '&sheet=USTAWIENIA&cb=' + Date.now());
            const tSet = await rSet.text();
            const currentSheetName = tSet.split(/\r?\n/)[0].trim() || "TOP_01";

            // 3. Pobierz konkretną listę TOP
            const rTop = await fetch(CSV_TOP_BASE + '&sheet=' + currentSheetName + '&cb=' + Date.now());
            const tTop = await rTop.text();
            const rowsTop = tTop.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            topSongs = rowsTop.map(line => {
                const cols = parseCSVLine(line);
                return { tytul: cols[0], yt: cols[1] };
            });

            render();
        } catch(e) { console.error("Błąd bazy danych:", e); }
    }

    function parseCSVLine(text) {
        const result = [];
        let cur = '', inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim()); return result;
    }

    function renderTopPanel() {
        const panel = document.getElementById('top-panel');
        if (!topSongs.length) return;

        let html = `<div class="top-header-title">TOP TYGODNIA POLSKIEJ PIEŚNI RELIGIJNEJ</div>`;
        html += `<div class="top-mini-grid">`;
        
        topSongs.slice(0, 3).forEach(s => {
            const isFav = cart.some(x => x.tytul === s.tytul);
            html += `
                <div class="card" onclick="openYT('${s.yt}')" style="padding: 6px;">
                    <div class="thumb-container">
                        <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                        <div class="play-overlay">KLIKNIJ, ABY OTWORZYĆ NA YOUTUBE 🎶</div>
                    </div>
                    <div class="card-title">${s.tytul}</div>
                    <button class="btn-fav-toggle ${isFav ? 'is-active' : ''}" onclick="event.stopPropagation(); toggleFav('${s.tytul.replace(/'/g, "\\'")}')">
                        ${isFav ? '❌ USUŃ' : '➕ DODAJ'}
                    </button>
                </div>`;
        });
        html += `</div>`;

        html += `<div class="top-list-text">`;
        topSongs.slice(3, 10).forEach((s, i) => {
            html += `<div>${i + 4}. ${s.tytul}</div>`;
        });
        if (topSongs.length > 10) html += `<div>...</div>`;
        html += `</div>`;

        html += `<button class="top-btn-more" onclick="alert('Pełna lista Top 50 już wkrótce!')">KLIKNIJ I ZOBACZ CAŁE TOP 50</button>`;
        panel.innerHTML = html;
    }

    function render() {
        renderTopPanel();
        const out = document.getElementById('main-display');
        out.innerHTML = '';
        document.getElementById('count').innerText = cart.length + " UTWORÓW";

        const header = document.createElement('div');
        header.className = 'view-title-header';
        header.innerText = currentView === 'cart' ? '❤️ MOJE ULUBIONE' : 'WSZYSTKIE PIEŚNI';
        out.appendChild(header);

        const contentBox = document.createElement('div');
        contentBox.className = 'display-padding';
        const container = document.createElement('div');
        container.className = 'items-grid';

        let list = (currentView === 'cart') ? [...cart] : [...songs];
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));
        if(sortType === 'az') list.sort((a,b) => a.tytul.localeCompare(b.tytul, 'pl'));
        else list.sort((a,b) => b.originalIndex - a.originalIndex);

        list.forEach(s => {
            const isFav = cart.some(x => x.tytul === s.tytul);
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openYT(s.yt);
            card.innerHTML = `
                <div class="thumb-container">
                    <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                    <div class="play-overlay">KLIKNIJ, ABY OTWORZYĆ NA YOUTUBE 🎶</div>
                </div>
                <div class="card-title">${s.tytul}</div>
                <button class="btn-fav-toggle ${isFav ? 'is-active' : ''}" onclick="event.stopPropagation(); toggleFav('${s.tytul.replace(/'/g, "\\'")}')">
                    ${isFav ? '❌ USUŃ Z ULUBIONYCH' : '➕ DODAJ DO ULUBIONYCH'}
                </button>
            `;
            container.appendChild(card);
        });
        contentBox.appendChild(container);
        out.appendChild(contentBox);
    }

    function toggleFav(t) {
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else { 
            const s = songs.find(x => x.tytul === t) || topSongs.find(x => x.tytul === t); 
            if(s) cart.push(s); 
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
        render();
    }

    function updateSize(s) { document.body.className = s; localStorage.setItem('mv_font_permanent', s); render(); }
    function setSort(s) { sortType = s; render(); }
    function setView(v) { currentView = v; render(); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }

    init();
</script>
</body>
</html>
