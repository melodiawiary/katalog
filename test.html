<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v58 (TESTOWA)</title>
    <style>
        :root { 
            --active-orange: #fbda80; --bg: #f4f9f8; --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; --deep-brown: #3b2a00; --sidebar-width: 220px;
        }
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; --f-card-title: 14px; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; --f-card-title: 20px; }
        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
        .sidebar-top { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 15px; }
        
        .nav-btn, .size-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 800; text-align: left; text-transform: uppercase; font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); display: flex; align-items: center; gap: 8px; box-sizing: border-box; }
        .nav-btn.active, .size-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown) !important; }
        .nav-btn.fav-btn { background: #fff1f1; border-color: #ffb3b3; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; min-height: 60px; }

        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); width: 100%; box-sizing: border-box; }
        .top-padding { padding: 20px 25px 15px 25px; }
        .search-box { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: bold; text-align: center; background: var(--card-bg); }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .ctrl-btn { flex: 1; padding: 12px 4px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 800; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: var(--f-ctrl); }
        .ctrl-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown); }

        .view-title-header { background: var(--soft-cyan); color: var(--deep-brown); padding: 15px 25px; font-weight: 900; text-transform: uppercase; font-size: 1.5em; border-bottom: 5px solid var(--active-orange); border-top: 2px solid var(--active-orange); }
        #main-display { padding: 0 0 400px 0; }
        
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; padding: 0 25px; }
        .card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08); padding: 12px; border-radius: 15px; text-align: center; position: relative; display: flex; flex-direction: column; cursor: pointer; }
        .card.is-fav { border: 5px solid var(--active-orange); background: #fffcf0; }
        
        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; margin-bottom: 10px; position: relative; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(251, 218, 128, 0.95); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; color: var(--deep-brown); font-weight: 900; }
        .card:hover .play-overlay { opacity: 1; }
        
        .card-title { font-weight: 900; font-size: var(--f-card-title); text-transform: uppercase; padding: 5px; flex-grow: 1; }
        .fav-status-tag { margin-top: 8px; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 900; background: #eee; border: 1px solid #ccc; }
        .is-fav .fav-status-tag { background: var(--active-orange); border-color: var(--deep-brown); }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/120?text=LOGO'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            <span>❤️ MOJE ULUBIONE</span>
            <span id="count" style="font-weight:900;">0 UTWORÓW</span>
        </button>
        <div style="margin-top:10px; padding:5px; border: 1px solid var(--deep-brown); border-radius:10px;">
            <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
            <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
        </div>
    </div>
    <div class="sidebar-scroll">
        <span style="font-weight:900; display:block; margin: 10px 0;">KATEGORIE</span>
        <button class="nav-btn" onclick="setView('all')">WSZYSTKIE PIEŚNI</button>
        <div id="cat-list"></div>
    </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-padding">
            <input type="text" id="search" class="search-box" placeholder="SZUKAJ PIEŚNI..." onkeyup="doSearch()">
            <div class="btn-group">
                <button class="ctrl-btn" onclick="setSort('newest')">Najnowsze</button>
                <button class="ctrl-btn" onclick="setSort('az')">A-Z</button>
                <button class="ctrl-btn" onclick="setMode('grid')">Kratka</button>
                <button class="ctrl-btn" onclick="setMode('list')">Lista</button>
            </div>
        </div>
    </div>
    <div id="main-display"></div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    
    // STAŁA BAZA - NIE ZMIENIAĆ
    const DB_KEY = 'MELODIA_WIARY_FINAL_DB';
    const OLD_KEYS = ['favs', 'melodia_wiary_v51_storage', 'MELODIA_WIARY_PERMANENT_DATA'];

    let songs = [], cart = [], currentView = 'all', query = "", sortType = 'newest';

    async function init() {
        // 1. ODZYSKIWANIE
        let saved = localStorage.getItem(DB_KEY);
        cart = saved ? JSON.parse(saved) : [];

        OLD_KEYS.forEach(key => {
            let old = localStorage.getItem(key);
            if (old) {
                JSON.parse(old).forEach(item => {
                    if (!cart.some(s => s.tytul === item.tytul)) cart.push(item);
                });
            }
        });
        localStorage.setItem(DB_KEY, JSON.stringify(cart));

        // 2. POBIERANIE DANYCH
        const r = await fetch(CSV + '&cb=' + Date.now());
        const text = await r.text();
        songs = parseCSV(text);
        
        renderSidebar();
        render();
    }

    function parseCSV(text) {
        return text.split('\n').slice(1).map((line, i) => {
            const c = line.split(',');
            return { tytul: c[0], kategorie: (c[1]||"").split(';'), yt: (c[2]||"").trim(), originalIndex: i };
        });
    }

    function toggleFav(t) {
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else cart.push(songs.find(s => s.tytul === t));
        localStorage.setItem(DB_KEY, JSON.stringify(cart));
        render();
    }

    function render() {
        const out = document.getElementById('main-display');
        out.innerHTML = `<div class="view-title-header">${currentView === 'cart' ? 'ULUBIONE' : 'KATALOG'}</div>`;
        document.getElementById('count').innerText = cart.length + " UTWORÓW";

        let list = (currentView === 'cart') ? cart : songs;
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));

        const grid = document.createElement('div');
        grid.className = 'items-grid';
        list.forEach(s => {
            const isFav = cart.some(x => x.tytul === s.tytul);
            const card = document.createElement('div');
            card.className = `card ${isFav ? 'is-fav' : ''}`;
            card.onclick = () => window.open(`https://www.youtube.com/watch?v=${s.yt}`);
            card.innerHTML = `
                <div class="thumb-container">
                    <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                    <div class="play-overlay">SŁUCHAJ 🎶</div>
                </div>
                <div class="card-title">${s.tytul}</div>
                <div class="fav-status-tag" onclick="event.stopPropagation(); toggleFav('${s.tytul}')">
                    ${isFav ? '⭐ W ULUBIONYCH' : '➕ DODAJ'}
                </div>`;
            grid.appendChild(card);
        });
        out.appendChild(grid);
    }

    function setView(v) { currentView = v; render(); }
    function updateSize(s) { document.body.className = s; }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    init();
</script>
</body>
</html>
