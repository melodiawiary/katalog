<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v64 STABILNA</title>
    <style>
        :root { 
            --active-orange: #fbda80;
            --bg: #f4f9f8; --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; --deep-brown: #3b2a00; --sidebar-width: 220px;
        }
        
        body.standard { 
            --f-size: 16px;
            --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; 
            --f-card-title: 14px; --f-list-title: 1em;
        }
        body.senior { 
            --f-size: 22px;
            --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; 
            --f-card-title: 20px; --f-list-title: 1.4em;
        }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.02); }
        .sidebar-top { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 15px; }
        
        .section-label { font-size: 16px; font-weight: 900; color: var(--deep-brown); text-transform: uppercase; margin: 15px 0 0 0; display: block; border-bottom: 3px solid var(--active-orange); padding-bottom: 5px; text-align: center; }
        
        .nav-btn, .size-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 800; text-align: left; text-transform: uppercase; font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); display: flex; align-items: center; gap: 8px; transition: 0.2s; box-sizing: border-box; }
        .nav-btn:hover { background: var(--active-orange); transform: scale(1.02); }
        .nav-btn.active, .size-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown) !important; transform: scale(1.02); }
            
        .nav-btn.fav-btn { background: #fff1f1; border-color: #ffb3b3; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; min-height: 60px; }

        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; width: calc(100% - var(--sidebar-width)); }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); width: 100%; box-sizing: border-box; }
        .top-padding { display: flex; width: 100%; box-sizing: border-box; gap: 0; padding: 0; }
        
        .header-left { width: 50%; padding: 20px 25px 15px 25px; box-sizing: border-box; }
        .header-right { width: 50%; background: var(--bg); border-left: 2px solid var(--active-orange); box-sizing: border-box; padding: 20px 25px 15px 25px; display: flex; flex-direction: column; }
        
        /* PANEL TOP */
        .top-header-title { font-weight: 900; text-transform: uppercase; font-size: 1.1em; text-align: center; margin-bottom: 10px; color: var(--deep-brown); background: #ffcccc; border: 2px solid var(--deep-brown); padding: 8px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .top-mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 2; }
        .top-btn-more { flex: 1; padding: 8px; background: var(--active-orange); border: 2px solid var(--deep-brown); border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; line-height: 1.2; display: flex; align-items: center; justify-content: center; text-align: center; }

        .search-box { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: bold; text-align: center; background: var(--card-bg); box-sizing: border-box; }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .ctrl-btn { flex: 1; padding: 12px 4px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 800; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: var(--f-ctrl); transition: 0.2s; }
        .ctrl-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown); }

        .alpha-shelf { border-top: 3px solid var(--active-orange); border-bottom: 3px solid var(--active-orange); background: var(--bg); padding: 10px 25px; display: none; }
        #alpha-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .alpha-btn { padding: 6px 12px; font-size: 14px; font-weight: 900; border: 1px solid var(--deep-brown); background: var(--soft-cyan); border-radius: 4px; cursor: pointer; }
        .alpha-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown); }

        .view-title-header { background: var(--soft-cyan); color: var(--deep-brown); padding: 15px 25px; font-weight: 900; text-transform: uppercase; font-size: 1.5em; border-bottom: 5px solid var(--active-orange); border-top: 2px solid var(--active-orange); }

        #main-display { padding: 0 0 400px 0; min-height: 100vh; width: 100%; }
        .display-padding { padding: 0 25px; width: 100%; box-sizing: border-box; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .list-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }

        .card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08); padding: 12px; border-radius: 15px; text-align: center; position: relative; transition: 0.3s; display: flex; flex-direction: column; cursor: pointer; }
        .card:hover { border: 2px solid var(--deep-brown); background: var(--soft-cyan); transform: translateY(-5px); }
        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; margin-bottom: 10px; position: relative; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .card-title { font-weight: 900; font-size: var(--f-card-title); text-transform: uppercase; padding: 5px; }

        .play-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: var(--active-orange); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; color: var(--deep-brown); font-weight: 900; text-align: center; padding: 10px; font-size: 0.8em; border-radius: 10px; }
        .card:hover .play-overlay { opacity: 1; }

        .btn-fav-toggle { margin-top: 10px; padding: 10px; border-radius: 10px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); font-weight: 900; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .btn-fav-toggle.is-active { background: var(--active-orange); border-width: 2.5px; }

        .list-card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08); border-radius: 10px; padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; min-height: 60px; }
        .list-card:hover { background: var(--active-orange); border: 2px solid var(--deep-brown); }
        .list-title { font-weight: 800; font-size: var(--f-list-title); text-transform: uppercase; }
        .heart-btn { font-size: 24px; cursor: pointer; border: none; background: none; z-index: 5; }
    </style>
</head>
<body class="standard">
<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/120?text=LOGO'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            <span class="fav-label">❤️ MOJE ULUBIONE</span>
            <span id="count" style="font-weight:900;">0 UTWORÓW</span>
        </button>
        <div style="margin-top:10px; padding:5px; border: 1px solid var(--deep-brown); border-radius:10px;">
            <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
            <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
        </div>
        <span class="section-label">KATEGORIE</span>
    </div>
    <div class="sidebar-scroll">
        <button class="nav-btn" id="cat-all" onclick="setView('all')">WSZYSTKIE PIEŚNI</button>
        <div id="cat-list"></div>
    </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-padding">
            <div class="header-left">
                <input type="text" id="search" class="search-box" placeholder="SZUKAJ W KATALOGU..." onkeyup="doSearch()">
                <div class="btn-group">
                    <button class="ctrl-btn" id="s-new" onclick="setSort('newest')">Nowe</button>
                    <button class="ctrl-btn" id="s-old" onclick="setSort('oldest')">Stare</button>
                    <button class="ctrl-btn" id="s-az" onclick="setSort('az')">A-Z</button>
                    <button class="ctrl-btn" id="s-za" onclick="setSort('za')">Z-A</button>
                </div>
                <div class="btn-group">
                    <button class="ctrl-btn" id="m-grid" onclick="setMode('grid')">Kafelki</button>
                    <button class="ctrl-btn" id="m-list" onclick="setMode('list')">Lista</button>
                </div>
            </div>
            <div class="header-right" id="top-panel"></div>
        </div>
        <div id="alpha-shelf" class="alpha-shelf"><div id="alpha-row"></div></div>
    </div>
    <div id="main-display"></div>
</div>

<script>
    const CSV_KATALOG = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    const CSV_TOP = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQeNOmR7SJ-G5j8DMMXjR1KE4h5w1UiNY5nHhV1mvGNJ63I_-3SQPDMNxNFpakUL4VLFacWFUOmycPB/pub?output=csv&sheet=TOP_01';
    const STORAGE_KEY = 'melodia_wiary_permanent_storage';
    
    let songs = [], topSongs = [], cart = [], currentView = 'all', displayMode = 'grid', query = "", sortType = 'newest';

    function openYT(id) { window.open(`https://www.youtube.com/watch?v=${id}`, '_blank'); }

    function parseCSVLine(text) {
        const result = []; let cur = '', inQ = false;
        for (let char of text) {
            if (char === '"') inQ = !inQ;
            else if (char === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim()); return result;
    }

    async function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved) cart = JSON.parse(saved);
        updateSize(localStorage.getItem('mv_font_permanent') || 'standard');

        // Alfabet
        const alphabet = "ABCDEFGHIJKLŁMNOPRSTUWZŻ".split("");
        alphabet.forEach(l => {
            const b = document.createElement('button'); b.className = 'alpha-btn'; b.innerText = l;
            b.onclick = () => { sortType = 'az'; render(); const t = document.getElementById("anchor-"+l); if(t) window.scrollTo({top: t.offsetTop-320, behavior:'smooth'}); };
            document.getElementById('alpha-row').appendChild(b);
        });

        try {
            const [r1, r2] = await Promise.all([
                fetch(CSV_KATALOG + '&cb=' + Date.now()),
                fetch(CSV_TOP + '&cb=' + Date.now())
            ]);
            const [t1, t2] = await Promise.all([r1.text(), r2.text()]);

            songs = t1.split(/\r?\n/).filter(x => x.trim() !== "").slice(1).map((line, index) => {
                const cols = parseCSVLine(line);
                return { tytul: cols[0], kategorie: (cols[1] || "Inne").split(',').map(c => c.trim()), yt: cols[2], originalIndex: index };
            });

            topSongs = t2.split(/\r?\n/).filter(x => x.trim() !== "").slice(1).map((line, index) => {
                const cols = parseCSVLine(line);
                return { tytul: cols[0], yt: cols[1], originalIndex: index, isTop: true };
            });

            const cats = new Set(); songs.forEach(s => s.kategorie.forEach(c => cats.add(c)));
            const catBox = document.getElementById('cat-list');
            Array.from(cats).sort().forEach(cat => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = cat;
                b.onclick = () => setView(cat); catBox.appendChild(b);
            });

            render();
        } catch(e) { console.error(e); }
    }

    function renderTopPanel() {
        const panel = document.getElementById('top-panel');
        if (!topSongs.length) return;
        const top3 = topSongs.slice(0, 3);
        
        let html = `<div class="top-header-title">TOP TYGODNIA POLSKIEJ PIEŚNI RELIGIJNEJ</div>`;
        html += `<div style="display: flex; gap: 10px; align-items: stretch;">`;
        html += `<div class="top-mini-grid">`;
        top3.forEach(s => {
            const isFav = cart.some(x => x.tytul === s.tytul);
            html += `
                <div class="card" onclick="openYT('${s.yt}')" style="padding: 6px; border-radius: 8px;">
                    <div class="thumb-container" style="margin-bottom: 5px;">
                        <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                        <div class="play-overlay">SŁUCHAJ</div>
                    </div>
                    <div class="card-title" style="font-size:10px;">${s.tytul}</div>
                    <button class="btn-fav-toggle ${isFav?'is-active':''}" onclick="event.stopPropagation(); toggleFav('${s.tytul.replace(/'/g,"\\'")}')">${isFav?'❌':'➕'}</button>
                </div>`;
        });
        html += `</div>`;
        html += `<button class="top-btn-more" onclick="setView('TOP 50')">KLIKNIJ,<br>ZOBACZ<br>CAŁE<br>TOP 50</button>`;
        html += `</div>`;
        panel.innerHTML = html;
    }

    function render() {
        const out = document.getElementById('main-display');
        out.innerHTML = '';
        document.getElementById('count').innerText = cart.length + " UTWORÓW";
        renderTopPanel();

        let list = [];
        if(currentView === 'cart') list = [...cart];
        else if(currentView === 'TOP 50') list = [...topSongs];
        else if(currentView === 'all') list = [...songs];
        else list = songs.filter(s => s.kategorie.includes(currentView));

        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));
        if(sortType === 'newest') list.sort((a,b) => b.originalIndex - a.originalIndex);
        else if(sortType === 'oldest') list.sort((a,b) => a.originalIndex - b.originalIndex);
        else if(sortType === 'az') list.sort((a,b) => a.tytul.localeCompare(b.tytul, 'pl'));
        else if(sortType === 'za') list.sort((a,b) => b.tytul.localeCompare(a.tytul, 'pl'));

        const header = document.createElement('div');
        header.className = 'view-title-header';
        header.innerText = currentView.startsWith('TOP') ? '🔥 ' + currentView : (currentView === 'cart' ? '❤️ MOJE ULUBIONE' : '📂 ' + currentView);
        out.appendChild(header);

        const contentBox = document.createElement('div');
        contentBox.className = 'display-padding';
        const container = document.createElement('div');
        container.className = displayMode === 'grid' ? 'items-grid' : 'list-container';

        let lastChar = "";
        list.forEach(s => {
            if((sortType === 'az' || sortType === 'za') && !query && s.tytul.charAt(0).toUpperCase() !== lastChar) {
                lastChar = s.tytul.charAt(0).toUpperCase();
                const h = document.createElement('div'); h.className = 'alpha-header'; h.innerText = lastChar; h.id = "anchor-"+lastChar; container.appendChild(h);
            }
            const isFav = cart.some(x => x.tytul === s.tytul);
            const item = document.createElement('div');
            if(displayMode === 'grid') {
                item.className = 'card';
                item.onclick = () => openYT(s.yt);
                item.innerHTML = `<div class="thumb-container"><img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb"><div class="play-overlay">GRAJ</div></div>
                                  <div class="card-title">${s.tytul}</div>
                                  <button class="btn-fav-toggle ${isFav?'is-active':''}" onclick="event.stopPropagation(); toggleFav('${s.tytul.replace(/'/g,"\\'")}')">${isFav?'❌ USUŃ':'➕ DODAJ'}</button>`;
            } else {
                item.className = 'list-card';
                item.onclick = () => openYT(s.yt);
                item.innerHTML = `<span class="list-title">${s.tytul}</span><button class="heart-btn" onclick="event.stopPropagation(); toggleFav('${s.tytul.replace(/'/g,"\\'")}')">${isFav?'❤️':'🤍'}</button>`;
            }
            container.appendChild(item);
        });
        contentBox.appendChild(container);
        out.appendChild(contentBox);
        
        document.getElementById('alpha-shelf').style.display = (displayMode === 'list' && currentView !== 'cart') ? 'block' : 'none';
    }

    function toggleFav(t) {
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else { const s = [...songs, ...topSongs].find(x => x.tytul === t); if(s) cart.push(s); }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cart)); render();
    }

    function updateSize(s) { document.body.className = s; localStorage.setItem('mv_font_permanent', s); render(); }
    function setMode(m) { displayMode = m; render(); }
    function setSort(s) { sortType = s; render(); }
    function setView(v) { currentView = v; render(); window.scrollTo(0,0); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    init();
</script>
</body>
</html>
