</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="https://via.placeholder.com/120" class="logo-img" alt="Logo">
        <div class="section-label">Rozmiar tekstu</div>
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <button class="size-btn active" onclick="setSize('standard', this)">Mały</button>
            <button class="size-btn" onclick="setSize('senior', this)">Duży</button>
        </div>
    </div>

    <div class="sidebar-scroll">
        <div class="section-label">Kategorie</div>
        <button class="nav-btn active" onclick="setView('wszystkie', this)">Wszystkie Utwory</button>
        <button class="nav-btn" onclick="setView('nowosci', this)">Nowości</button>
        <button class="nav-btn" onclick="setView('ulubione', this)">Moje Ulubione ❤️</button>
        
        <div class="section-label">Format widoku</div>
        <button class="nav-btn" onclick="setLayout('grid', this)">Siatka (Kafelki)</button>
        <button class="nav-btn" onclick="setLayout('list', this)">Lista (Tabela)</button>
    </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-padding">
            <div class="header-left">
                <input type="text" id="searchInput" class="search-box" placeholder="SZUKAJ UTWORU LUB WYKONAWCY..." oninput="handleSearch()">
            </div>
            <div class="header-right">
                <div class="top-header-title">Szybki Wybór</div>
                <div class="top-content-wrapper">
                    <div class="top-mini-grid">
                        <button class="ctrl-btn" onclick="filterAlpha('A')">A</button>
                        <button class="ctrl-btn" onclick="filterAlpha('B')">B</button>
                        <button class="ctrl-btn" onclick="filterAlpha('C')">C</button>
                    </div>
                    <button class="top-btn-more" onclick="toggleAlpha()">Więcej<br>Liter</button>
                </div>
            </div>
        </div>

        <div id="alpha-shelf" class="alpha-shelf">
            <div id="alpha-row">
                </div>
        </div>
        
        <div id="view-title" class="view-title-header">Wszystkie Utwory</div>
    </div>

    <div id="main-display">
        <div id="items-container" class="display-padding items-grid">
            </div>
    </div>
</div>

<script>
    // Przykładowe dane (zastąp swoimi z arkusza)
    const utwory = [
        { id: 1, tytul: "Pieśń Nadziei", autor: "Luna Vera", tag: "nowosci", litera: "P" },
        { id: 2, tytul: "Błękitne Niebo", autor: "Ekipa", tag: "klasyka", litera: "B" }
    ];

    let currentLayout = 'grid';

    function setSize(mode, btn) {
        document.body.className = mode;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setLayout(layout, btn) {
        currentLayout = layout;
        const container = document.getElementById('items-container');
        container.className = layout === 'grid' ? 'display-padding items-grid' : 'display-padding list-container';
        document.querySelectorAll('.nav-btn').forEach(b => { if(b.innerText.includes('Siatka') || b.innerText.includes('Lista')) b.classList.remove('active')});
        btn.classList.add('active');
        renderItems(utwory);
    }

    function renderItems(data) {
        const container = document.getElementById('items-container');
        container.innerHTML = data.map(item => {
            if(currentLayout === 'grid') {
                return `
                    <div class="card">
                        <div class="thumb-container">
                            <img src="https://via.placeholder.com/300x169" class="thumb">
                            <div class="play-overlay"><div class="yt-btn-fake">ODTWÓRZ WIDEO</div></div>
                        </div>
                        <div class="card-title">${item.tytul}</div>
                        <div style="font-size:0.8em">${item.autor}</div>
                    </div>`;
            } else {
                return `
                    <div class="list-card">
                        <div class="list-title">${item.tytul} - ${item.autor}</div>
                        <div class="list-overlay">KLIKNIJ, ABY ODTWORZYĆ</div>
                    </div>`;
            }
        }).join('');
    }

    function handleSearch() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = utwory.filter(u => u.tytul.toLowerCase().includes(val) || u.autor.toLowerCase().includes(val));
        renderItems(filtered);
    }

    // Inicjalizacja
    renderItems(utwory);
</script>

</body>
</html>
