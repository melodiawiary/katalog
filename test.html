<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v55</title>
    <style>
        :root { 
            --active-orange: #fbda80; --bg: #f4f9f8; --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; --deep-brown: #3b2a00; --sidebar-width: 220px;
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; --f-card-title: 14px; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; --f-card-title: 20px; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
        .sidebar-top { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 15px; }
        
        .section-label { font-size: 16px; font-weight: 900; color: var(--deep-brown); text-transform: uppercase; margin: 15px 0 10px 5px; display: block; border-bottom: 3px solid var(--active-orange); padding-bottom: 5px; }
        .nav-btn, .size-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 800; text-align: left; text-transform: uppercase; font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); display: flex; align-items: center; gap: 8px; box-sizing: border-box; }
        .nav-btn.active, .size-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown) !important; }
        .nav-btn.fav-btn { background: #fff1f1; border-color: #ffb3b3; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; min-height: 60px; }

        /* MAIN */
        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); width: 100%; box-sizing: border-box; }
        .top-padding { padding: 20px 25px 15px 25px; }
        
        .search-box { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: bold; text-align: center; background: var(--card-bg); }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .ctrl-btn { flex: 1; padding: 12px 4px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 800; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: var(--f-ctrl); transition: 0.2s; }
        .ctrl-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown); }

        .ad-placeholder { height: 100px; background: white; margin-top: 15px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #999; font-weight: bold; border-radius: 10px; }

        .view-title-header { background: var(--soft-cyan); color: var(--deep-brown); padding: 15px 25px; font-weight: 900; text-transform: uppercase; font-size: 1.5em; border-bottom: 5px solid var(--active-orange); border-top: 2px solid var(--active-orange); }
        #main-display { padding: 0 0 400px 0; min-height: 100vh; }
        .display-padding { padding: 0 25px; }
        
        /* GRID */
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08); padding: 12px; border-radius: 15px; text-align: center; position: relative; transition: 0.3s; display: flex; flex-direction: column; cursor: pointer; }
        
        /* WYRÓŻNIENIE DLA SENIORA */
        .card.is-fav { border: 5px solid var(--active-orange); background: #fffcf0; box-shadow: 0 5px 15px rgba(251,218,128,0.4); }
        .fav-status-tag { margin-top: 8px; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 900; background: #eee; border: 1px solid #ccc; text-transform: uppercase; }
        .is-fav .fav-status-tag { background: var(--active-orange); border-color: var(--deep-brown); }

        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; margin-bottom: 10px; position: relative; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(251, 218, 128, 0.95); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; color: var(--deep-brown); font-weight: 900; text-align: center; padding: 10px; font-size: 1.1em; text-transform: uppercase; }
        .card:hover .play-overlay { opacity: 1; }

        .card-title { font-weight: 900; font-size: var(--f-card-title); text-transform: uppercase; padding: 5px; line-height: 1.2; flex-grow: 1; }
        .heart-btn { font-size: 28px; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body class="standard">
<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='logo.png'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            <span class="fav-label">❤️ MOJE ULUBIONE</span>
            <span id="count" style="font-weight:900;">0 UTWORÓW</span>
        </button>
        <div style="margin-top:10px; padding:5px; border: 1px solid var(--deep-brown); border-radius:10px;">
            <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
            <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
        </div>
    </div>
    <div class="sidebar-scroll">
        <span class="section-label">KATEGORIE</span>
        <button class="nav-btn" id="cat-all" onclick="setView('all')">WSZYSTKIE PIEŚNI</button>
        <div id="cat-list"></div>
    </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-padding">
            <input type="text" id="search" class="search-box" placeholder="SZUKAJ W KATALOGU PIEŚNI MELODII WIARY..." onkeyup="doSearch()">
            <div class="btn-group">
                <button class="ctrl-btn" id="s-new" onclick="setSort('newest')">Sortuj od najnowszych</button>
                <button class="ctrl-btn" id="s-old" onclick="setSort('oldest')">Sortuj od najstarszych</button>
                <button class="ctrl-btn" id="s-az" onclick="setSort('az')">Sortuj od A do Z</button>
                <button class="ctrl-btn" id="s-za" onclick="setSort('za')">Sortuj od Z do A</button>
            </div>
            <div class="btn-group">
                <button class="ctrl-btn" id="m-grid" onclick="setMode('grid')">Widok miniatury pieśni</button>
                <button class="ctrl-btn" id="m-list" onclick="setMode('list')">Widok lista tytułów pieśni</button>
            </div>
            <div class="ad-placeholder">MIEJSCE NA REKLAMĘ</div>
        </div>
    </div>
    <div id="main-display"></div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    
    // Klucze do sprawdzania pamięci
    const HISTORY_KEYS = ['favs', 'melodia_wiary_v33_storage', 'melodia_wiary_v34_storage', 'melodia_wiary_v51_storage', 'melodia_wiary_v52_final', 'melodia_wiary_v54_final'];
    const ACTIVE_KEY = 'melodia_wiary_active_storage';

    let songs = [], cart = [], currentView = 'all', displayMode = 'grid', query = "", sortType = 'newest';

    function openYT(id) {
        window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(x => x.trim() !== "");
        return lines.slice(1).map((line, idx) => {
            const cells = []; let cur = '', inQ = false;
            for (let i = 0; i < line.length; i++) {
                if (line[i] === '"') inQ = !inQ;
                else if (line[i] === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
                else cur += line[i];
            }
            cells.push(cur.trim());
            return { tytul: cells[0] || "Bez tytułu", kategorie: (cells[1] || "Inne").split(',').map(c => c.trim()), yt: (cells[2] || "").trim(), originalIndex: idx };
        });
    }

    function updateSize(s) { 
        document.body.className = s; 
        document.getElementById('s-std').classList.toggle('active', s==='standard');
        document.getElementById('s-big').classList.toggle('active', s==='senior');
        localStorage.setItem('mv_font_pref', s);
    }

    async function init() {
        // --- ODZYSKIWANIE TWOICH 7 PIEŚNI ---
        let foundData = null;
        for (let key of HISTORY_KEYS) {
            let data = localStorage.getItem(key);
            if (data && JSON.parse(data).length > 0) { foundData = JSON.parse(data); break; }
        }
        if (foundData) { cart = foundData; localStorage.setItem(ACTIVE_KEY, JSON.stringify(cart)); }
        else { const saved = localStorage.getItem(ACTIVE_KEY); if(saved) cart = JSON.parse(saved); }
        
        updateSize(localStorage.getItem('mv_font_pref') || 'standard');

        try {
            const r = await fetch(CSV + '&cb=' + Date.now());
            const text = await r.text();
            songs = parseCSV(text);
            
            let catsSet = new Set();
            songs.forEach(s => s.kategorie.forEach(c => catsSet.add(c)));
            const catBox = document.getElementById('cat-list');
            Array.from(catsSet).sort().forEach(cat => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = cat; 
                b.onclick = () => setView(cat); catBox.appendChild(b);
            });
            render();
        } catch(e) { console.error("Błąd CSV:", e); }
    }

    function toggleFav(t) {
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else { const s = songs.find(x => x.tytul === t); if(s) cart.push(s); }
        localStorage.setItem(ACTIVE_KEY, JSON.stringify(cart));
        render();
    }

    function render() {
        const out = document.getElementById('main-display'); out.innerHTML = '';
        document.getElementById('count').innerText = cart.length + " UTWORÓW";

        let list = (currentView === 'cart') ? [...cart] : (currentView === 'all' ? [...songs] : songs.filter(s => s.kategorie.includes(currentView)));
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));

        if(sortType === 'newest') list.sort((a,b) => b.originalIndex - a.originalIndex);
        else if(sortType === 'oldest') list.sort((a,b) => a.originalIndex - b.originalIndex);
        else if(sortType === 'az') list.sort((a,b) => a.tytul.localeCompare(b.tytul, 'pl'));
        else if(sortType === 'za') list.sort((a,b) => b.tytul.localeCompare(a.tytul, 'pl'));

        const header = document.createElement('div');
        header.className = 'view-title-header';
        header.innerText = currentView === 'cart' ? '❤️ MOJE ULUBIONE' : (currentView === 'all' ? 'WSZYSTKIE PIEŚNI' : currentView);
        out.appendChild(header);

        const container = document.createElement('div');
        container.className = 'display-padding items-grid';
        
        list.forEach(s => {
            const isFav = cart.some(x => x.tytul === s.tytul);
            const item = document.createElement('div');
            item.className = isFav ? 'card is-fav' : 'card';
            const jsTytul = s.tytul.replace(/'/g, "\\'");

            item.onclick = () => openYT(s.yt);
            item.innerHTML = `
                <button class="heart-btn" style="position:absolute; top:10px; right:10px; z-index:10;" onclick="event.stopPropagation(); toggleFav('${jsTytul}')">${isFav ? '❤️' : '🤍'}</button>
                <div class="thumb-container">
                    <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                    <div class="play-overlay">KLIKNIJ, ABY OTWORZYĆ PIEŚŃ 🎶</div>
                </div>
                <div class="card-title">${s.tytul}</div>
                <div class="fav-status-tag" onclick="event.stopPropagation(); toggleFav('${jsTytul}')">
                    ${isFav ? '⭐ JEST W TWOICH ULUBIONYCH' : '➕ DODAJ DO ULUBIONYCH'}
                </div>
            `;
            container.appendChild(item);
        });
        out.appendChild(container);

        document.querySelectorAll('.ctrl-btn').forEach(b => {
            if(b.id.startsWith('s-')) b.classList.toggle('active', b.id === 's-'+sortType);
            if(b.id.startsWith('m-')) b.classList.toggle('active', b.id === 'm-'+displayMode);
        });
    }

    function setView(v) { 
        currentView = v; 
        if (v === 'cart') { displayMode = 'grid'; sortType = 'newest'; }
        render(); 
        window.scrollTo(0,0);
    }
    function setMode(m) { displayMode = m; render(); }
    function setSort(s) { sortType = s; render(); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    init();
</script>
</body>
</html>
