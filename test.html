<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v66 - MONETYZACJA MAX</title>
    <style>
        :root { 
            --active-orange: #fbda80;
            --bg: #f4f9f8; --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; --deep-brown: #3b2a00; --sidebar-width: 220px;
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-search: 1.1em; --f-card-title: 14px; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-search: 1.4em; --f-card-title: 20px; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); 
            display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }

        /* PRZYCISKI */
        .nav-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px;
            border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 800; text-align: left; text-transform: uppercase;
            font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); transition: 0.2s; box-sizing: border-box; }

        /* TO MUSI ŚWIECIĆ */
        .nav-btn.active { 
            background: var(--active-orange) !important;
            border: 4px solid var(--deep-brown) !important; 
            font-weight: 900 !important;
            transform: scale(1.03);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; width: calc(100% - var(--sidebar-width)); }
        .header-sticky { position: sticky; top: 0; z-index: 950; background: var(--bg); border-bottom: 2px solid var(--active-orange); }
        .view-title-header { background: var(--soft-cyan); padding: 15px; font-weight: 900; text-transform: uppercase; text-align: center; font-size: 1.4em; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 25px; }
        .card { background: var(--card-bg); border: 2px solid rgba(0,0,0,0.05); padding: 12px; border-radius: 15px; cursor: pointer; transition: 0.3s; text-align: center; }
        .card:hover { transform: translateY(-5px); border-color: var(--deep-brown); background: var(--soft-cyan); }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div style="padding:15px; text-align:center;">
        <img src="logo.png" style="width:100px; border-radius:50%; border:3px solid var(--active-orange); margin-bottom:10px;">
        <button class="nav-btn" id="btn-cart" onclick="setView('cart')">❤️ MOJE ULUBIONE</button>
        <button class="nav-btn" id="btn-top50" onclick="setView('top50')">🏆 TOP 50</button>
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
        <button class="nav-btn" id="btn-all" onclick="setView('all')">WSZYSTKIE PIEŚNI</button>
        <span style="font-size:10px; font-weight:900; color:#888;">KATEGORIE:</span>
    </div>
    <div class="sidebar-scroll" id="cat-list">
        </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div style="padding: 20px 25px; display: flex; gap: 20px; align-items: center;">
            <input type="text" id="search" style="flex:1; padding:12px; border-radius:10px; border:2px solid var(--deep-brown);" placeholder="SZUKAJ..." onkeyup="doSearch()">
            <div id="top-panel-mini"></div>
        </div>
        <div id="sticky-title-container"></div>
    </div>
    <div id="main-display"></div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    let songs = [], cart = [], currentView = 'all', query = "";

    // FUNKCJA DLA MAKSYMALNYCH ZYSKÓW - OTWIERA PEŁNĄ KARTĘ
    function openYT(id) {
        if(!id) return;
        // Otwarcie w nowej karcie (standardowe _blank) - daje 100% reklam i autoodtwarzanie
        window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
    }

    async function init() {
        try {
            const r = await fetch(CSV + '&cb=' + Date.now());
            const text = await r.text();
            const rows = text.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            let catsSet = new Set();

            songs = rows.map((line, idx) => {
                const cols = line.split(',').map(c => c.replace(/"/g, "").trim());
                let rawCats = (cols[1] || "Inne").split(';').map(c => c.trim());
                rawCats.forEach(c => { if(c.length > 2) catsSet.add(c); });
                return { tytul: cols[0], kategorie: rawCats, yt: cols[2], originalIndex: idx };
            });

            const catBox = document.getElementById('cat-list');
            Array.from(catsSet).sort().forEach(cat => {
                const b = document.createElement('button');
                b.className = 'nav-btn cat-dynamic-btn';
                b.innerText = cat;
                b.setAttribute('data-category', cat); // Bezpieczne przechowywanie nazwy
                b.onclick = () => setView(cat);
                catBox.appendChild(b);
            });
            render();
        } catch(e) { console.error("Błąd ładowania:", e); }
    }

    function setView(v) {
        currentView = v;
        render();
        window.scrollTo(0,0);
    }

    // PANCERNA FUNKCJA PODŚWIETLANIA
    function updateActiveStyles() {
        // 1. Czyścimy wszystkie
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

        // 2. Sprawdzamy stałe
        if (currentView === 'all') document.getElementById('btn-all').classList.add('active');
        if (currentView === 'cart') document.getElementById('btn-cart').classList.add('active');
        if (currentView === 'top50') document.getElementById('btn-top50').classList.add('active');

        // 3. Sprawdzamy dynamiczne po atrybucie data-category
        document.querySelectorAll('.cat-dynamic-btn').forEach(btn => {
            if (btn.getAttribute('data-category') === currentView) {
                btn.classList.add('active');
            }
        });
    }

    function render() {
        const out = document.getElementById('main-display');
        const titleContainer = document.getElementById('sticky-title-container');
        
        titleContainer.innerHTML = `<div class="view-title-header">${currentView === 'all' ? 'WSZYSTKIE PIEŚNI' : currentView.toUpperCase()}</div>`;
        out.innerHTML = '';

        let list = songs;
        if(currentView === 'cart') list = cart;
        else if(currentView !== 'all') list = songs.filter(s => s.kategorie.includes(currentView));
        
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));

        const grid = document.createElement('div');
        grid.className = 'items-grid';

        list.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openYT(s.yt);
            card.innerHTML = `
                <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                <div style="font-weight:900; margin-top:10px; text-transform:uppercase; font-size:13px;">${s.tytul}</div>
            `;
            grid.appendChild(card);
        });

        out.appendChild(grid);
        updateActiveStyles(); // Wywołanie po narysowaniu wszystkiego
    }

    function doSearch() {
        query = document.getElementById('search').value.toLowerCase();
        render();
    }

    init();
</script>
</body>
</html>
