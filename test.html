<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodia Wiary - Premium Music Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Nowa, szlachetna paleta kolorów */
            --gold-primary: #d4af37;
            --gold-light: #f1e5ac;
            --deep-navy: #1a1a2e; /* Głęboki, duchowy granat */
            --soft-white: #f8f9fa;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --sidebar-width: 280px;
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Dynamiczne skalowanie czcionek */
        body.standard { --f-size: 16px; --f-h1: 1.8rem; }
        body.senior { --f-size: 20px; --f-h1: 2.2rem; }

        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: var(--deep-navy);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            font-size: var(--f-size);
            transition: all 0.3s ease;
        }

        /* SIDEBAR - MODERN GLASS LOOK */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--deep-navy);
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 1000;
            box-shadow: 5px 0 25px rgba(0,0,0,0.2);
        }

        .sidebar-top {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
        }

        .logo-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--gold-primary);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            object-fit: cover;
            margin-bottom: 20px;
            transition: transform 0.5s ease;
        }
        .logo-img:hover { transform: rotate(5deg) scale(1.05); }

        .section-label {
            font-size: 0.8em;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--gold-light);
            text-transform: uppercase;
            margin: 25px 0 10px 0;
            opacity: 0.8;
        }

        /* BUTTONS - HIGH END UI */
        .nav-btn, .size-btn, .ctrl-btn {
            width: 100%;
            padding: 14px 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn { background: rgba(255,255,255,0.05); color: white; }
        .nav-btn:hover { background: var(--gold-primary); color: var(--deep-navy); transform: translateX(5px); }
        .nav-btn.active { background: var(--gold-primary); color: var(--deep-navy); box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }

        .fav-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            justify-content: center;
            border: none;
            margin-bottom: 15px;
        }

        /* MAIN CONTENT AREA */
        #main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .header-sticky {
            position: sticky;
            top: 0;
            z-index: 900;
            background: rgba(248, 249, 250, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .search-box {
            width: 100%;
            padding: 18px 25px;
            border-radius: 50px;
            border: 2px solid #eee;
            font-size: 1.1em;
            font-family: inherit;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s;
            outline: none;
        }
        .search-box:focus { border-color: var(--gold-primary); box-shadow: 0 0 15px rgba(212,175,55,0.2); }

        /* CARDS - THE PILLAR OF DESIGN */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.4s ease;
            position: relative;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
            border-color: var(--gold-primary);
        }

        .thumb-container {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
        }

        .thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .card:hover .thumb { transform: scale(1.1); }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(26, 26, 46, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }
        .card:hover .play-overlay { opacity: 1; }

        .yt-btn-fake {
            background: var(--gold-primary);
            color: var(--deep-navy);
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 0.8em;
        }

        .card-content { padding: 20px; text-align: center; }
        .card-title {
            font-weight: 700;
            font-size: 1em;
            margin-bottom: 15px;
            line-height: 1.4;
            min-height: 2.8em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* TOP LIST STYLING */
        .card-rank {
            background: var(--gold-primary);
            color: var(--deep-navy);
            font-weight: 900;
            padding: 5px 15px;
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            border-radius: 50px;
            font-size: 0.8em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* HEADER PANEL FOR TOP 3 */
        .header-right-premium {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 25px;
            color: white;
            margin-top: 20px;
            border: 1px solid var(--gold-primary);
        }

        /* ALPHA SHELF MODERNIZED */
        .alpha-shelf {
            padding: 15px 40px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            background: white;
            border-bottom: 1px solid #eee;
        }
        .alpha-btn {
            min-width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid #eee;
            background: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .alpha-btn:hover, .alpha-btn.active {
            background: var(--gold-primary);
            border-color: var(--gold-primary);
            color: var(--deep-navy);
        }

        /* INSTRUCTION BOX */
        .instruction-box {
            margin: 40px;
            background: white;
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            border: 2px solid var(--gold-light);
            background-image: radial-gradient(circle at top right, var(--gold-light), transparent 200px);
        }

        /* Dodatki mobilne */
        @media (max-width: 900px) {
            #sidebar { width: 80px; }
            .sidebar-top img { width: 50px; height: 50px; }
            .section-label, .nav-btn span { display: none; }
            #main-content { margin-left: 80px; }
        }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/140?text=MV'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">❤️ <span>ULUBIONE</span></button>
        <button class="nav-btn" style="background: var(--gold-primary); color: var(--deep-navy);" onclick="setView('top50')">🏆 <span>TOP 50</span></button>
        
        <div class="section-label">WYGLĄD</div>
        <div style="display: flex; gap: 5px;">
            <button class="size-btn" onclick="updateSize('standard')">A</button>
            <button class="size-btn" onclick="updateSize('senior')" style="font-size: 1.2em;">A+</button>
        </div>
        
        <div class="section-label">KATEGORIE</div>
    </div>
    <div class="sidebar-scroll" id="cat-list" style="padding: 10px; overflow-y: auto;">
        <button class="nav-btn" id="cat-all" onclick="setView('all')">WSZYSTKIE</button>
    </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <input type="text" id="search" class="search-box" placeholder="Czego chcesz dziś posłuchać? Szukaj pieśni..." onkeyup="doSearch()">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
            <div style="display: flex; gap: 10px;">
                <button class="ctrl-btn" onclick="setSort('newest')">Najnowsze</button>
                <button class="ctrl-btn" onclick="setSort('az')">A-Z</button>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="ctrl-btn" onclick="setMode('grid')">Siatka</button>
                <button class="ctrl-btn" onclick="setMode('list')">Lista</button>
            </div>
        </div>
    </div>

    <div id="alpha-shelf" class="alpha-shelf" style="display:none;"></div>

    <div id="sticky-title-container"></div>
    <div id="main-display"></div>
</div>

<script>

    // ... (Twoja logika CSV, parse, sortowanie) ...
</script>

</body>
</html>
