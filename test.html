<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v63 STABILNA</title>
    <style>
        :root { 
            --active-orange: #fbda80;
            --bg: #f4f9f8; --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; --deep-brown: #3b2a00; --sidebar-width: 220px;
            --fav-red: #e63946; 
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; --f-card-title: 14px; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; --f-card-title: 20px; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
        .sidebar-top { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 15px; }
        
        .nav-btn, .size-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); transition: 0.2s; box-sizing: border-box; }
        .nav-btn.fav-btn { background: #fff1f1; border-color: var(--fav-red); color: var(--fav-red); }
        .nav-btn.active, .size-btn.active { background: var(--active-orange) !important; border-width: 2.5px; }

        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; width: calc(100% - var(--sidebar-width)); }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); border-bottom: 2px solid var(--active-orange); }
        .top-padding { display: flex; width: 100%; }
        
        .header-left { width: 50%; padding: 20px; box-sizing: border-box; }
        .header-right { width: 50%; border-left: 2px solid var(--active-orange); padding: 20px; background: #fff; box-sizing: border-box; }
        
        /* PANEL TOP */
        .top-header-title { font-weight: 900; text-transform: uppercase; font-size: 0.9em; text-align: center; margin-bottom: 10px; padding: 8px; border: 2px solid var(--deep-brown); border-radius: 8px; background: #ffcccc; }
        .top-mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .top-list-text { margin-top: 10px; font-weight: 800; font-size: var(--f-card-title); line-height: 1.3; text-transform: uppercase; }
        .top-btn-more { margin-top: 10px; width: 100%; padding: 12px; background: var(--fav-red); color: white; border: 2px solid var(--deep-brown); border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* CARDS */
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 25px; }
        .card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08); padding: 12px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .card:hover { border: 2px solid var(--deep-brown); background: var(--soft-cyan); }
        
        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; margin-bottom: 10px; position: relative; border: 1px solid rgba(0,0,0,0.1); }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .card-title { font-weight: 900; font-size: var(--f-card-title); text-transform: uppercase; flex-grow: 1; margin: 5px 0; }

        .btn-fav-toggle { padding: 8px; border-radius: 8px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); font-weight: 900; font-size: 11px; text-transform: uppercase; cursor: pointer; }
        .btn-fav-toggle.is-active { background: var(--active-orange); border-width: 2px; }

        .search-box { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: bold; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/120?text=LOGO'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            ❤️ MOJE ULUBIONE (<span id="count">0</span>)
        </button>
        <div style="margin-top:10px;">
            <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
            <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
        </div>
    </div>
    <div class="sidebar-scroll" id="cat-list">
        </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-padding">
            <div class="header-left">
                <input type="text" id="search" class="search-box" placeholder="SZUKAJ PIEŚNI..." onkeyup="doSearch()">
            </div>
            <div class="header-right" id="top-panel">
                </div>
        </div>
    </div>
    <div id="main-display" class="items-grid"></div>
</div>

<script>
    // TWOJE LINKI
    const CSV_KATALOG = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    const CSV_TOP = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQeNOmR7SJ-G5j8DMMXjR1KE4h5w1UiNY5nHhV1mvGNJ63I_-3SQPDMNxNFpakUL4VLFacWFUOmycPB/pub?output=csv';

    let songs = [], topSongs = [], cart = [], currentView = 'all', query = "";
    const STORAGE_KEY = 'melodia_wiary_pref_v63';

    async function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved) cart = JSON.parse(saved);
        updateSize(localStorage.getItem('mv_font_v63') || 'standard');

        try {
            // Pobierz katalog główny
            const r1 = await fetch(CSV_KATALOG + '&cb=' + Date.now());
            const t1 = await r1.text();
            songs = parseCSV(t1).map((cols, i) => ({ tytul: cols[0], yt: cols[2], cat: cols[1], idx: i }));

            // Pobierz TOP
            const r2 = await fetch(CSV_TOP + '&cb=' + Date.now());
            const t2 = await r2.text();
            topSongs = parseCSV(t2).map(cols => ({ tytul: cols[0], yt: cols[1] }));

            render();
        } catch(e) { console.error("Błąd ładowania danych", e); }
    }

    function parseCSV(text) {
        return text.split(/\r?\n/).filter(line => line.trim() !== "").slice(1).map(line => {
            const result = []; let cur = '', inQ = false;
            for (let char of line) {
                if (char === '"') inQ = !inQ;
                else if (char === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
                else cur += char;
            }
            result.push(cur.trim()); return result;
        });
    }

    function renderTopPanel() {
        const panel = document.getElementById('top-panel');
        if (!topSongs.length) return;

        let html = `<div class="top-header-title">TOP TYGODNIA POLSKIEJ PIEŚNI RELIGIJNEJ</div>`;
        html += `<div class="top-mini-grid">`;
        topSongs.slice(0, 3).forEach(s => {
            html += `
                <div class="card" onclick="openYT('${s.yt}')" style="padding:5px;">
                    <div class="thumb-container"><img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb"></div>
                    <div class="card-title">${s.tytul}</div>
                </div>`;
        });
        html += `</div><div class="top-list-text">`;
        topSongs.slice(3, 10).forEach((s, i) => { html += `<div>${i + 4}. ${s.tytul}</div>`; });
        html += `</div><button class="top-btn-more">KLIKNIJ I ZOBACZ CAŁE TOP 50</button>`;
        panel.innerHTML = html;
    }

    function render() {
        renderTopPanel();
        const out = document.getElementById('main-display');
        out.innerHTML = '';
        document.getElementById('count').innerText = cart.length;

        let list = (currentView === 'cart') ? [...cart] : [...songs];
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));

        list.forEach(s => {
            const isFav = cart.some(x => x.tytul === s.tytul);
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openYT(s.yt);
            card.innerHTML = `
                <div class="thumb-container"><img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb"></div>
                <div class="card-title">${s.tytul}</div>
                <button class="btn-fav-toggle ${isFav ? 'is-active' : ''}" onclick="event.stopPropagation(); toggleFav('${s.tytul.replace(/'/g, "\\'")}')">
                    ${isFav ? '❌ USUŃ' : '➕ DODAJ DO ULUBIONYCH'}
                </button>
            `;
            out.appendChild(card);
        });
    }

    function toggleFav(t) {
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else { const s = songs.find(x => x.tytul === t) || topSongs.find(x => x.tytul === t); if(s) cart.push(s); }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
        render();
    }

    function openYT(id) { window.open(`https://www.youtube.com/watch?v=${id}`, '_blank'); }
    function updateSize(s) { document.body.className = s; localStorage.setItem('mv_font_v63', s); render(); }
    function setView(v) { currentView = v; render(); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }

    init();
</script>
</body>
</html>
