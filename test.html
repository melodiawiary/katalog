<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v65</title>
    <style>
        :root { 
            --active-orange: #fbda80;
            --bg: #f4f9f8; --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; --deep-brown: #3b2a00; --sidebar-width: 220px;
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; --f-card-title: 14px; --f-list-title: 1em; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; --f-card-title: 20px; --f-list-title: 1.4em; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); 
            display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
        
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        
        /* STYL PRZYCISKU AKTYWNEGO - WZMOCNIONY */
        .nav-btn.active, .size-btn.active { 
            background: var(--active-orange) !important;
            border: 4px solid var(--deep-brown) !important; 
            font-weight: 900 !important;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .nav-btn, .size-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px;
            border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 800; text-align: left; text-transform: uppercase;
            font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); transition: 0.2s; box-sizing: border-box; }

        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; width: calc(100% - var(--sidebar-width)); }
        
        .header-sticky { position: sticky; top: 0; z-index: 950; background: var(--bg); width: 100%; }
        .top-padding { display: flex; width: 100%; padding: 0; align-items: stretch; }
        .header-left { width: 50%; padding: 20px 25px; }
        .header-right { width: 50%; background: #fff5f5; border-left: 2px solid var(--active-orange); padding: 20px 25px; }

        .search-box { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: bold; text-align: center; }
        
        .view-title-header { background: var(--soft-cyan); color: var(--deep-brown); padding: 15px; font-weight: 900;
            text-transform: uppercase; font-size: 1.5em; border-bottom: 5px solid var(--active-orange); text-align: center; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08); padding: 12px; border-radius: 15px; cursor: pointer; text-align: center; }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div style="padding:15px; text-align:center;">
        <button class="nav-btn" id="btn-cart" onclick="setView('cart')">❤️ MOJE ULUBIONE</button>
        <button class="nav-btn" id="btn-top50" onclick="setView('top50')">🏆 TOP 50</button>
        <span style="font-weight:900; display:block; margin:10px 0;">ROZMIAR:</span>
        <button class="size-btn" id="s-std" onclick="updateSize('standard')">ZWYKŁE</button>
        <button class="size-btn" id="s-big" onclick="updateSize('senior')">DUŻE</button>
        <hr>
        <button class="nav-btn" id="btn-all" onclick="setView('all')">WSZYSTKIE PIEŚNI</button>
    </div>
    <div class="sidebar-scroll" id="cat-list">
        </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-padding">
            <div class="header-left">
                <input type="text" id="search" class="search-box" placeholder="SZUKAJ PIEŚNI..." onkeyup="doSearch()">
            </div>
            <div class="header-right" id="top-panel"></div>
        </div>
        <div id="sticky-title-container"></div>
    </div>
    <div id="main-display"></div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    let songs = [], top50 = [], cart = [], currentView = 'all', displayMode = 'grid', query = "";

    // FUNKCJA OTWIERANIA JAKO NOWE OKNO (NIE ZAKŁADKA)
    function openYT(id) {
        if(!id) return;
        const w = window.screen.availWidth * 0.8;
        const h = window.screen.availHeight * 0.8;
        const left = (window.screen.width - w) / 2;
        const top = (window.screen.height - h) / 2;
        
        // Kluczowe: 'popup=yes' oraz brak toolbarów wymusza na wielu przeglądarkach osobne okno
        window.open(`https://www.youtube.com/watch?v=${id}`, '_blank', 
        `width=${w},height=${h},top=${top},left=${left},scrollbars=yes,resizable=yes,toolbar=no,location=no,status=no,menubar=no`);
    }

    async function init() {
        const r = await fetch(CSV + '&cb=' + Date.now());
        const text = await r.text();
        const rows = text.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
        let catsSet = new Set();

        songs = rows.map((line, idx) => {
            const cols = line.split(','); // Uproszczone dla przykładu
            let rawCats = (cols[1] || "Inne").split(';').map(c => c.trim());
            rawCats.forEach(c => catsSet.add(c));
            return { tytul: cols[0], kategorie: rawCats, yt: cols[2], originalIndex: idx };
        });

        const catBox = document.getElementById('cat-list');
        Array.from(catsSet).sort().forEach(cat => {
            const b = document.createElement('button');
            b.className = 'nav-btn';
            b.innerText = cat;
            b.id = "cat-" + cat.replace(/\s+/g, '-'); // Unikalne ID dla każdej kategorii
            b.onclick = () => setView(cat);
            catBox.appendChild(b);
        });
        render();
    }

    function setView(v) {
        currentView = v;
        render();
        window.scrollTo(0,0);
    }

    // TA FUNKCJA ROZWIĄZUJE PROBLEM PODŚWIETLENIA
    function updateActiveStyles() {
        // 1. Usuń klasę active ze wszystkich przycisków w sidebarze
        document.querySelectorAll('#sidebar .nav-btn').forEach(btn => btn.classList.remove('active'));

        // 2. Podświetl przyciski stałe
        if (currentView === 'all') document.getElementById('btn-all').classList.add('active');
        if (currentView === 'cart') document.getElementById('btn-cart').classList.add('active');
        if (currentView === 'top50') document.getElementById('btn-top50').classList.add('active');

        // 3. Podświetl przyciski kategorii dynamicznych
        const dynamicBtn = document.getElementById("cat-" + currentView.replace(/\s+/g, '-'));
        if (dynamicBtn) {
            dynamicBtn.classList.add('active');
        }
    }

    function render() {
        const out = document.getElementById('main-display');
        const titleContainer = document.getElementById('sticky-title-container');
        
        titleContainer.innerHTML = `<div class="view-title-header">${currentView.toUpperCase()}</div>`;
        out.innerHTML = '';

        let list = songs;
        if(currentView === 'cart') list = cart;
        else if(currentView !== 'all') list = songs.filter(s => s.kategorie.includes(currentView));

        const grid = document.createElement('div');
        grid.className = 'items-grid';

        list.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openYT(s.yt);
            card.innerHTML = `
                <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                <div style="font-weight:900; margin-top:10px;">${s.tytul}</div>
            `;
            grid.appendChild(card);
        });

        out.appendChild(grid);
        
        // WYWOŁANIE PODŚWIETLENIA NA SAMYM KOŃCU
        updateActiveStyles();
    }

    function updateSize(s) {
        document.body.className = s;
        document.getElementById('s-std').classList.toggle('active', s==='standard');
        document.getElementById('s-big').classList.toggle('active', s==='senior');
    }

    init();
</script>
</body>
</html>
