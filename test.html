<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v62</title>
    <style>
        :root { 
            --active-orange: #fbda80;
            --bg: #f4f9f8; --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; --deep-brown: #3b2a00; --sidebar-width: 220px;
        }
        
        body.standard { 
            --f-size: 16px;
            --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; 
            --f-card-title: 14px; --f-list-title: 1em;
        }
        body.senior { 
            --f-size: 22px;
            --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; 
            --f-card-title: 20px; --f-list-title: 1.4em;
        }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width);
            background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02); }
        .sidebar-top { padding: 15px 10px; text-align: center;
            border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .sidebar-scroll { flex-grow: 1;
            overflow-y: auto; padding: 10px; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 15px;
            }
        
        .section-label { font-size: 16px;
            font-weight: 900; color: var(--deep-brown); text-transform: uppercase; margin: 15px 0 0 0; display: block; border-bottom: 3px solid var(--active-orange); padding-bottom: 5px; text-align: center;
            }
        
        .nav-btn, .size-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px;
            border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 800; text-align: left; text-transform: uppercase; font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); display: flex;
            align-items: center; gap: 8px; transition: transform 0.2s, background 0.2s; box-sizing: border-box; }
        
        .nav-btn:hover { background: var(--active-orange); transform: scale(1.02); }
        
        .nav-btn.active, .size-btn.active { background: var(--active-orange) !important;
            border: 2.5px solid var(--deep-brown) !important; transform: scale(1.02); }
            
        .nav-btn.fav-btn { background: #fff1f1; border-color: #ffb3b3;
            flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; min-height: 60px;
            }

        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width);
            flex: 1; display: flex; flex-direction: column; width: calc(100% - var(--sidebar-width)); }
        .header-sticky { position: sticky; top: 0;
            z-index: 900; background: var(--bg); width: 100%; box-sizing: border-box; }
        
        /* UKŁAD PANELI 50/50 */
        .top-padding { display: flex; width: 100%; box-sizing: border-box; gap: 0; padding: 0; }
        
        .header-left { width: 50%; padding: 20px 25px 15px 25px; box-sizing: border-box; }
        .header-right { width: 50%; background: var(--bg); border-left: 2px solid var(--active-orange); box-sizing: border-box; padding: 20px 25px 15px 25px; display: flex; flex-direction: column; }
        
        /* STYLE DLA PANELU TOP */
        .top-header-title { font-weight: 900; text-transform: uppercase; font-size: 1.1em; text-align: center; margin-bottom: 10px; color: var(--deep-brown); line-height: 1.2; }
        
        .top-content-wrapper { display: flex; gap: 15px; align-items: stretch; }
        .top-mini-grid { flex: 7; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .top-btn-more { 
            flex: 3; 
            background: var(--active-orange); 
            border: 2px solid var(--deep-brown); 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 13px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            line-height: 1.2;
            padding: 10px;
            transition: transform 0.2s;
        }
        .top-btn-more:hover { transform: scale(1.03); }

        .search-box { width: 100%;
            padding: 12px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: bold; text-align: center; background: var(--card-bg); box-sizing: border-box;
            }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px;
            }
        
        .ctrl-btn { flex: 1; padding: 12px 4px; border: 1px solid var(--deep-brown);
            background: var(--soft-cyan); color: var(--deep-brown); font-weight: 800; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: var(--f-ctrl); transition: transform 0.2s, background 0.2s;
            }
        .ctrl-btn:hover { background: var(--active-orange); transform: scale(1.02); }
        .ctrl-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown); transform: scale(1.02); }

        .ad-placeholder { height: 100px;
            background: white; margin-top: 15px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #999; font-weight: bold; border-radius: 10px;
            }

        .alpha-shelf { border-top: 3px solid var(--active-orange);
            border-bottom: 3px solid var(--active-orange); background: var(--bg); padding: 10px 25px; display: none;
            }
        #alpha-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-start;
            }
        .alpha-btn { padding: 6px 12px; font-size: 14px; font-weight: 900;
            border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); cursor: pointer; border-radius: 4px; min-width: 38px; transition: 0.2s;
            }
        .alpha-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown);
            }

        .view-title-header { background: var(--soft-cyan); color: var(--deep-brown); padding: 15px 25px; font-weight: 900;
            text-transform: uppercase; font-size: 1.5em; border-bottom: 5px solid var(--active-orange); border-top: 2px solid var(--active-orange);
            }

        #main-display { padding: 0 0 400px 0; min-height: 100vh; width: 100%;
            }
        .display-padding { padding: 0 25px; width: 100%; box-sizing: border-box; }
        
        .alpha-header { grid-column: 1 / -1;
            background: var(--active-orange); padding: 8px 20px; border-radius: 8px; font-weight: 900; margin: 40px 0 15px 0; border: 2px solid var(--deep-brown); font-size: 1.3em;
            text-align: left; scroll-margin-top: 300px; }
        
        .items-grid { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }

        .list-container { 
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            margin-top: 20px; 
        }

        @media (max-width: 1400px) { .list-container { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1100px) { .list-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px) { .list-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .list-container { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg);
            border: 2px solid rgba(59, 42, 0, 0.08); padding: 12px; border-radius: 15px; text-align: center; position: relative; transition: 0.3s; display: flex;
            flex-direction: column; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        
        .card:hover { border: 2px solid var(--deep-brown);
            background: var(--soft-cyan); transform: translateY(-5px); }
        
        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px;
            overflow: hidden; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05); position: relative;
            }
        .thumb { width: 100%; height: 100%; object-fit: cover;
            }
        .card-title { font-weight: 900; font-size: var(--f-card-title); text-transform: uppercase; padding: 5px; line-height: 1.2;
            }

        .play-overlay { position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(210, 233, 230, 0.95); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; color: var(--deep-brown); font-weight: 900;
            text-align: center; padding: 10px; font-size: 1.1em; text-transform: uppercase; }
        .card:hover .play-overlay { opacity: 1;
            }
        .yt-btn-fake { background: var(--active-orange); border: 2px solid var(--deep-brown); padding: 8px 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .btn-fav-toggle { margin-top: 10px; padding: 10px; border-radius: 10px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 900; font-size: 12px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-fav-toggle.is-active { background: var(--active-orange); border-width: 2.5px; }

        .list-card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08);
            border-radius: 10px; padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; min-height: 60px; position: relative; overflow: hidden;
            }
        .list-card:hover { border: 2px solid var(--deep-brown); background: var(--active-orange);
            }
        .list-title { font-weight: 800; font-size: var(--f-list-title); flex: 1; padding-right: 10px; line-height: 1.2;
            text-transform: uppercase; color: var(--deep-brown); }
        
        .list-overlay { position: absolute; top:0; left:0; width:100%; height:100%;
            background: var(--active-orange); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; color: var(--deep-brown); font-weight: 900; text-align: center; font-size: 0.9em;
            pointer-events: none; }
        .list-card:hover .list-overlay { opacity: 1;
            }

        .heart-btn { font-size: 24px; cursor: pointer; border: none; background: none; position: relative;
            z-index: 5; }
    </style>
</head>
