<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v35 (Lista Przebojów)</title>
    <style>
        :root { 
            --active-orange: #fbda80; 
            --bg: #f4f9f8; 
            --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; 
            --deep-brown: #3b2a00; 
            --sidebar-width: 240px; 
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        /* SIDEBAR - STAŁE ELEMENTY */
        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
        .sidebar-top { padding: 20px 15px; text-align: center; border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 15px; }
        
        .section-label { font-size: 1.1em; font-weight: 900; color: var(--deep-brown); text-transform: uppercase; margin: 20px 0 10px 5px; display: block; border-bottom: 3px solid var(--active-orange); padding-bottom: 5px; }

        .nav-btn, .size-btn { 
            width: 100%; padding: 12px 10px; margin-bottom: 10px; border-radius: 8px; 
            border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 900; 
            text-align: left; text-transform: uppercase; font-size: var(--f-btn); 
            background: var(--soft-cyan); color: var(--deep-brown); display: flex; align-items: center; 
            gap: 8px; transition: 0.2s; box-sizing: border-box;
        }
        .nav-btn:hover, .nav-btn.active, .size-btn:hover, .size-btn.active { 
            background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown) !important; 
        }
        
        .nav-btn.fav-btn { 
            background: #fff1f1; border-color: #ffb3b3; 
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 15px 10px; min-height: 80px;
        }
        .fav-label, .fav-count-label { font-size: 1em; font-weight: 900; display: block; }
        .size-btn { margin-top: 10px; text-align: center; justify-content: center; }

        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); width: 100%; box-sizing: border-box; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .top-padding { padding: 25px; }
        
        /* NOWY LAYOUT GÓRNY */
        .top-layout { display: flex; gap: 30px; align-items: flex-start; }
        
        /* Obszar kontrolny - niezmieniona szerokość */
        .controls-area { flex: 1; display: flex; flex-direction: column; gap: 15px; max-width: 600px; }
        
        /* NOWA KOLUMNA: LISTA PRZEBOJÓW (zamiast playera) */
        .top-hits-column { 
            width: 360px; /* Ok. 40% mniejsza niż dawny player 600px */
            background: var(--card-bg); 
            border: 3px solid var(--active-orange); 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-height: 250px;
            overflow: hidden;
        }
        .hits-header { 
            background: var(--active-orange); 
            color: var(--deep-brown); 
            padding: 10px; 
            font-weight: 900; 
            text-align: center; 
            text-transform: uppercase; 
            font-size: 0.9em;
        }
        .hits-list { padding: 10px; overflow-y: auto; list-style: none; margin: 0; }
        .hits-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 8px 0; 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
            font-size: 0.85em;
            font-weight: 700;
        }
        .hit-rank { color: var(--active-orange); font-size: 1.2em; min-width: 25px; text-align: center; -webkit-text-stroke: 1px var(--deep-brown); }

        .search-box { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: 900; text-align: center; background: var(--card-bg); outline: none; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .ctrl-btn { flex: 1; padding: 12px 6px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 900; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: var(--f-ctrl); transition: 0.2s; }
        .ctrl-btn:hover, .ctrl-btn.active { background: var(--active-orange) !important; border: 2px solid var(--deep-brown); }

        .view-title-header { 
            background: var(--soft-cyan); color: var(--deep-brown); 
            padding: 20px 25px; margin: 0; 
            font-weight: 900; text-transform: uppercase; 
            font-size: 1.4em; border-bottom: 5px solid var(--active-orange);
        }

        #main-display { padding: 0 0 100px 0; min-height: 100vh; }
        .display-padding { padding: 25px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08); padding: 15px; border-radius: 15px; text-align: center; position: relative; transition: 0.3s; }
        .card:hover { border: 2px solid var(--deep-brown); transform: translateY(-3px); }
        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; cursor: pointer; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.05); }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .heart-btn { font-size: 32px; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/130?text=MELODIA+WIARY'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            <span class="fav-label">MOJE ULUBIONE</span>
            <span class="fav-count-label">(<span id="count">0</span> UTWORÓW)</span>
        </button>
        <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
        <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
    </div>
    <div class="sidebar-scroll">
        <span class="section-label">KATEGORIE</span>
        <button class="nav-btn" id="cat-all" onclick="setView('all')">WSZYSTKIE PIEŚNI</button>
        <div id="cat-list"></div>
    </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-padding">
            <div class="top-layout">
                <div class="controls-area">
                    <input type="text" id="search" class="search-box" placeholder="SZUKAJ W KATALOGU PIEŚNI..." onkeyup="doSearch()">
                    <div class="btn-group">
                        <button class="ctrl-btn" id="s-new" onclick="setSort('newest')">Najnowsze</button>
                        <button class="ctrl-btn" id="s-old" onclick="setSort('oldest')">Najstarsze</button>
                        <button class="ctrl-btn" id="s-az" onclick="setSort('az')">A-Z</button>
                        <button class="ctrl-btn" id="s-za" onclick="setSort('za')">Z-A</button>
                    </div>
                    <div class="btn-group">
                        <button class="ctrl-btn active" id="m-grid" onclick="setMode('grid')">Miniatury</button>
                        <button class="ctrl-btn" id="m-list" onclick="setMode('list')">Lista</button>
                    </div>
                </div>

                <div class="top-hits-column">
                    <div class="hits-header">Lista przebojów tygodnia</div>
                    <div class="hits-list">
                        <div class="hits-item"><span class="hit-rank">1</span> Barka</div>
                        <div class="hits-item"><span class="hit-rank">2</span> Abba Ojcze</div>
                        <div class="hits-item"><span class="hit-rank">3</span> Czarna Madonna</div>
                        <div class="hits-item"><span class="hit-rank">4</span> Tyś w Wieczerniku</div>
                        <div class="hits-item"><span class="hit-rank">5</span> Z dawna Polski Tyś Królową</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="main-display"></div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    const STORAGE_KEY = 'melodia_wiary_permanent_storage'; 
    let songs = [], cart = [], currentView = 'all', displayMode = 'grid', query = "", sortType = 'newest';

    function parseCSVLine(text) {
        const result = []; let cur = '', inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim()); return result;
    }

    function updateSize(s) { 
        document.body.className = s; 
        document.getElementById('s-std').classList.toggle('active', s==='standard'); 
        document.getElementById('s-big').classList.toggle('active', s==='senior'); 
        localStorage.setItem('mv_font_permanent', s);
    }

    async function init() {
        let saved = localStorage.getItem(STORAGE_KEY);
        if(saved) cart = JSON.parse(saved);
        updateSize(localStorage.getItem('mv_font_permanent') || 'standard');
        
        try {
            const r = await fetch(CSV + '&cb=' + Date.now());
            const text = await r.text();
            const rows = text.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            let catsSet = new Set();
            songs = rows.map((line, index) => {
                const cols = parseCSVLine(line);
                let rawCats = (cols[1] || "Inne").split(',').map(c => c.trim()).filter(c => c.length > 2);
                rawCats.forEach(c => catsSet.add(c));
                return { tytul: cols[0] || "Bez tytułu", kategorie: rawCats, yt: (cols[2] || "").trim(), originalIndex: index };
            });
            const catBox = document.getElementById('cat-list');
            Array.from(catsSet).sort().forEach(cat => {
                const b = document.createElement('button'); 
                b.className = 'nav-btn'; 
                b.innerText = cat; 
                b.onclick = () => setView(cat); catBox.appendChild(b);
            });
            render();
        } catch(e) { console.error(e); }
    }

    function toggleFav(t) {
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else { const s = songs.find(x => x.tytul === t); if(s) cart.push(s); }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
        render();
    }

    function render() {
        const out = document.getElementById('main-display'); out.innerHTML = '';
        document.getElementById('count').innerText = cart.length;
        
        const header = document.createElement('div');
        header.className = 'view-title-header';
        header.innerText = currentView === 'all' ? 'WSZYSTKIE PIEŚNI' : (currentView === 'cart' ? '❤️ MOJE ULUBIONE' : '📂 KATEGORIA: ' + currentView);
        out.appendChild(header);

        const contentBox = document.createElement('div');
        contentBox.className = 'display-padding';
        out.appendChild(contentBox);

        let list = (currentView === 'cart') ? [...cart] : (currentView === 'all' ? [...songs] : songs.filter(s => s.kategorie.includes(currentView)));
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));

        if(sortType === 'az') list.sort((a,b) => a.tytul.localeCompare(b.tytul));
        if(sortType === 'za') list.sort((a,b) => b.tytul.localeCompare(a.tytul));
        if(sortType === 'oldest') list.sort((a,b) => a.originalIndex - b.originalIndex);
        if(sortType === 'newest') list.sort((a,b) => b.originalIndex - a.originalIndex);

        const container = document.createElement('div');
        container.className = 'items-grid';
        
        list.forEach(s => {
            const item = document.createElement('div');
            const isFav = cart.some(x => x.tytul === s.tytul);
            item.className = 'card';
            item.innerHTML = `
                <button class="heart-btn" style="position:absolute; top:10px; right:10px; z-index:10;" onclick="toggleFav('${s.tytul.replace(/'/g, "\\'")}')">${isFav ? '❤️' : '🤍'}</button>
                <div class="thumb-container" onclick="window.open('https://www.youtube.com/watch?v=${s.yt}', '_blank')">
                    <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                </div>
                <div style="font-weight:900; font-size:1em; text-transform:uppercase; padding:5px;">${s.tytul}</div>
            `;
            container.appendChild(item);
        });
        contentBox.appendChild(container);
    }

    function setMode(m) { displayMode = m; render(); }
    function setSort(s) { sortType = s; render(); }
    function setView(v) { currentView = v; render(); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    init();
</script>
</body>
</html>
