<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v38</title>
    <style>
        :root { 
            --active-orange: #fbda80; 
            --bg: #f4f9f8; 
            --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; 
            --deep-brown: #3b2a00; 
            --sidebar-width: 220px; 
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        /* SIDEBAR - POWRÓT DO SPRAWDZONEJ FORMY */
        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
        .sidebar-top { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 15px; }
        
        .section-label { font-size: 1.1em; font-weight: 900; color: var(--deep-brown); text-transform: uppercase; margin: 15px 0 10px 5px; display: block; border-bottom: 3px solid var(--active-orange); padding-bottom: 5px; }

        .nav-btn, .size-btn { 
            width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px; 
            border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 900; 
            text-align: left; text-transform: uppercase; font-size: var(--f-btn); 
            background: var(--soft-cyan); color: var(--deep-brown); transition: 0.2s; box-sizing: border-box;
        }
        .nav-btn:hover, .nav-btn.active, .size-btn:hover, .size-btn.active { 
            background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown) !important; 
        }
        
        .nav-btn.fav-btn { 
            background: #fff1f1; border-color: #ffb3b3; 
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 12px 10px; min-height: 70px;
        }
        .fav-label, .fav-count-label { font-size: 1em; font-weight: 900; display: block; }

        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); width: 100%; box-sizing: border-box; }
        .top-padding { padding: 20px 25px 15px 25px; }
        .top-layout { display: flex; gap: 25px; align-items: flex-start; }
        .controls-area { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        
        #player-section { width: 600px; background: #000; aspect-ratio: 16/9; border: 4px solid var(--deep-brown); border-radius: 12px; overflow: hidden; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        
        /* NOWOŚĆ: LISTA PRZEBOJÓW POD ODTWARZACZEM */
        #top-hits-shelf { 
            width: 600px; margin-top: 15px; background: var(--card-bg); 
            border: 3px solid var(--active-orange); border-radius: 12px; overflow: hidden;
        }
        .hits-header { background: var(--active-orange); padding: 5px 15px; font-weight: 900; text-transform: uppercase; font-size: 0.8em; border-bottom: 2px solid var(--deep-brown); }
        .hits-scroll { display: flex; overflow-x: auto; padding: 10px; gap: 15px; scrollbar-width: thin; }
        .hit-item { min-width: 120px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
        .hit-item:hover { transform: scale(1.05); }
        .hit-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 6px; border: 1px solid var(--deep-brown); object-fit: cover; }
        .hit-rank { position: absolute; top: -5px; left: -5px; background: var(--deep-brown); color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 12px; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid var(--active-orange); }
        .hit-title { font-size: 10px; font-weight: 900; text-transform: uppercase; margin-top: 5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .search-box { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: 900; text-align: center; background: var(--card-bg); }
        
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .ctrl-btn { flex: 1; padding: 12px 4px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 900; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: var(--f-ctrl); transition: 0.2s; }
        .ctrl-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown); }

        .view-title-header { background: var(--soft-cyan); color: var(--deep-brown); padding: 15px 25px; margin: 0 0 20px 0; font-weight: 900; text-transform: uppercase; font-size: 1.5em; border-bottom: 5px solid var(--active-orange); }

        #main-display { padding: 0 25px 400px 25px; min-height: 100vh; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08); padding: 12px; border-radius: 15px; text-align: center; position: relative; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .card:hover { border: 2px solid var(--deep-brown); }
        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; cursor: pointer; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05); }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .heart-btn { font-size: 28px; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/120?text=LOGO'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            <span class="fav-label">❤️ MOJE ULUBIONE</span>
            <span class="fav-count-label">(<span id="count">0</span> UTWORÓW)</span>
        </button>
        <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
        <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
    </div>
    <div class="sidebar-scroll">
        <span class="section-label">KATEGORIE</span>
        <button class="nav-btn" id="cat-all" onclick="setView('all')">WSZYSTKIE PIEŚNI</button>
        <div id="cat-list"></div>
    </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-padding">
            <div class="top-layout">
                <div class="controls-area">
                    <input type="text" id="search" class="search-box" placeholder="SZUKAJ PIEŚNI..." onkeyup="doSearch()">
                    <div class="btn-group">
                        <button class="ctrl-btn" id="s-new" onclick="setSort('newest')">Nowe</button>
                        <button class="ctrl-btn" id="s-az" onclick="setSort('az')">A-Z</button>
                        <button class="ctrl-btn" id="m-grid" onclick="setMode('grid')">Kwadraty</button>
                        <button class="ctrl-btn" id="m-list" onclick="setMode('list')">Lista</button>
                    </div>
                </div>

                <div style="display:flex; flex-direction:column;">
                    <div id="player-section">
                        <div id="yt-player-container" style="height:100%; background:#000; color:#fff; display:flex; align-items:center; justify-content:center; text-align:center; padding:20px; font-weight: 900;">
                            KLIKNIJ, ABY SŁUCHAĆ 🎶
                        </div>
                    </div>
                    
                    <div id="top-hits-shelf">
                        <div class="hits-header">🏆 POLSKA LISTA PRZEBOJÓW PIEŚNI RELIGIJNYCH (TOP 10)</div>
                        <div class="hits-scroll" id="hits-row">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="main-display"></div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    const STORAGE_KEY = 'melodia_wiary_permanent_storage'; 
    let songs = [], cart = [], currentView = 'all', displayMode = 'grid', query = "", sortType = 'newest';

    // TUTAJ WPISUJESZ HITY TYGODNIA
    const weekHits = [
        { tytul: "Kłaniam się Tobie", yt: "K0S1jD3H7wA" },
        { tytul: "Mój Mistrzu", yt: "L0L9bA7vK1" },
        { tytul: "Bądź blisko", yt: "X9zP1_Ww4" },
        { tytul: "Golgota", yt: "dQw4w9WgXcQ" },
        { tytul: "Ave Maria", yt: "9v_S_XnBf_Y" }
    ];

    function updateSize(s) { 
        document.body.className = s; 
        document.getElementById('s-std').classList.toggle('active', s==='standard'); 
        document.getElementById('s-big').classList.toggle('active', s==='senior'); 
        localStorage.setItem('mv_font_permanent', s);
    }

    function playSong(ytId) {
        document.getElementById('yt-player-container').innerHTML = 
            `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${ytId}?autoplay=1" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
    }

    async function init() {
        let saved = localStorage.getItem(STORAGE_KEY);
        if(saved) cart = JSON.parse(saved);
        updateSize(localStorage.getItem('mv_font_permanent') || 'standard');
        
        // Render Listy Przebojów
        const hitsRow = document.getElementById('hits-row');
        weekHits.forEach((h, index) => {
            const item = document.createElement('div');
            item.className = 'hit-item';
            item.onclick = () => playSong(h.yt);
            item.innerHTML = `<div class="hit-rank">${index+1}</div><img src="https://img.youtube.com/vi/${h.yt}/mqdefault.jpg" class="hit-thumb"><span class="hit-title">${h.tytul}</span>`;
            hitsRow.appendChild(item);
        });

        try {
            const r = await fetch(CSV + '&cb=' + Date.now());
            const text = await r.text();
            const rows = text.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            let catsSet = new Set();
            songs = rows.map((line, index) => {
                const cols = line.split(',');
                let cats = (cols[1] || "Inne").split(';').map(c => c.trim());
                cats.forEach(c => catsSet.add(c));
                return { tytul: cols[0], kategorie: cats, yt: (cols[2] || "").trim(), originalIndex: index };
            });
            const catBox = document.getElementById('cat-list');
            Array.from(catsSet).sort().forEach(cat => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = cat;
                b.onclick = () => setView(cat); catBox.appendChild(b);
            });
            render();
        } catch(e) { console.error(e); }
    }

    function toggleFav(t) {
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else { const s = songs.find(x => x.tytul === t); if(s) cart.push(s); }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
        render();
    }

    function render() {
        const out = document.getElementById('main-display'); out.innerHTML = '';
        document.getElementById('count').innerText = cart.length;
        let list = (currentView === 'cart') ? [...cart] : (currentView === 'all' ? [...songs] : songs.filter(s => s.kategorie.includes(currentView)));
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));

        const container = document.createElement('div');
        container.className = 'items-grid';
        list.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            const isFav = cart.some(x => x.tytul === s.tytul);
            card.innerHTML = `
                <button class="heart-btn" style="position:absolute; top:10px; right:10px; z-index:10;" onclick="toggleFav('${s.tytul.replace(/'/g, "\\'")}')">${isFav ? '❤️' : '🤍'}</button>
                <div class="thumb-container" onclick="playSong('${s.yt}')"><img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb"></div>
                <div style="font-weight:900; text-transform:uppercase; font-size:0.9em;">${s.tytul}</div>
            `;
            container.appendChild(card);
        });
        out.appendChild(container);
    }

    function setMode(m) { displayMode = m; render(); }
    function setSort(s) { sortType = s; render(); }
    function setView(v) { currentView = v; render(); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    init();
</script>
</body>
</html>
