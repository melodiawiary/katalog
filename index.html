<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Melodia Wiary - Katalog</title>
    <style>
        body { background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #d4af37; letter-spacing: 2px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px; }
        .card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 12px; transition: 0.3s; }
        .card:hover { border-color: #d4af37; transform: translateY(-5px); }
        .thumb { width: 100%; aspect-ratio: 16/9; cursor: pointer; object-fit: cover; border-radius: 8px; }
        .title { margin: 12px 0 5px; font-weight: bold; font-size: 15px; height: 40px; overflow: hidden; }
        .cat-tag { background: #d4af37; color: black; font-size: 10px; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .btn-add { background: none; border: 1px solid #d4af37; color: #d4af37; padding: 8px; width: 100%; margin-top: 10px; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        .btn-add:hover { background: #d4af37; color: black; }
        #cart-counter { position: fixed; bottom: 20px; right: 20px; background: #d4af37; color: black; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 100; }
    </style>
</head>
<body>

<div id="cart-counter" onclick="sendOrder()">Wybrano: 0 (Poproś o płyty)</div>
<h1>MELODIA WIARY - KATALOG</h1>

<div class="grid" id="catalog">Ładowanie piosenek...</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZU08zkis1FoqDfypL9hOQ8nTbAvMmBeIuK56_Qo1XFu_b71-de1jN6Km9symosx38V6V5PxKO/pub?output=csv'; 

    let cart = [];

    async function loadSongs() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            
            // Rozdzielamy wiersze, biorąc pod uwagę różne formaty (Windows/Mac)
            const rows = data.split(/\r?\n/).slice(1);
            const container = document.getElementById('catalog');
            container.innerHTML = '';

            rows.forEach(row => {
                // To pozwoli na obsługę przecinków wewnątrz cudzysłowów
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if(cols.length >= 3) {
                    const tytul = cols[0].replace(/"/g, '').trim();
                    const kategoria = cols[1].replace(/"/g, '').trim();
                    const idYT = cols[2].replace(/"/g, '').trim();
                    
                    if(idYT.length > 2) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img class="thumb" src="https://img.youtube.com/vi/${idYT}/mqdefault.jpg" onclick="window.open('https://youtube.com/watch?v=${idYT}')">
                            <span class="cat-tag">${kategoria}</span>
                            <div class="title">${tytul}</div>
                            <button class="btn-add" onclick="addToCart('${tytul.replace(/'/g, "\\'")}')">Dodaj do zestawu</button>
                        `;
                        container.appendChild(card);
                    }
                }
            });
            
            if(container.innerHTML === '') {
                container.innerHTML = 'Nie znaleziono piosenek w arkuszu. Sprawdź, czy dane są w wierszach 2, 3, 4...';
            }

        } catch (e) {
            document.getElementById('catalog').innerHTML = 'Błąd połączenia z Arkuszem. Upewnij się, że jest opublikowany jako .csv';
        }
    }

    function addToCart(title) {
        cart.push(title);
        document.getElementById('cart-counter').innerText = `Wybrano: ${cart.length} (Poproś o płyty)`;
    }

    function sendOrder() {
        if(cart.length === 0) return alert("Wybierz piosenki klikając przycisk 'Dodaj do zestawu'");
        const lista = cart.join("%0D%0A- ");
        const mailto = `mailto:TWOJ_MAIL@GMAIL.COM?subject=Zestaw Melodia Wiary&body=Dzień dobry, poproszę o płyty z utworami:%0D%0A%0D%0A- ${lista}`;
        window.location.href = mailto;
    }

    loadSongs();
</script>
</body>
</html>
