<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodia Wiary - Katalog Utworów</title>
    <style>
        :root { --gold: #d4af37; --bg: #020617; --sidebar: #0f172a; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; }

        /* PANEL BOCZNY */
        #sidebar { 
            width: 260px; background: var(--sidebar); border-right: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100;
        }
        .logo-img { width: 100%; height: auto; margin-bottom: 25px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
        
        .nav-group { margin-bottom: 20px; }
        .nav-label { font-size: 10px; text-transform: uppercase; color: #64748b; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .nav-btn { 
            width: 100%; background: none; border: 1px solid transparent; color: #ccc; 
            text-align: left; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; font-size: 13px;
        }
        .nav-btn:hover, .nav-btn.active { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); color: var(--gold); }
        .nav-btn.order-btn { background: var(--gold); color: black; font-weight: bold; margin-top: 8px; text-align: center; }

        /* TREŚĆ GŁÓWNA */
        #main-content { margin-left: 260px; flex: 1; padding: 30px; }
        
        /* PASEK NARZĘDZI */
        .toolbar { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 15px; 
        }
        .view-title { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 18px; }
        
        .sort-select { 
            background: #1e293b; color: #eee; border: 1px solid var(--gold); 
            padding: 8px; border-radius: 6px; cursor: pointer; outline: none; font-size: 12px;
        }

        /* SIATKA UTWORÓW */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); background: rgba(255,255,255,0.06); }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .title { font-weight: bold; font-size: 14px; margin: 12px 0; min-height: 38px; color: #fff; line-height: 1.4; }
        
        .btn-action { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--gold); background: none; color: var(--gold); cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: auto; }
        .btn-action:hover { background: var(--gold); color: black; }
        .btn-remove { border-color: #ef4444; color: #ef4444; }
        .btn-remove:hover { background: #ef4444; color: white; }

        /* MOBILNE DOSTOSOWANIE */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--gold); padding: 15px; box-sizing: border-box; }
            #main-content { margin-left: 0; padding: 15px; }
            .toolbar { flex-direction: column; align-items: flex-start; gap: 10px; }
            .logo-img { max-width: 150px; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <img src="https://lh3.googleusercontent.com/u/0/d/1lGrhzfxzTIAlH2iaHahCjWAZYuqxknP7" alt="Melodia Wiary" class="logo-img">
    
    <div class="nav-group">
        <span class="nav-label">Katalog</span>
        <button class="nav-btn active" id="btn-all" onclick="showView('all')">🏠 WSZYSTKIE UTWORY</button>
        <button class="nav-btn" id="btn-my-list" onclick="showView('cart')">⭐ MÓJ WYBÓR (<span id="count">0</span>)</button>
    </div>

    <div class="nav-group">
        <span class="nav-label">Kategorie</span>
        <div id="category-list"></div>
    </div>

    <div id="order-section" style="display:none; margin-top: auto; padding-top: 15px; border-top: 1px solid #334155;">
        <button class="nav-btn order-btn" onclick="copyToClipboard()">📋 SKOPIUJ LISTĘ</button>
        <button class="nav-btn order-btn" style="background:#eee;" onclick="sendOrder()">✉ WYŚLIJ E-MAIL</button>
    </div>
</div>

<div id="main-content">
    <div class="toolbar">
        <h1 id="view-name" class="view-title">Wszystkie Utwory</h1>
        <div id="sort-box">
            <label style="font-size: 11px; color: #64748b; margin-right: 8px;">SORTUJ:</label>
            <select class="sort-select" onchange="changeSort(this.value)">
                <option value="newest">Najnowsze</option>
                <option value="oldest">Najstarsze</option>
                <option value="az">A-Z (Tytuł)</option>
                <option value="za">Z-A (Tytuł)</option>
            </select>
        </div>
    </div>
    
    <div id="catalog-grid" class="grid"></div>
</div>

<script>
    // TWOJE DANE Z GOOGLE SHEETS
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv'; 
    
    let rawSongs = []; // Dane prosto z arkusza
    let sortedSongs = []; // Dane posortowane
    let cart = []; // Wybrane utwory
    let currentView = 'all'; // Aktualny widok (kategoria lub koszyk)
    let currentSort = 'newest'; // Domyślne sortowanie

    // 1. ŁADOWANIE KOSZYKA Z PAMIĘCI PRZEGLĄDARKI
    function loadCart() {
        const saved = localStorage.getItem('melodiaWiaryCart');
        if (saved) {
            cart = JSON.parse(saved);
            document.getElementById('count').innerText = cart.length;
        }
    }

    // 2. ZAPISYWANIE KOSZYKA
    function saveCart() {
        localStorage.setItem('melodiaWiaryCart', JSON.stringify(cart));
        document.getElementById('count').innerText = cart.length;
    }

    // 3. POBIERANIE DANYCH Z ARKUSZA
    async function loadData() {
        loadCart();
        try {
            const resp = await fetch(SHEET_URL + '&cb=' + Date.now());
            const text = await resp.text();
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
            
            const cats = new Set();
            rawSongs = rows.map((r, index) => {
                // Rozpoznawanie przecinka lub średnika
                let cols = r.includes(';') ? r.split(';') : r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const s = { 
                    tytul: cols[0].replace(/"/g, '').trim(), 
                    kategoria: cols[1] ? cols[1].replace(/"/g, '').trim() : "Brak", 
                    idYT: cols[2] ? cols[2].replace(/"/g, '').trim() : "",
                    order: index 
                };
                if(s.kategoria) cats.add(s.kategoria);
                return s;
            });

            // Tworzenie przycisków kategorii w panelu bocznym
            const catDiv = document.getElementById('category-list');
            cats.forEach(c => {
                const b = document.createElement('button'); 
                b.className = 'nav-btn'; 
                b.innerText = "• " + c;
                b.onclick = () => { currentView = c; updateNavStyles(b); render(); };
                catDiv.appendChild(b);
            });
            
            applySort(); // Pierwsze ułożenie (domyślnie najnowsze)
        } catch (e) { 
            document.getElementById('view-name').innerText = "Błąd ładowania danych"; 
        }
    }

    // 4. LOGIKA SORTOWANIA
    function changeSort(val) {
        currentSort = val;
        applySort();
    }

    function applySort() {
        sortedSongs = [...rawSongs];
        if (currentSort === 'newest') sortedSongs.sort((a, b) => b.order - a.order);
        if (currentSort === 'oldest') sortedSongs.sort((a, b) => a.order - b.order);
        if (currentSort === 'az') sortedSongs.sort((a, b) => a.tytul.localeCompare(b.tytul));
        if (currentSort === 'za') sortedSongs.sort((a, b) => b.tytul.localeCompare(a.tytul));
        render();
    }

    // 5. WYŚWIETLANIE UTWORÓW
    function render() {
        const grid = document.getElementById('catalog-grid');
        const title = document.getElementById('view-name');
        grid.innerHTML = '';
        
        let displayList = [];
        const isCartView = currentView === 'cart';

        // Wybieramy co wyświetlić
        if (currentView === 'all') {
            displayList = sortedSongs;
            title.innerText = "Wszystkie Utwory";
        } else if (isCartView) {
            displayList = cart;
            title.innerText = "Twój Wybór";
        } else {
            displayList = sortedSongs.filter(s => s.kategoria === currentView);
            title.innerText = "Kategoria: " + currentView;
        }

        // Ukrywamy/Pokazujemy elementy panelu
        document.getElementById('order-section').style.display = (isCartView && cart.length > 0) ? 'block' : 'none';
        document.getElementById('sort-box').style.visibility = isCartView ? 'hidden' : 'visible';

        // Generujemy karty
        displayList.forEach((s, idx) => {
            if(!s.idYT) return;
            const card = document.createElement('div'); 
            card.className = 'card';
            card.innerHTML = `
                <img class="thumb" src="https://img.youtube.com/vi/${s.idYT}/mqdefault.jpg" onclick="window.open('https://youtube.com/watch?v=${s.idYT}')" title="Kliknij, aby obejrzeć">
                <div class="title">${s.tytul}</div>
                ${isCartView ? 
                    `<button class="btn-action btn-remove" onclick="removeFromCart(${idx})">USUŃ Z LISTY</button>` : 
                    `<button class="btn-action" onclick="addToCart('${s.tytul.replace(/'/g, "\\'")}')">DODAJ DO LISTY</button>`
                }
            `;
            grid.appendChild(card);
        });

        if(displayList.length === 0) {
            grid.innerHTML = "<p style='padding:20px; color:#64748b;'>Brak utworów w tej sekcji.</p>";
        }
    }

    // 6. FUNKCJE KOSZYKA
    function addToCart(title) {
        const song = rawSongs.find(s => s.tytul === title);
        if(song) {
            // Sprawdzamy czy już nie ma na liście
            if(cart.find(item => item.tytul === title)) {
                return alert("Ten utwór jest już na Twojej liście!");
            }
            cart.push(song);
            saveCart();
            alert("Dodano do listy: " + title);
        }
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        saveCart();
        render();
    }

    function showView(view) {
        currentView = view;
        const btnId = view === 'all' ? 'btn-all' : 'btn-my-list';
        updateNavStyles(document.getElementById(btnId));
        render();
    }

    function updateNavStyles(activeBtn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(activeBtn) activeBtn.classList.add('active');
    }

    // 7. WYSYŁKA
    function copyToClipboard() {
        const text = "Moje wybrane utwory z Melodii Wiary:\n- " + cart.map(s => s.tytul).join("\n- ");
        navigator.clipboard.writeText(text).then(() => alert("Lista skopiowana do schowka! Teraz wklej ją w wiadomości."));
    }

    function sendOrder() {
        const mailto = `mailto:TWOJ_EMAIL@GMAIL.COM?subject=Zestaw Pieśni&body=Dzień dobry, przesyłam listę wybranych utworów:\n- ${cart.map(s => s.tytul).join("\n- ")}`;
        window.location.href = mailto;
    }

    // START
    loadData();
</script>
</body>
</html>
