<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - Alfabet v11</title>
    <style>
        :root { 
            --active-orange: #fbda80; 
            --bg: #fdfdfd; 
            --sidebar-bg: #ffffff; 
            --soft-cyan: #d2e9e6; 
            --deep-brown: #3b2a00; 
            --sidebar-border: #e2e8f0;
            --sidebar-width: 230px; 
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 12px; --f-tip: 18px; --f-search: 1.2em; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 18px; --f-tip: 24px; --f-search: 1.6em; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .sidebar-top { padding: 15px; border-bottom: 1px solid var(--sidebar-border); text-align: center; }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 10px; }
        
        .nav-btn { width: 100%; padding: 10px; margin-bottom: 6px; border-radius: 8px; border: 1px solid var(--sidebar-border); cursor: pointer; font-weight: 700; text-align: left; text-transform: uppercase; font-size: var(--f-btn); color: var(--deep-brown); background: var(--soft-cyan); transition: 0.2s; }
        .nav-btn:hover { background: var(--active-orange); }
        .nav-btn.active { background: var(--active-orange) !important; color: var(--deep-brown) !important; border: 2px solid var(--deep-brown); }

        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
        
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); padding: 20px 30px; border-bottom: 3px solid var(--active-orange); width: 100%; box-sizing: border-box; }
        .top-layout { display: flex; gap: 30px; align-items: flex-start; width: 100%; }
        .controls-area { flex: 1; display: flex; flex-direction: column; }
        
        #player-section { width: 520px; background: #000; aspect-ratio: 16/9; border: 3px solid var(--deep-brown); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.15); flex-shrink: 0; }
        .search-box { width: 100%; padding: 12px; border-radius: 20px; border: 2px solid var(--soft-cyan); font-size: var(--f-search); font-weight: bold; margin-bottom: 10px; box-sizing: border-box; text-align: center; color: var(--deep-brown); background: #fff; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .ctrl-btn { flex: 1; min-width: 100px; padding: 10px; border: 1px solid var(--sidebar-border); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 800; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: var(--f-ctrl); transition: 0.2s; }
        .ctrl-btn:hover { background: var(--active-orange); }
        .ctrl-btn.active { background: var(--active-orange) !important; border: 2px solid var(--deep-brown); }

        #ad-space { width: 100%; height: 60px; background: #ffffff; border: 1px dashed var(--soft-cyan); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }

        /* UKŁAD Z ALFABETEM */
        .content-with-alpha { display: flex; gap: 15px; padding: 0 30px 60px 30px; }
        
        /* PASEK LITER A-Z */
        #alpha-bar { 
            width: 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 2px; 
            position: sticky; 
            top: 250px; 
            height: fit-content;
        }
        .alpha-btn { 
            width: 100%; 
            padding: 5px 0; 
            font-size: 14px; 
            font-weight: 900; 
            border: 1px solid var(--sidebar-border); 
            background: var(--soft-cyan); 
            color: var(--deep-brown); 
            cursor: pointer; 
            border-radius: 4px; 
            text-align: center;
        }
        .alpha-btn:hover { background: var(--active-orange); }
        .alpha-btn.active { background: var(--active-orange); border: 2px solid var(--deep-brown); }

        #main-display { flex: 1; }

        /* LISTA I GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 10px; }

        /* SEKCJA LITERY NA LIŚCIE */
        .alpha-header { 
            grid-column: 1 / -1; 
            background: var(--active-orange); 
            padding: 5px 20px; 
            border-radius: 8px; 
            font-weight: 900; 
            margin: 15px 0 5px 0; 
            border-left: 10px solid var(--deep-brown);
        }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #fff; border: 1px solid #ddd; border-radius: 10px; transition: 0.2s; }
        .list-item:hover { background: var(--active-orange); border-color: var(--deep-brown); }
        .list-title { font-weight: 700; cursor: pointer; flex-grow: 1; margin-right: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item:hover .list-title::before { content: "▶ "; }

        .btn-add { background: var(--soft-cyan); color: var(--deep-brown); border: 1px solid var(--sidebar-border); padding: 10px; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; width: 100%; font-size: var(--f-btn); transition: 0.2s; }
        .btn-add:hover { background: var(--active-orange); border-color: var(--deep-brown); }
        .btn-add.selected { background: var(--active-orange); border: 2px solid var(--deep-brown); }
        .btn-list-add { width: auto; padding: 6px 15px; min-width: 80px; }

        .card { background: #fff; border: 1px solid var(--sidebar-border); padding: 12px; border-radius: 15px; text-align: center; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { border-color: var(--active-orange); transform: translateY(-3px); }
        .thumb-container { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; cursor: pointer; margin-bottom: 8px; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(251, 218, 128, 0.9); color: var(--deep-brown); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; font-weight: 900; }
        .thumb-container:hover .play-overlay { opacity: 1; }
        .card-title { font-weight: 800; margin-bottom: 12px; text-transform: uppercase; font-size: 0.95em; line-height: 1.2; height: 2.4em; overflow: hidden; color: var(--deep-brown); }

        .size-btn { width: 100%; padding: 8px; margin-top: 5px; font-weight: 900; cursor: pointer; border: 1px solid var(--sidebar-border); background: var(--soft-cyan); color: var(--deep-brown); border-radius: 6px; font-size: var(--f-ctrl); text-transform: uppercase; transition: 0.2s; }
        .size-btn.active { background: var(--active-orange); border: 2px solid var(--deep-brown); }

        .cd-box { background: white; padding: 25px; border-radius: 20px; border: 4px solid var(--active-orange); margin: 30px 0; color: var(--deep-brown); }
        .cd-progress-container { background: #eee; border-radius: 15px; height: 25px; width: 100%; margin: 15px 0; overflow: hidden; border: 1px solid var(--deep-brown); }
        .cd-progress-bar { background: var(--active-orange); height: 100%; transition: 0.5s; }

        @media (max-width: 1200px) { .top-layout { flex-direction: column; } #player-section { width: 100%; } .list-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/100?text=LOGO'">
        <button class="nav-btn" id="cat-all" onclick="setView('all')">🏠 WSZYSTKIE</button>
        <button class="nav-btn" id="btn-cart" onclick="setView('cart')">⭐ WYBÓR (<span id="count">0</span>)</button>
        <div style="margin-top:10px;">
            <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
            <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
        </div>
    </div>
    <div class="sidebar-scroll" id="cat-list"></div>
</div>

<div id="main-content">
    <div class="header-sticky" id="toolbar">
        <div class="top-layout">
            <div class="controls-area">
                <input type="text" id="search" class="search-box" placeholder="SZUKAJ UTWORU..." onkeyup="doSearch()">
                <div class="btn-group">
                    <button class="ctrl-btn active" id="s-new" onclick="setSort('newest')">NAJNOWSZE</button>
                    <button class="ctrl-btn" id="s-old" onclick="setSort('oldest')">NAJSTARSZE</button>
                    <button class="ctrl-btn" id="s-az" onclick="setSort('az')">A-Z</button>
                    <button class="ctrl-btn" id="s-za" onclick="setSort('za')">Z-A</button>
                </div>
                <div class="btn-group">
                    <button class="ctrl-btn active" id="m-grid" onclick="setMode('grid')">OBRAZKI</button>
                    <button class="ctrl-btn" id="m-list" onclick="setMode('list')">LISTA</button>
                </div>
                <div id="ad-space">MIEJSCE NA TWOJĄ REKLAMĘ</div>
            </div>
            <div id="player-section">
                <div id="yt-player-container" style="height:100%; background:#000; color:#555; display:flex; align-items:center; justify-content:center; text-align:center; font-weight:bold; font-size:14px; padding:20px;">
                    KLIKNIJ PIEŚŃ, ABY POSŁUCHAĆ 🎶
                </div>
            </div>
        </div>
    </div>

    <div class="content-with-alpha">
        <div id="alpha-bar"></div>
        <div id="main-display"></div>
    </div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    const STORAGE_KEY = 'mv_PERMANENT_final_v1'; 
    let songs = [], cart = [], currentView = 'all', displayMode = 'grid', query = "", sortType = 'newest', alphaFilter = "";

    function parseCSVLine(text) {
        const result = []; let cur = '', inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim()); return result;
    }

    function updateSize(s) { 
        document.body.className = s; 
        document.getElementById('s-std').classList.toggle('active', s==='standard'); 
        document.getElementById('s-big').classList.toggle('active', s==='senior'); 
        localStorage.setItem('mv_font_pref', s);
    }

    function playSong(ytId) {
        document.getElementById('yt-player-container').innerHTML = 
            `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    }

    async function init() {
        const savedCart = localStorage.getItem(STORAGE_KEY);
        if(savedCart) cart = JSON.parse(savedCart);
        updateSize(localStorage.getItem('mv_font_pref') || 'standard');
        
        // Budowanie paska alfabetu
        const ab = document.getElementById('alpha-bar');
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
            const b = document.createElement('button'); b.className = 'alpha-btn'; b.innerText = l;
            b.onclick = () => setAlpha(l); b.id = "alpha-" + l;
            ab.appendChild(b);
        });

        try {
            const r = await fetch(CSV + '&cb=' + Date.now());
            const text = await r.text();
            const rows = text.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            let catsSet = new Set();
            songs = rows.map((line, index) => {
                const cols = parseCSVLine(line);
                let rawCats = (cols[1] || "Inne").split(',').map(c => c.trim()).filter(c => c.length > 2);
                rawCats.forEach(c => catsSet.add(c));
                return { tytul: cols[0] || "Bez tytułu", kategorie: rawCats, yt: (cols[2] || "").trim(), czas: (cols[3] || "0:00").trim(), originalIndex: index };
            });
            const catBox = document.getElementById('cat-list');
            Array.from(catsSet).sort().forEach(cat => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = cat; 
                b.id = "btn-" + cat.replace(/\s/g, ''); b.onclick = () => setView(cat); catBox.appendChild(b);
            });
            render();
        } catch(e) { console.error(e); }
    }

    function setAlpha(l) {
        if(alphaFilter === l) alphaFilter = ""; else alphaFilter = l;
        render();
    }

    function toggleSong(t) {
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else { const s = songs.find(x => x.tytul === t); if(s) cart.push(s); }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
        render();
    }

    function render() {
        const out = document.getElementById('main-display'); out.innerHTML = '';
        document.getElementById('count').innerText = cart.length;
        document.getElementById('toolbar').style.display = (currentView === 'cart') ? 'none' : 'block';
        document.getElementById('alpha-bar').style.display = (currentView === 'cart' || displayMode === 'grid') ? 'none' : 'flex';
        if(currentView === 'cart') { renderCart(out); return; }

        document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
        if(alphaFilter) document.getElementById('alpha-' + alphaFilter).classList.add('active');

        let list = currentView === 'all' ? [...songs] : songs.filter(s => s.kategorie.includes(currentView));
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));
        if(alphaFilter) list = list.filter(s => s.tytul.toUpperCase().startsWith(alphaFilter));

        if(sortType === 'newest') list.sort((a,b) => b.originalIndex - a.originalIndex);
        else if(sortType === 'oldest') list.sort((a,b) => a.originalIndex - b.originalIndex);
        else if(sortType === 'az') list.sort((a,b) => a.tytul.localeCompare(b.tytul, 'pl'));
        else if(sortType === 'za') list.sort((a,b) => b.tytul.localeCompare(a.tytul, 'pl'));

        const g = document.createElement('div'); g.className = (displayMode === 'grid') ? 'grid' : 'list-container';
        
        let lastChar = "";
        list.forEach(s => {
            const isSel = cart.some(x => x.tytul === s.tytul);
            const jsTytul = s.tytul.replace(/'/g, "\\'");
            const firstChar = s.tytul.charAt(0).toUpperCase();

            // Dodaj nagłówek litery na liście, jeśli się zmienia (tylko w trybie listy bez konkretnego filtra litery)
            if(displayMode === 'list' && !alphaFilter && firstChar !== lastChar) {
                const h = document.createElement('div'); h.className = 'alpha-header'; h.innerText = firstChar;
                g.appendChild(h); lastChar = firstChar;
            }

            const item = document.createElement('div');
            if(displayMode === 'grid') {
                item.className = 'card';
                item.innerHTML = `<div class="thumb-container" onclick="playSong('${s.yt}')"><img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb"><div class="play-overlay">POSŁUCHAJ<span>TUTAJ</span></div></div><div class="card-title">${s.tytul}</div><button class="btn-add ${isSel ? 'selected' : ''}" onclick="toggleSong('${jsTytul}')">${isSel ? 'USUŃ' : 'DODAJ'}</button>`;
            } else {
                item.className = 'list-item';
                item.innerHTML = `<span class="list-title" onclick="playSong('${s.yt}')">${s.tytul}</span><button class="btn-add btn-list-add ${isSel ? 'selected' : ''}" onclick="toggleSong('${jsTytul}')">${isSel ? 'USUŃ' : 'DODAJ'}</button>`;
            }
            g.appendChild(item);
        });
        out.appendChild(g);
    }

    function renderCart(container) {
        if(cart.length === 0) { container.innerHTML = `<div style="padding:50px; text-align:center;"><h3>Lista jest pusta</h3><button class="btn-add" onclick="setView('all')">Wróć do katalogu</button></div>`; return; }
        let groups = {1: []}, curCD = 1, curSec = 0;
        cart.forEach(s => {
            let p = s.czas.split(':'); let sCount = (parseInt(p[0])||0)*60 + (parseInt(p[1])||0);
            if(curSec + sCount > 3900) { curCD++; curSec = sCount; groups[curCD] = [s]; }
            else { curSec += sCount; groups[curCD].push(s); }
        });
        Object.keys(groups).forEach(n => {
            let totalS = 0; groups[n].forEach(s => { let p = s.czas.split(':'); totalS += (parseInt(p[0])||0)*60 + (parseInt(p[1])||0); });
            let proc = Math.min((totalS / 3900) * 100, 100);
            const box = document.createElement('div'); box.className = 'cd-box';
            box.innerHTML = `<h2>PŁYTA NR ${n}</h2><p>Czas: ${Math.floor(totalS/60)} min / 65 min</p><div class="cd-progress-container"><div class="cd-progress-bar" style="width:${proc}%"></div></div><div class="grid"></div>`;
            const g = box.querySelector('.grid');
            groups[n].forEach(s => { g.innerHTML += `<div class="card"><div class="card-title">${s.tytul}</div><button class="btn-add selected" onclick="toggleSong('${s.tytul.replace(/'/g, "\\'")}')">USUŃ</button></div>`; });
            container.appendChild(box);
        });
    }

    function setMode(m) { displayMode = m; render(); }
    function setSort(s) { sortType = s; render(); }
    function setView(v) { currentView = v; alphaFilter = ""; render(); window.scrollTo(0,0); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    init();
</script>
</body>
</html>
