<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodia Wiary - Katalog</title>
    <style>
        body { background: #050505; color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #d4af37; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { border-color: #d4af37; transform: translateY(-5px); }
        .thumb { width: 100%; aspect-ratio: 16/9; cursor: pointer; object-fit: cover; border-radius: 8px; }
        .cat-tag { align-self: flex-start; background: #d4af37; color: black; font-size: 10px; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; margin: 12px 0 8px 0; }
        .title { font-weight: bold; font-size: 15px; margin-bottom: 15px; min-height: 40px; }
        .btn-add { background: none; border: 1px solid #d4af37; color: #d4af37; padding: 10px; width: 100%; cursor: pointer; border-radius: 6px; font-weight: bold; margin-top: auto; }
        .btn-add:hover { background: #d4af37; color: black; }
        #cart-counter { position: fixed; bottom: 20px; right: 20px; background: #d4af37; color: black; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 100; }
        #status { text-align: center; color: #888; margin-top: 50px; }
    </style>
</head>
<body>

<div id="cart-counter" onclick="sendOrder()">Wybrano: 0 (Poproś o płyty)</div>
<h1>MELODIA WIARY - KATALOG</h1>

<div class="grid" id="catalog"></div>
<div id="status">Ładowanie piosenek...</div>

<script>
    // TWOJE DANE
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv'; 

    let cart = [];

    async function loadSongs() {
        const container = document.getElementById('catalog');
        const status = document.getElementById('status');
        
        try {
            const response = await fetch(SHEET_URL + '&cache_bust=' + Date.now());
            const data = await response.text();
            
            // Rozdzielamy na wiersze
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "");
            
            // Sprawdzamy czy mamy dane (pomijamy nagłówek)
            if (rows.length <= 1) {
                status.innerHTML = "Arkusz połączony, ale nie widzę w nim piosenek.<br>Upewnij się, że w Arkuszu Google dane są w wierszach 2, 3, 4...";
                return;
            }

            status.style.display = 'none';
            container.innerHTML = '';

            // Przechodzimy przez wiersze od drugiego (index 1)
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                
                // PRÓBA ROZPOZNANIA SEPARATORA (Średnik lub Przecinek)
                let cols = [];
                if (row.includes(';')) {
                    cols = row.split(';');
                } else {
                    cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                }
                
                if (cols.length >= 3) {
                    const tytul = cols[0].replace(/"/g, '').trim();
                    const kategoria = cols[1].replace(/"/g, '').trim();
                    const idYT = cols[2].replace(/"/g, '').trim();
                    
                    if (idYT.length > 5) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img class="thumb" src="https://img.youtube.com/vi/${idYT}/mqdefault.jpg" onclick="window.open('https://youtube.com/watch?v=${idYT}')">
                            <span class="cat-tag">${kategoria}</span>
                            <div class="title">${tytul}</div>
                            <button class="btn-add" onclick="addToCart('${tytul.replace(/'/g, "\\'")}')">Dodaj do zestawu</button>
                        `;
                        container.appendChild(card);
                    }
                }
            }
            
            if (container.innerHTML === '') {
                status.innerHTML = "Błąd odczytu danych. Sprawdź czy ID YouTube w Arkuszu jest poprawne.";
                status.style.display = 'block';
            }

        } catch (e) {
            status.innerText = 'Błąd połączenia. Spróbuj odświeżyć stronę za chwilę.';
        }
    }

    function addToCart(title) {
        cart.push(title);
        document.getElementById('cart-counter').innerText = `Wybrano: ${cart.length} (Poproś o płyty)`;
    }

    function sendOrder() {
        if(cart.length === 0) return alert("Najpierw dodaj piosenki do zestawu!");
        const lista = cart.join("%0D%0A- ");
        const mailto = `mailto:TWOJ_MAIL@GMAIL.COM?subject=Zamówienie płyt - Melodia Wiary&body=Dzień dobry,%0D%0A%0D%0AChciałbym zamówić płyty z utworami:%0D%0A- ${lista}`;
        window.location.href = mailto;
    }

    loadSongs();
</script>
</body>
</html>
