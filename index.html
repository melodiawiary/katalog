<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v36</title>
    <style>
        :root { 
            --active-orange: #fbda80; 
            --bg: #f4f9f8; 
            --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; 
            --deep-brown: #3b2a00; 
            --sidebar-width: 240px; 
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
        .sidebar-top { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--active-orange); margin-bottom: 15px; }
        
        /* MOJE ULUBIONE - CZYTELNY LICZNIK */
        .nav-btn.fav-btn { 
            background: #fff1f1; border: 1px solid #ffb3b3; margin-bottom: 15px;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 15px 10px; min-height: 80px; width: 100%; border-radius: 12px; cursor: pointer;
        }
        .fav-label, .fav-count-label { font-size: 1em; font-weight: 900; color: var(--deep-brown); text-transform: uppercase; display: block; }

        /* ODDZIELNE PRZYCISKI ROZMIARU */
        .size-btn { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; 
            border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 900; 
            font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); text-transform: uppercase;
        }
        .size-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown) !important; }

        .nav-btn { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 900; background: var(--soft-cyan); text-align: left; font-size: var(--f-btn); text-transform: uppercase; }
        .nav-btn:hover, .nav-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown); }

        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width); flex: 1; }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); padding: 20px 25px; }
        .search-box { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: 900; text-align: center; background: var(--card-bg); margin-bottom: 15px; }
        
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 0 25px 100px 25px; }
        .card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.08); padding: 12px; border-radius: 15px; text-align: center; position: relative; transition: 0.2s; cursor: pointer; }
        .card:hover { border: 2px solid var(--deep-brown); transform: translateY(-3px); }
        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .heart-btn { font-size: 26px; border: none; background: none; cursor: pointer; position: absolute; top: 15px; right: 15px; z-index: 10; }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/110?text=LOGO'">
        <div class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            <span class="fav-label">❤️ MOJE ULUBIONE</span>
            <span class="fav-count-label">(<span id="count">0</span> UTWORÓW)</span>
        </div>
        <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
        <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
    </div>
    <div class="sidebar-scroll">
        <button class="nav-btn" id="cat-all" onclick="setView('all')">WSZYSTKIE PIEŚNI</button>
        <div id="cat-list"></div>
    </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <input type="text" id="search" class="search-box" placeholder="SZUKAJ I ZARABIAJ - KLIKNIJ W PIEŚŃ, BY OTWORZYĆ NA YT..." onkeyup="doSearch()">
    </div>
    <div id="main-display" class="items-grid"></div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    let songs = [], cart = [], currentView = 'all', query = "";

    function updateSize(s) { 
        document.body.className = s; 
        document.getElementById('s-std').classList.toggle('active', s==='standard'); 
        document.getElementById('s-big').classList.toggle('active', s==='senior'); 
    }

    // KLUCZOWA ZMIANA: Otwieranie w nowej karcie zamiast ramki
    function goToYouTube(ytId) {
        window.open(`https://www.youtube.com/watch?v=${ytId}`, '_blank');
    }

    async function init() {
        try {
            const r = await fetch(CSV + '&cb=' + Date.now());
            const text = await r.text();
            const rows = text.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            let catsSet = new Set();
            songs = rows.map((line, index) => {
                const cols = line.split(','); // Prosty split dla przykładu
                let cats = (cols[1] || "Inne").split(';').map(c => c.trim());
                cats.forEach(c => catsSet.add(c));
                return { tytul: cols[0], kategorie: cats, yt: cols[2] };
            });
            const catBox = document.getElementById('cat-list');
            Array.from(catsSet).sort().forEach(cat => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = cat;
                b.onclick = () => setView(cat); catBox.appendChild(b);
            });
            render();
        } catch(e) { console.error(e); }
    }

    function toggleFav(e, t) {
        e.stopPropagation();
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else { const s = songs.find(x => x.tytul === t); if(s) cart.push(s); }
        render();
    }

    function render() {
        const out = document.getElementById('main-display'); out.innerHTML = '';
        document.getElementById('count').innerText = cart.length;
        let list = (currentView === 'cart') ? [...cart] : (currentView === 'all' ? [...songs] : songs.filter(s => s.kategorie.includes(currentView)));
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));

        list.forEach(s => {
            const item = document.createElement('div');
            item.className = 'card';
            item.onclick = () => goToYouTube(s.yt);
            const isFav = cart.some(x => x.tytul === s.tytul);
            item.innerHTML = `
                <button class="heart-btn" onclick="toggleFav(event, '${s.tytul}')">${isFav ? '❤️' : '🤍'}</button>
                <div class="thumb-container">
                    <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                </div>
                <div style="font-weight:900; text-transform:uppercase;">${s.tytul}</div>
            `;
            out.appendChild(item);
        });
    }

    function setView(v) { currentView = v; render(); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    init();
</script>
</body>
</html>
