<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodia Wiary - Katalog Utworów</title>
    <style>
        :root { --gold: #d4af37; --bg: #020617; --sidebar: #0f172a; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; }

        /* PANEL BOCZNY - Z DODANYM PRZEWIJANIEM */
        #sidebar { 
            width: 280px; background: var(--sidebar); border-right: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100;
            box-sizing: border-box;
            overflow-y: auto; /* To pozwala przewijać kategorie, gdy jest ich dużo */
        }
        
        /* Styl paska przewijania dla elegancji */
        #sidebar::-webkit-scrollbar { width: 5px; }
        #sidebar::-webkit-scrollbar-track { background: var(--sidebar); }
        #sidebar::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }

        .logo-img { width: 100%; height: auto; margin-bottom: 25px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); flex-shrink: 0; }
        
        .nav-group { margin-bottom: 25px; flex-shrink: 0; }
        .nav-label { font-size: 11px; text-transform: uppercase; color: #64748b; letter-spacing: 1px; margin-bottom: 10px; display: block; font-weight: bold; }
        
        /* PRZYCISKI W MENU - POWIĘKSZONE I WIELKIE LITERY */
        .nav-btn { 
            width: 100%; background: none; border: 1px solid transparent; color: #ccc; 
            text-align: left; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 6px; 
            font-size: 15px; /* Powiększona czcionka */
            text-transform: uppercase; /* Wszystkie duże litery */
            font-weight: 500;
        }
        .nav-btn:hover, .nav-btn.active { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); color: var(--gold); }
        .nav-btn.order-btn { background: var(--gold); color: black; font-weight: bold; margin-top: 8px; text-align: center; }

        /* TREŚĆ GŁÓWNA */
        #main-content { margin-left: 280px; flex: 1; padding: 30px; }
        
        .toolbar { 
            display: flex; flex-direction: column; align-items: center; 
            margin-bottom: 30px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
            padding-bottom: 20px; text-align: center;
        }
        .view-title { 
            color: var(--gold); text-transform: uppercase; letter-spacing: 3px; 
            margin: 0 0 15px 0; font-size: 22px; font-weight: bold; 
        }
        
        /* WYSZUKIWARKA */
        .search-container { margin-bottom: 15px; width: 100%; max-width: 450px; position: relative; }
        .search-input { 
            width: 100%; padding: 14px 45px 14px 20px; border-radius: 30px; 
            border: 1px solid var(--gold); background: #1e293b; color: white; 
            outline: none; font-size: 16px; box-sizing: border-box;
        }
        .search-icon { position: absolute; right: 20px; top: 14px; color: var(--gold); pointer-events: none; font-size: 18px; }

        #sort-box { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .sort-select { 
            background: #1e293b; color: #eee; border: 1px solid var(--gold); 
            padding: 8px; border-radius: 6px; cursor: pointer; outline: none; font-size: 12px;
        }

        /* SIATKA UTWORÓW */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        
        .thumb { 
            width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; cursor: pointer; 
            border: 2px solid rgba(212, 175, 55, 0.3); transition: 0.3s;
        }
        .card:hover .thumb { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }

        .title { 
            font-weight: bold; font-size: 16px; 
            margin: 15px 0; min-height: 45px; color: #fff; line-height: 1.3; 
            text-transform: uppercase; 
            text-align: center;
        }
        
        .btn-action { width: 100%; padding: 12px; border-radius: 6px; border: 2px solid var(--gold); background: none; color: var(--gold); cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: auto; text-transform: uppercase; font-size: 14px; }
        .btn-action:hover { background: var(--gold); color: black; }
        .btn-remove { border-color: #ef4444; color: #ef4444; }
        .btn-remove:hover { background: #ef4444; color: white; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--gold); padding: 15px; }
            #main-content { margin-left: 0; padding: 15px; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <img src="https://lh3.googleusercontent.com/u/0/d/1lGrhzfxzTIAlH2iaHahCjWAZYuqxknP7" alt="Melodia Wiary" class="logo-img">
    <div class="nav-group">
        <span class="nav-label">Menu główne</span>
        <button class="nav-btn active" id="btn-all" onclick="showView('all')">🏠 WSZYSTKIE UTWORY</button>
        <button class="nav-btn" id="btn-my-list" onclick="showView('cart')">⭐ MÓJ WYBÓR (<span id="count">0</span>)</button>
    </div>
    <div class="nav-group">
        <span class="nav-label">Kategorie</span>
        <div id="category-list"></div>
    </div>
    <div id="order-section" style="display:none; margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(212, 175, 55, 0.2); flex-shrink: 0;">
        <button class="nav-btn order-btn" onclick="copyToClipboard()">📋 SKOPIUJ LISTĘ</button>
        <button class="nav-btn order-btn" style="background:#eee;" onclick="sendOrder()">✉ WYŚLIJ E-MAIL</button>
    </div>
</div>

<div id="main-content">
    <div class="toolbar">
        <h1 id="view-name" class="view-title">Wszystkie Utwory</h1>
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Szukaj piosenki (wpisz tytuł)..." onkeyup="handleSearch()">
            <span class="search-icon">🔍</span>
        </div>
        <div id="sort-box">
            <label style="font-size: 11px; color: #64748b;">SORTOWANIE:</label>
            <select class="sort-select" onchange="changeSort(this.value)">
                <option value="newest">Najnowsze na górze</option>
                <option value="oldest">Najstarsze na górze</option>
                <option value="az">Alfabetycznie A-Z</option>
                <option value="za">Alfabetycznie Z-A</option>
            </select>
        </div>
    </div>
    <div id="catalog-grid" class="grid"></div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv'; 
    let rawSongs = []; let sortedSongs = []; let cart = []; let currentView = 'all'; let currentSort = 'newest'; let searchQuery = "";

    function loadCart() { const saved = localStorage.getItem('melodiaWiaryCart'); if (saved) { cart = JSON.parse(saved); document.getElementById('count').innerText = cart.length; } }
    function saveCart() { localStorage.setItem('melodiaWiaryCart', JSON.stringify(cart)); document.getElementById('count').innerText = cart.length; }

    async function loadData() {
        loadCart();
        try {
            const resp = await fetch(SHEET_URL + '&cb=' + Date.now());
            const text = await resp.text();
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
            
            const catsSet = new Set();
            rawSongs = rows.map((r, index) => {
                let cols = r.includes(';') ? r.split(';') : r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let catString = cols[1] ? cols[1].replace(/"/g, '').trim() : "Inne";
                let categoriesArray = catString.split(',').map(item => item.trim());
                categoriesArray.forEach(c => { if(c) catsSet.add(c); });
                return { tytul: cols[0].replace(/"/g, '').trim(), kategorie: categoriesArray, idYT: cols[2] ? cols[2].replace(/"/g, '').trim() : "", order: index };
            });

            const catDiv = document.getElementById('category-list');
            Array.from(catsSet).sort().forEach(c => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = "• " + c;
                b.onclick = () => { currentView = c; updateNavStyles(b); render(); };
                catDiv.appendChild(b);
            });
            applySort();
        } catch (e) { document.getElementById('view-name').innerText = "Problem z połączeniem"; }
    }

    function handleSearch() { searchQuery = document.getElementById('search-input').value.toLowerCase(); render(); }
    function changeSort(val) { currentSort = val; applySort(); }
    
    function applySort() {
        sortedSongs = [...rawSongs];
        if (currentSort === 'newest') sortedSongs.sort((a, b) => b.order - a.order);
        if (currentSort === 'oldest') sortedSongs.sort((a, b) => a.order - b.order);
        if (currentSort === 'az') sortedSongs.sort((a, b) => a.tytul.localeCompare(b.tytul));
        if (currentSort === 'za') sortedSongs.sort((a, b) => b.tytul.localeCompare(a.tytul));
        render();
    }

    function render() {
        const grid = document.getElementById('catalog-grid'); const title = document.getElementById('view-name'); grid.innerHTML = '';
        const isCartView = currentView === 'cart';
        let displayList = [];

        if (currentView === 'all') { displayList = sortedSongs; title.innerText = "Wszystkie Utwory"; } 
        else if (isCartView) { displayList = cart; title.innerText = "Twój Wybór"; } 
        else { displayList = sortedSongs.filter(s => s.kategorie.includes(currentView)); title.innerText = currentView; }

        if (searchQuery !== "" && !isCartView) { displayList = displayList.filter(s => s.tytul.toLowerCase().includes(searchQuery)); }

        document.getElementById('order-section').style.display = (isCartView && cart.length > 0) ? 'block' : 'none';
        document.getElementById('sort-box').style.visibility = isCartView ? 'hidden' : 'visible';

        displayList.forEach((s, idx) => {
            if(!s.idYT) return;
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `<img class="thumb" src="https://img.youtube.com/vi/${s.idYT}/mqdefault.jpg" onclick="window.open('https://youtube.com/watch?v=${s.idYT}')"><div class="title">${s.tytul}</div>
                ${isCartView ? `<button class="btn-action btn-remove" onclick="removeFromCart(${idx})">USUŃ</button>` : `<button class="btn-action" onclick="addToCart('${s.tytul.replace(/'/g, "\\'")}')">DODAJ DO MOJEJ LISTY</button>`}`;
            grid.appendChild(card);
        });
        if(displayList.length === 0) grid.innerHTML = `<p style='padding:20px; color:#64748b;'>Nie znaleziono takich utworów.</p>`;
    }

    function addToCart(title) { 
        const song = rawSongs.find(s => s.tytul === title); 
        if(song) { 
            if(cart.find(item => item.tytul === title)) return alert("Ta pieśń jest już na liście!"); 
            cart.push(song); saveCart(); alert("Dodano pomyślnie!"); 
        } 
    }
    function removeFromCart(index) { cart.splice(index, 1); saveCart(); render(); }
    function showView(view) { currentView = view; const btnId = view === 'all' ? 'btn-all' : 'btn-my-list'; updateNavStyles(document.getElementById(btnId)); render(); }
    function updateNavStyles(activeBtn) { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); if(activeBtn) activeBtn.classList.add('active'); }
    function copyToClipboard() { navigator.clipboard.writeText("Lista utworów:\n- " + cart.map(s => s.tytul).join("\n- ")).then(() => alert("Skopiowano listę!")); }
    function sendOrder() { window.location.href = `mailto:melodiawiary@gmail.com?subject=Zestaw Pieśni&body=Przesyłam listę:\n- ${cart.map(s => s.tytul).join("\n- ")}`; }
    loadData();
</script>
</body>
</html>
