<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodia Wiary - Panel Katalogu</title>
    <style>
        :root { --gold: #d4af37; --bg: #020617; --sidebar: #0f172a; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; }

        /* BOCZNY PANEL */
        #sidebar { 
            width: 280px; background: var(--sidebar); border-right: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; 
        }
        .logo-img { width: 100%; height: auto; margin-bottom: 30px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
        
        .nav-group { margin-bottom: 25px; }
        .nav-label { font-size: 11px; text-transform: uppercase; color: #64748b; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .nav-btn { 
            width: 100%; background: none; border: 1px solid transparent; color: #eee; 
            text-align: left; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 5px; 
        }
        .nav-btn:hover, .nav-btn.active { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); color: var(--gold); }
        .nav-btn.order-btn { background: var(--gold); color: black; font-weight: bold; margin-top: 10px; text-align: center; }

        /* GŁÓWNA TREŚĆ */
        #main-content { margin-left: 280px; flex: 1; padding: 40px; }
        .view-title { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .title { font-weight: bold; font-size: 14px; margin: 10px 0; min-height: 40px; }
        
        /* PRZYCISKI AKCJI */
        .btn-action { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--gold); background: none; color: var(--gold); cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-action:hover { background: var(--gold); color: black; }
        .btn-remove { border-color: #ef4444; color: #ef4444; margin-top: 10px; }
        .btn-remove:hover { background: #ef4444; color: white; }

        /* MOBILNOŚĆ */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--gold); }
            #main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <img src="https://lh3.googleusercontent.com/u/0/d/1lGrhzfxzTIAlH2iaHahCjWAZYuqxknP7" alt="Logo" class="logo-img">
    
    <div class="nav-group">
        <span class="nav-label">Katalog</span>
        <button class="nav-btn active" id="btn-all" onclick="showView('all')">🏠 Wszystkie Utwory</button>
        <button class="nav-btn" id="btn-my-list" onclick="showView('cart')">⭐ Mój Wybór (<span id="count">0</span>)</button>
    </div>

    <div class="nav-group">
        <span class="nav-label">Kategorie</span>
        <div id="category-list"></div>
    </div>

    <div id="order-section" style="display:none; margin-top: auto;">
        <button class="nav-btn order-btn" onclick="copyToClipboard()">📋 Skopiuj Zamówienie</button>
        <button class="nav-btn order-btn" style="background:#eee;" onclick="sendOrder()">✉ Wyślij e-mail</button>
    </div>
</div>

<div id="main-content">
    <h1 id="view-name" class="view-title">Wszystkie Utwory</h1>
    <div id="catalog-grid" class="grid"></div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv'; 
    let allSongs = [];
    let cart = [];
    let currentView = 'all';

    // 1. WCZYTYWANIE ZAPISANEJ LISTY PRZY STARCIE
    function loadCartFromStorage() {
        const saved = localStorage.getItem('melodiaWiaryCart');
        if (saved) {
            cart = JSON.parse(saved);
            document.getElementById('count').innerText = cart.length;
        }
    }

    // 2. ZAPISYWANIE LISTY PRZY KAŻDEJ ZMIANIE
    function saveCartToStorage() {
        localStorage.setItem('melodiaWiaryCart', JSON.stringify(cart));
        document.getElementById('count').innerText = cart.length;
    }

    async function loadData() {
        loadCartFromStorage(); // Ładujemy starą listę
        try {
            const resp = await fetch(SHEET_URL + '&cb=' + Date.now());
            const text = await resp.text();
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
            
            const cats = new Set();
            allSongs = rows.map(r => {
                let cols = r.includes(';') ? r.split(';') : r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const s = { tytul: cols[0].replace(/"/g, '').trim(), kategoria: cols[1].replace(/"/g, '').trim(), idYT: cols[2].replace(/"/g, '').trim() };
                if(s.kategoria) cats.add(s.kategoria);
                return s;
            });

            const catDiv = document.getElementById('category-list');
            cats.forEach(c => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = "• " + c;
                b.onclick = () => { currentView = c; render(); updateNavStyles(b); };
                catDiv.appendChild(b);
            });
            render();
        } catch (e) { document.getElementById('view-name').innerText = "Błąd połączenia"; }
    }

    function render() {
        const grid = document.getElementById('catalog-grid');
        const title = document.getElementById('view-name');
        grid.innerHTML = '';
        
        let displayList = [];
        if (currentView === 'all') {
            displayList = allSongs;
            title.innerText = "Wszystkie Utwory";
        } else if (currentView === 'cart') {
            displayList = cart;
            title.innerText = "Twoje Zamówienie";
            document.getElementById('order-section').style.display = cart.length > 0 ? 'block' : 'none';
        } else {
            displayList = allSongs.filter(s => s.kategoria === currentView);
            title.innerText = "Kategoria: " + currentView;
        }

        displayList.forEach((s, idx) => {
            const card = document.createElement('div'); card.className = 'card';
            const isCart = currentView === 'cart';
            card.innerHTML = `
                <img class="thumb" src="https://img.youtube.com/vi/${s.idYT}/mqdefault.jpg" onclick="window.open('https://youtube.com/watch?v=${s.idYT}')">
                <div class="title">${s.tytul}</div>
                ${isCart ? `<button class="btn-action btn-remove" onclick="removeFromCart(${idx})">USUŃ Z LISTY</button>` 
                         : `<button class="btn-action" onclick="addToCart('${s.tytul.replace(/'/g, "\\'")}')">DODAJ DO ZAMÓWIENIA</button>`}
            `;
            grid.appendChild(card);
        });
        if(displayList.length === 0) grid.innerHTML = "<p style='padding:20px;'>Twoja lista jest pusta. Dodaj coś z katalogu!</p>";
    }

    function addToCart(title) {
        const song = allSongs.find(s => s.tytul === title);
        if(song) {
            cart.push(song);
            saveCartToStorage(); // Zapisujemy trwałe
            alert("Dodano do Twojej listy!");
        }
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        saveCartToStorage(); // Aktualizujemy zapis
        render();
    }

    function showView(view) {
        currentView = view;
        const btnId = view === 'all' ? 'btn-all' : 'btn-my-list';
        updateNavStyles(document.getElementById(btnId));
        render();
    }

    function updateNavStyles(activeBtn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(activeBtn) activeBtn.classList.add('active');
    }

    function copyToClipboard() {
        const text = "Zamówienie Melodia Wiary:\n- " + cart.map(s => s.tytul).join("\n- ");
        navigator.clipboard.writeText(text).then(() => alert("Lista skopiowana! Możesz ją teraz wkleić w wiadomości."));
    }

    function sendOrder() {
        const mailto = `mailto:TWOJ_MAIL@GMAIL.COM?subject=Zamówienie&body=Zamawiam:\n- ${cart.map(s => s.tytul).join("\n- ")}`;
        window.location.href = mailto;
    }

    loadData();
</script>
</body>
</html>
