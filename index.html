<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v39 (Lista Przebojów)</title>
    <style>
        :root { 
            --active-orange: #fbda80;
            --bg: #f4f9f8; 
            --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; 
            --deep-brown: #3b2a00; 
            --sidebar-width: 220px;
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        /* SIDEBAR (BEZ ZMIAN) */
        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
        .sidebar-top { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 15px; }
        
        .nav-btn, .size-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 900; text-align: left; text-transform: uppercase; font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); transition: 0.2s; box-sizing: border-box; }
        .nav-btn.active, .size-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown) !important; }
        .nav-btn.fav-btn { background: #fff1f1; border-color: #ffb3b3; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 70px; }

        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); width: 100%; padding: 20px 25px 15px 25px; box-sizing: border-box; border-bottom: 2px solid var(--active-orange); }
        
        /* NOWA STRUKTURA GÓRY: WYSZUKIWARKA + LISTA PRZEBOJÓW */
        .top-layout { display: flex; gap: 25px; align-items: stretch; }
        .search-section { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        
        /* PANEL LISTY PRZEBOJÓW (ZAMIAST ODTWARZACZA) */
        #chart-panel { width: 450px; background: var(--card-bg); border: 3px solid var(--active-orange); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
        .chart-header { background: var(--active-orange); padding: 8px; font-weight: 900; text-align: center; text-transform: uppercase; font-size: 0.9em; border-bottom: 2px solid var(--deep-brown); }
        .chart-list { height: 180px; overflow-y: auto; padding: 5px; }
        .chart-item { display: flex; align-items: center; gap: 10px; padding: 6px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .chart-item:hover { background: var(--soft-cyan); }
        .chart-rank { font-weight: 900; color: var(--active-orange); -webkit-text-stroke: 1px var(--deep-brown); font-size: 1.2em; min-width: 25px; text-align: center; }
        .chart-thumb { width: 60px; aspect-ratio: 16/9; border-radius: 4px; border: 1px solid var(--deep-brown); }
        .chart-title { font-size: 11px; font-weight: 900; text-transform: uppercase; }

        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 3px solid var(--deep-brown); font-size: var(--f-search); font-weight: 900; text-align: center; background: var(--card-bg); }
        .btn-group { display: flex; gap: 5px; }
        .ctrl-btn { flex: 1; padding: 10px 4px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 900; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: 10px; }
        .ctrl-btn.active { background: var(--active-orange) !important; border: 2px solid var(--deep-brown); }

        /* GRID Z PIEŚNIAMI */
        .view-title-header { background: var(--soft-cyan); padding: 15px 25px; font-weight: 900; text-transform: uppercase; font-size: 1.5em; border-bottom: 5px solid var(--active-orange); }
        #main-display { padding: 0 25px 400px 25px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); border: 2px solid rgba(0,0,0,0.08); padding: 12px; border-radius: 15px; text-align: center; position: relative; transition: 0.2s; cursor: pointer; }
        .card:hover { border: 2px solid var(--deep-brown); transform: translateY(-3px); }
        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05); }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .heart-btn { font-size: 26px; border: none; background: none; cursor: pointer; position: absolute; top: 15px; right: 15px; z-index: 10; }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/120?text=LOGO'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            <span class="fav-label">❤️ MOJE ULUBIONE</span>
            <span id="count" style="font-weight:900;">(0)</span>
        </button>
        <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
        <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
    </div>
    <div class="sidebar-scroll" id="cat-list">
        <button class="nav-btn" id="cat-all" onclick="setView('all')">WSZYSTKIE PIEŚNI</button>
    </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-layout">
            <div class="search-section">
                <input type="text" id="search" class="search-box" placeholder="SZUKAJ W KATALOGU..." onkeyup="doSearch()">
                <div class="btn-group">
                    <button class="ctrl-btn active" id="s-new" onclick="setSort('newest')">Najnowsze</button>
                    <button class="ctrl-btn" id="s-az" onclick="setSort('az')">A - Z</button>
                    <button class="ctrl-btn" id="m-grid" onclick="setMode('grid')">Kwadraty</button>
                    <button class="ctrl-btn" id="m-list" onclick="setMode('list')">Lista</button>
                </div>
            </div>

            <div id="chart-panel">
                <div class="chart-header">🏆 TOP 10 TYGODNIA (POLSKA)</div>
                <div class="chart-list" id="chart-items">
                    </div>
            </div>
        </div>
    </div>

    <div id="main-display"></div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    const STORAGE_KEY = 'melodia_wiary_permanent_storage';
    let songs = [], cart = [], currentView = 'all', query = "";

    // EDYTUJ TĘ LISTĘ, ABY ZMIENIĆ HITY TYGODNIA
    const top10 = [
        { tytul: "Kłaniam się Tobie", yt: "K0S1jD3H7wA" },
        { tytul: "Mój Mistrzu", yt: "L0L9bA7vK1" },
        { tytul: "Bądź blisko mnie", yt: "X9zP1_Ww4" },
        { tytul: "Golgota", yt: "dQw4w9WgXcQ" }
    ];

    function openYT(id) { window.open(`https://www.youtube.com/watch?v=${id}`, '_blank'); }

    function updateSize(s) {
        document.body.className = s;
        document.getElementById('s-std').classList.toggle('active', s==='standard');
        document.getElementById('s-big').classList.toggle('active', s==='senior');
        localStorage.setItem('mv_font_permanent', s);
    }

    async function init() {
        let saved = localStorage.getItem(STORAGE_KEY);
        if(saved) cart = JSON.parse(saved);
        updateSize(localStorage.getItem('mv_font_permanent') || 'standard');

        // Render Top 10
        const chartBox = document.getElementById('chart-items');
        top10.forEach((h, i) => {
            const div = document.createElement('div');
            div.className = 'chart-item';
            div.onclick = () => openYT(h.yt);
            div.innerHTML = `<div class="chart-rank">${i+1}</div><img src="https://img.youtube.com/vi/${h.yt}/mqdefault.jpg" class="chart-thumb"><div class="chart-title">${h.tytul}</div>`;
            chartBox.appendChild(div);
        });

        try {
            const r = await fetch(CSV + '&cb=' + Date.now());
            const text = await r.text();
            const rows = text.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            let catsSet = new Set();
            songs = rows.map(line => {
                const cols = line.split(',');
                let cats = (cols[1] || "Inne").split(';').map(c => c.trim());
                cats.forEach(c => { if(c.length > 2) catsSet.add(c); });
                return { tytul: cols[0], kategorie: cats, yt: (cols[2]||"").trim() };
            });
            const catBox = document.getElementById('cat-list');
            Array.from(catsSet).sort().forEach(cat => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = cat;
                b.onclick = () => setView(cat); catBox.appendChild(b);
            });
            render();
        } catch(e) { console.error(e); }
    }

    function toggleFav(t) {
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else { const s = songs.find(x => x.tytul === t); if(s) cart.push(s); }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
        render();
    }

    function render() {
        const out = document.getElementById('main-display'); out.innerHTML = '';
        document.getElementById('count').innerText = cart.length;
        
        let list = (currentView === 'cart') ? [...cart] : (currentView === 'all' ? [...songs] : songs.filter(s => s.kategorie.includes(currentView)));
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));

        const header = document.createElement('div');
        header.className = 'view-title-header';
        header.innerText = currentView === 'all' ? 'WSZYSTKIE PIEŚNI' : (currentView === 'cart' ? '❤️ MOJE ULUBIONE' : '📂 ' + currentView);
        out.appendChild(header);

        const container = document.createElement('div');
        container.className = 'items-grid';
        list.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openYT(s.yt);
            const isFav = cart.some(x => x.tytul === s.tytul);
            card.innerHTML = `
                <button class="heart-btn" onclick="event.stopPropagation(); toggleFav('${s.tytul.replace(/'/g, "\\'")}')">${isFav ? '❤️' : '🤍'}</button>
                <div class="thumb-container"><img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb"></div>
                <div style="font-weight:900; text-transform:uppercase;">${s.tytul}</div>
            `;
            container.appendChild(card);
        });
        out.appendChild(container);
    }

    function setView(v) { currentView = v; render(); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    function setSort(s) { /* logika sortowania */ render(); }
    function setMode(m) { /* logika widoku */ render(); }
    init();
</script>
</body>
</html>
