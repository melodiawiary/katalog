<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Melodia Wiary - v33</title>

<style>
:root { 
    --active-orange: #fbda80; 
    --bg: #f4f9f8; 
    --card-bg: #f9fffe;
    --soft-cyan: #d2e9e6; 
    --deep-brown: #3b2a00; 
    --sidebar-width: 220px; 
}

body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI'; margin:0; display:flex; }

#sidebar { width: var(--sidebar-width); background: var(--card-bg); position:fixed; height:100vh; }
#main-content { margin-left: var(--sidebar-width); flex:1; }

.top-layout { display:flex; justify-content:center; }
.controls-area { width:100%; max-width:800px; }

.search-box { width:100%; padding:10px; border-radius:10px; }

.items-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; padding:20px; }
.card { background:#fff; padding:10px; border-radius:10px; cursor:pointer; }

</style>
</head>

<body>

<div id="sidebar">
    <button onclick="setView('cart')">❤️ ULUBIONE (<span id="count">0</span>)</button>
    <button onclick="setView('all')">WSZYSTKIE</button>
</div>

<div id="main-content">

<div class="top-layout">
    <div class="controls-area">
        <input id="search" class="search-box" onkeyup="doSearch()" placeholder="Szukaj...">
    </div>
</div>

<div id="main-display"></div>

</div>

<script>

const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';

let songs = [], cart = [], currentView='all', displayMode='grid', sortType='az', query="";

function playSong(id){
    window.open("https://www.youtube.com/watch?v="+id,'_blank');
}

async function init(){
    const r = await fetch(CSV);
    const t = await r.text();
    const rows = t.split("\n").slice(1);

    songs = rows.map((l,i)=>{
        let c=l.split(",");
        return {tytul:c[0], yt:c[2], originalIndex:i};
    });

    render();
}

function render(){
    const out=document.getElementById("main-display");
    out.innerHTML="";

    let list = currentView==='cart' ? cart : songs;

    if(sortType==='newest') list.sort((a,b)=>b.originalIndex-a.originalIndex);
    if(sortType==='az') list.sort((a,b)=>a.tytul.localeCompare(b.tytul));

    list.forEach(s=>{
        const d=document.createElement("div");
        d.className="card";
        d.innerText=s.tytul;
        d.onclick=()=>playSong(s.yt);
        out.appendChild(d);
    });
}

function doSearch(){
    query=document.getElementById("search").value.toLowerCase();
    render();
}

/* 🔥 TU JEST TWOJA JEDYNA ZMIANA */
function setView(v){ 
    currentView = v; 

    if (v === 'cart') {
        displayMode = 'grid';
        sortType = 'newest';
    }

    render(); 
}

function setSort(s){ sortType = s; render(); }

init();

</script>

</body>
</html>
