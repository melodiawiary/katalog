<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v37 Premium & Lista Przebojów</title>
    <style>
        :root { 
            --active-orange: #fbda80; 
            --bg: #f4f9f8; 
            --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; 
            --deep-brown: #3b2a00; 
            --sidebar-width: 240px; 
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 12px; --f-search: 1.1em; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; box-shadow: 2px 0 15px rgba(0,0,0,0.03); }
        .sidebar-top { padding: 15px 10px; text-align: center; border-bottom: 2px solid var(--active-orange); }
        .logo-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--active-orange); margin-bottom: 10px; }
        
        .nav-btn, .size-btn { 
            width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px; 
            border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 900; 
            text-align: left; text-transform: uppercase; font-size: var(--f-btn); 
            background: var(--soft-cyan); color: var(--deep-brown); transition: 0.2s; 
        }
        .nav-btn.active, .size-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown); }

        .fav-btn { background: #fff1f1 !important; border-color: #ffb3b3 !important; text-align: center !important; min-height: 70px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .fav-label { font-weight: 900; }

        /* MAIN CONTENT & TOP AREA */
        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
        .top-section { display: flex; gap: 20px; padding: 20px; background: var(--bg); position: sticky; top: 0; z-index: 900; align-items: flex-start; }
        
        #player-area { flex: 2; background: #000; aspect-ratio: 16/9; border: 4px solid var(--deep-brown); border-radius: 15px; overflow: hidden; position: relative; }
        
        /* LISTA PRZEBOJÓW - PRAWY PANEL */
        #top-chart { flex: 1; background: var(--card-bg); border: 3px solid var(--active-orange); border-radius: 15px; display: flex; flex-direction: column; height: auto; max-height: 450px; }
        .chart-header { background: var(--active-orange); padding: 10px; font-weight: 900; text-align: center; text-transform: uppercase; border-bottom: 3px solid var(--deep-brown); }
        .chart-list { overflow-y: auto; padding: 5px; }
        .chart-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; }
        .chart-item:hover { background: var(--soft-cyan); }
        .chart-rank { font-weight: 900; font-size: 1.2em; color: var(--active-orange); min-width: 25px; -webkit-text-stroke: 1px var(--deep-brown); }
        .chart-thumb { width: 70px; aspect-ratio: 16/9; border-radius: 5px; object-fit: cover; border: 1px solid var(--deep-brown); }
        .chart-info { font-size: 0.8em; font-weight: 800; text-transform: uppercase; line-height: 1.2; }

        /* SEARCH & GRID */
        .search-bar-container { padding: 0 20px 15px 20px; }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 3px solid var(--deep-brown); font-size: var(--f-search); font-weight: 900; text-align: center; background: var(--card-bg); }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card-bg); border: 2px solid rgba(0,0,0,0.08); padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { border: 2px solid var(--deep-brown); transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .card-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 8px; margin-bottom: 8px; }
        .card-title { font-weight: 900; text-transform: uppercase; font-size: 0.9em; }

        /* KOD DOSTĘPU DLA SUBÓW */
        .access-box { padding: 10px; margin-top: auto; border-top: 2px solid var(--active-orange); text-align: center; }
        .access-input { width: 90%; padding: 5px; border: 1px solid var(--deep-brown); border-radius: 5px; font-size: 10px; text-align: center; }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/100?text=LOGO'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            <span class="fav-label">❤️ MOJE ULUBIONE</span>
            <span id="count" style="font-weight:900;">(0 UTWORÓW)</span>
        </button>
        <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
        <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
    </div>
    <div class="sidebar-scroll">
        <button class="nav-btn" id="cat-all" onclick="setView('all')">WSZYSTKIE PIEŚNI</button>
        <div id="cat-list"></div>
    </div>
    <div class="access-box">
        <span style="font-size: 10px; font-weight: 900;">MASZ KOD SUBKRYBENTA?</span>
        <input type="password" id="sub-code" class="access-input" placeholder="WPISZ KOD" onkeyup="checkAccess()">
    </div>
</div>

<div id="main-content">
    <div class="top-section">
        <div id="player-area">
            <div id="yt-player" style="height:100%; display:flex; align-items:center; justify-content:center; color:white; font-weight:900; text-align:center; padding:20px;">
                WYBIERZ PIEŚŃ Z LISTY PONIŻEJ 🎶
            </div>
        </div>

        <div id="top-chart">
            <div class="chart-header">🏆 LISTA PRZEBOJÓW TYGODNIA</div>
            <div class="chart-list" id="chart-items">
                </div>
        </div>
    </div>

    <div class="search-bar-container">
        <input type="text" id="search" class="search-box" placeholder="SZUKAJ W KATALOGU..." onkeyup="doSearch()">
    </div>

    <div id="main-display" class="items-grid"></div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    let songs = [], cart = [], currentView = 'all', query = "", isPremium = false;

    // PRZYKŁADOWA LISTA PRZEBOJÓW (Możesz ją edytować lub pobierać z innego arkusza)
    const topHits = [
        { tytul: "Kłaniam się Tobie", yt: "K0S1jD3H7wA", rank: 1 },
        { tytul: "Golgota", yt: "dQw4w9WgXcQ", rank: 2 },
        { tytul: "Mój Mistrzu", yt: "L0L9bA7vK1", rank: 3 },
        { tytul: "Bądź blisko mnie", yt: "X9zP1_Ww4", rank: 4 }
    ];

    function checkAccess() {
        const code = document.getElementById('sub-code').value;
        if(code === "LUNA2026") { // Twoje hasło dla subskrybentów
            isPremium = true;
            document.getElementById('sub-code').style.background = "#d4edda";
            alert("TRYB SUBKRYBENTA AKTYWNY: Odtwarzanie na stronie odblokowane!");
        }
    }

    function handlePlay(ytId) {
        if(isPremium) {
            document.getElementById('yt-player').innerHTML = 
                `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${ytId}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            window.scrollTo({top: 0, behavior: 'smooth'});
        } else {
            // Otwiera YouTube w nowym oknie (karcie)
            window.open(`https://www.youtube.com/watch?v=${ytId}`, '_blank');
        }
    }

    function updateSize(s) { 
        document.body.className = s; 
        document.getElementById('s-std').classList.toggle('active', s==='standard'); 
        document.getElementById('s-big').classList.toggle('active', s==='senior'); 
    }

    async function init() {
        // Renderuj listę przebojów
        const chartBox = document.getElementById('chart-items');
        topHits.forEach(h => {
            const div = document.createElement('div');
            div.className = 'chart-item';
            div.onclick = () => handlePlay(h.yt);
            div.innerHTML = `
                <div class="chart-rank">${h.rank}</div>
                <img src="https://img.youtube.com/vi/${h.yt}/mqdefault.jpg" class="chart-thumb">
                <div class="chart-info">${h.tytul}</div>
            `;
            chartBox.appendChild(div);
        });

        try {
            const r = await fetch(CSV + '&cb=' + Date.now());
            const text = await r.text();
            const rows = text.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            songs = rows.map(line => {
                const cols = line.split(',');
                return { tytul: cols[0], kategorie: (cols[1]||"Inne").split(';'), yt: cols[2] };
            });
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        const out = document.getElementById('main-display'); out.innerHTML = '';
        let list = songs; // Tu możesz dodać filtrowanie kategorii
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));

        list.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => handlePlay(s.yt);
            card.innerHTML = `
                <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="card-thumb">
                <div class="card-title">${s.tytul}</div>
            `;
            out.appendChild(card);
        });
    }

    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    init();
</script>
</body>
</html>
