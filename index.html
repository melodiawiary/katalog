<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodia Wiary - Katalog i Koszyk</title>
    <style>
        :root { --gold: #d4af37; --bg: #020617; --sidebar: #0f172a; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; min-height: 100vh; }

        /* PANEL BOCZNY */
        #sidebar { 
            width: 280px; background: var(--sidebar); border-right: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000;
            box-sizing: border-box; overflow-y: auto;
        }
        .logo-img { width: 100%; height: auto; margin-bottom: 25px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
        .nav-btn { 
            width: 100%; background: none; border: 1px solid transparent; color: #ccc; 
            text-align: left; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; 
            font-size: 14px; text-transform: uppercase; font-weight: bold;
        }
        .nav-btn:hover, .nav-btn.active { background: rgba(212, 175, 55, 0.2); border-color: var(--gold); color: var(--gold); }

        /* GŁÓWNY OBSZAR */
        #main-content { margin-left: 280px; flex: 1; padding: 0 30px 30px 30px; }
        
        .toolbar { 
            position: sticky; top: 0; z-index: 900; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px 0; border-bottom: 1px solid rgba(212, 175, 55, 0.2); margin-bottom: 30px;
        }

        /* DUŻE PRZYCISKI WIDOKU */
        .view-switcher { display: flex; gap: 10px; margin-top: 15px; width: 100%; max-width: 600px; }
        .mode-btn { 
            flex: 1; padding: 12px; border: 2px solid var(--gold); background: #1e293b; color: var(--gold);
            font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 13px; text-transform: uppercase;
        }
        .mode-btn.active { background: var(--gold); color: black; }

        /* SEKCJE PŁYT W KOSZYKU */
        .cd-section { 
            background: rgba(255,255,255,0.03); border: 2px solid var(--gold); 
            border-radius: 15px; padding: 20px; margin-bottom: 40px;
        }
        .cd-header { display: flex; align-items: center; gap: 20px; border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 15px; margin-bottom: 20px; }
        .cd-icon-large { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold); }
        
        .order-counter { background: #0f172a; padding: 15px; border-radius: 10px; display: flex; align-items: center; gap: 20px; margin-top: 20px; }
        .qty-btn { width: 40px; height: 40px; border: 2px solid var(--gold); background: none; color: var(--gold); font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .qty-val { font-size: 24px; font-weight: bold; color: var(--gold); min-width: 40px; text-align: center; }

        /* MINIATURY I LISTA */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .list-style .card { flex-direction: row; align-items: center; padding: 10px; height: auto; }
        .list-style .thumb { width: 120px; margin-bottom: 0; margin-right: 15px; }
        
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; border: 1px solid rgba(212,175,55,0.3); }
        .title { font-weight: bold; font-size: 15px; margin: 10px 0; text-transform: uppercase; flex: 1; }

        .btn-add { padding: 12px; border: 2px solid var(--gold); background: none; color: var(--gold); cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 5px; }
        .btn-add:hover { background: var(--gold); color: black; }
        .btn-remove { border-color: #ff4444; color: #ff4444; font-size: 11px; padding: 5px; margin-top: 10px; }

        @media (max-width: 768px) { #sidebar { width: 100%; height: auto; position: relative; } #main-content { margin-left: 0; } }
    </style>
</head>
<body>

<div id="sidebar">
    <img src="https://lh3.googleusercontent.com/u/0/d/1lGrhzfxzTIAlH2iaHahCjWAZYuqxknP7" alt="Logo" class="logo-img">
    <div class="nav-group">
        <button class="nav-btn active" id="btn-all" onclick="showView('all')">WSZYSTKIE PIEŚNI</button>
        <button class="nav-btn" id="btn-cart" onclick="showView('cart')">MÓJ WYBÓR (<span id="count">0</span>)</button>
    </div>
    <div id="category-list"></div>
</div>

<div id="main-content">
    <div class="toolbar">
        <h1 id="view-name" style="color:var(--gold); text-transform:uppercase; margin:0;">Wszystkie Pieśni</h1>
        <input type="text" id="search-input" style="width: 100%; max-width: 500px; padding: 12px; margin-top: 15px; border-radius: 25px; border: 1px solid var(--gold); background: #1e293b; color: white;" placeholder="Wpisz tytuł pieśni..." onkeyup="handleSearch()">
        
        <div class="view-switcher">
            <button id="mode-grid" class="mode-btn active" onclick="setMode('grid')">MINIATURY PIEŚNI</button>
            <button id="mode-list" class="mode-btn" onclick="setMode('list')">LISTA PIEŚNI</button>
        </div>
    </div>

    <div id="catalog-container"></div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    const LOGO = 'https://lh3.googleusercontent.com/u/0/d/1lGrhzfxzTIAlH2iaHahCjWAZYuqxknP7';

    let rawData = []; let cart = []; let currentView = 'all'; let displayMode = 'grid'; let searchQuery = "";
    let cdQuantities = {}; // Przechowuje ilości dla każdej płyty

    function timeToSec(t) { if(!t || !t.includes(':')) return 0; const [m, s] = t.split(':').map(Number); return (m*60)+s; }

    async function load() {
        const saved = localStorage.getItem('mv_cart'); if(saved) cart = JSON.parse(saved);
        try {
            const r = await fetch(SHEET_URL + '&cb=' + Date.now());
            const txt = await r.text();
            const rows = txt.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            const cats = new Set();
            rawData = rows.map(line => {
                let c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let catsArr = (c[1]||"Inne").split(',').map(x => x.trim());
                catsArr.forEach(cat => cats.add(cat));
                return { tytul: c[0].replace(/"/g,''), kategorie: catsArr, yt: (c[2]||"").trim(), czas: (c[3]||"0:00").trim() };
            });
            const catDiv = document.getElementById('category-list');
            Array.from(cats).sort().forEach(cat => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = cat;
                b.onclick = () => { currentView = cat; render(); };
                catDiv.appendChild(b);
            });
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        const container = document.getElementById('catalog-container');
        container.innerHTML = '';
        document.getElementById('count').innerText = cart.length;

        if(currentView === 'cart') {
            renderCart(container);
        } else {
            let list = currentView === 'all' ? rawData : rawData.filter(s => s.kategorie.includes(currentView));
            if(searchQuery) list = list.filter(s => s.tytul.toLowerCase().includes(searchQuery));
            
            const grid = document.createElement('div');
            grid.className = displayMode === 'grid' ? 'grid' : 'grid list-style';
            list.forEach(s => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                        <div class="title">${s.tytul}</div>
                        <button class="btn-add" onclick="add('${s.tytul.replace(/'/g,"")}')">DODAJ DO LISTY</button>
                    </div>`;
            });
            container.appendChild(grid);
        }
    }

    function renderCart(container) {
        if(cart.length === 0) { container.innerHTML = "<h3>Twoja lista jest pusta. Dodaj pieśni, aby stworzyć płyty.</h3>"; return; }

        let currentCD = 1; let currentSec = 0; let cdGroups = { 1: [] };
        
        cart.forEach(s => {
            let sSec = timeToSec(s.czas);
            if(currentSec + sSec > 3900) { // 65 minut
                currentCD++; currentSec = sSec; cdGroups[currentCD] = [s];
            } else {
                currentSec += sSec; cdGroups[currentCD].push(s);
            }
        });

        Object.keys(cdGroups).forEach(num => {
            if(!cdQuantities[num]) cdQuantities[num] = 1;
            const sec = document.createElement('div');
            sec.className = 'cd-section';
            let songsHTML = cdGroups[num].map((s, idx) => `
                <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                    <span>${s.tytul} (${s.czas})</span>
                    <button class="btn-remove" onclick="removeGlobal('${s.tytul}')">USUŃ</button>
                </div>`).join('');

            sec.innerHTML = `
                <div class="cd-header">
                    <img src="${LOGO}" class="cd-icon-large">
                    <div>
                        <h2 style="margin:0; color:var(--gold);">PŁYTA NUMER ${num}</h2>
                        <small>Pojemność: ${Math.ceil(cdGroups[num].reduce((a,b)=>a+timeToSec(b.czas),0)/60)} / 65 min</small>
                    </div>
                </div>
                <div style="margin-bottom:20px;">${songsHTML}</div>
                <div class="order-counter">
                    <span style="font-weight:bold;">ILE SZTUK TEJ PŁYTY ZAMAWIASZ?</span>
                    <button class="qty-btn" onclick="updateQty(${num}, -1)">-</button>
                    <div class="qty-val" id="qty-${num}">${cdQuantities[num]}</div>
                    <button class="qty-btn" onclick="updateQty(${num}, 1)">+</button>
                </div>
            `;
            container.appendChild(sec);
        });

        container.innerHTML += `<button class="btn-add" style="width:100%; font-size:20px; padding:20px; background:var(--gold); color:black;" onclick="sendOrder()">✉ WYŚLIJ MOJE ZAMÓWIENIE</button>`;
    }

    function updateQty(num, delta) { 
        cdQuantities[num] = Math.max(1, (cdQuantities[num] || 1) + delta); 
        document.getElementById(`qty-${num}`).innerText = cdQuantities[num];
    }

    function add(t) { if(cart.find(x=>x.tytul===t)) return alert("Już jest!"); cart.push(rawData.find(x=>x.tytul===t)); save(); }
    function removeGlobal(t) { cart = cart.filter(x=>x.tytul!==t); save(); }
    function save() { localStorage.setItem('mv_cart', JSON.stringify(cart)); render(); }
    function setMode(m) { displayMode = m; document.getElementById('mode-grid').classList.toggle('active', m==='grid'); document.getElementById('mode-list').classList.toggle('active', m==='list'); render(); }
    function showView(v) { currentView = v; render(); }
    function handleSearch() { searchQuery = document.getElementById('search-input').value.toLowerCase(); render(); }
    function sendOrder() {
        let body = "ZAMÓWIENIE PŁYT:\n\n";
        // Logika maila...
        window.location.href = `mailto:melodiawiary@gmail.com?subject=Zamówienie&body=${encodeURIComponent(body)}`;
    }
    load();
</script>
</body>
</html>
