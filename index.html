<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - v51</title>
    <style>
        :root { 
            --active-orange: #fbda80; --bg: #f4f9f8; --card-bg: #f9fffe;
            --soft-cyan: #d2e9e6; --deep-brown: #3b2a00; --sidebar-width: 220px;
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; --f-card-title: 14px; --f-list-title: 1em; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; --f-card-title: 20px; --f-list-title: 1.4em; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
        .sidebar-top { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(59, 42, 0, 0.08); }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 15px; }
        
        .nav-btn, .size-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 800; text-align: left; text-transform: uppercase; font-size: var(--f-btn); background: var(--soft-cyan); color: var(--deep-brown); display: flex; align-items: center; gap: 8px; transition: 0.2s; box-sizing: border-box; }
        .nav-btn.active, .size-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown) !important; }
        .nav-btn.fav-btn { background: #fff1f1; border-color: #ffb3b3; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; min-height: 60px; }

        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); width: 100%; box-sizing: border-box; }
        .top-padding { padding: 20px 25px 15px 25px; }
        
        .search-box { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: bold; text-align: center; background: var(--card-bg); }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .ctrl-btn { flex: 1; padding: 12px 4px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 800; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: var(--f-ctrl); transition: 0.2s; }
        .ctrl-btn.active { background: var(--active-orange) !important; border: 2.5px solid var(--deep-brown); }

        .ad-placeholder { height: 80px; background: white; margin-top: 15px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #999; font-weight: bold; border-radius: 10px; }

        /* ALFABET */
        .alpha-shelf { border-top: 3px solid var(--active-orange); border-bottom: 3px solid var(--active-orange); background: var(--bg); padding: 10px 25px; display: none; }
        #alpha-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .alpha-btn { padding: 6px 12px; font-size: 14px; font-weight: 900; border: 1px solid var(--deep-brown); background: var(--soft-cyan); cursor: pointer; border-radius: 4px; }
        .alpha-btn.active { background: var(--active-orange) !important; border: 2px solid var(--deep-brown); }

        .view-title-header { background: var(--soft-cyan); color: var(--deep-brown); padding: 15px 25px; font-weight: 900; text-transform: uppercase; font-size: 1.5em; border-bottom: 5px solid var(--active-orange); border-top: 2px solid var(--active-orange); }
        #main-display { padding: 0 0 400px 0; }
        .display-padding { padding: 0 25px; }
        
        /* KARTY I WYRÓŻNIENIE ULUBIONYCH */
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.1); padding: 12px; border-radius: 15px; text-align: center; position: relative; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; }
        
        /* Styl dla piosenki, która JEST w ulubionych */
        .card.is-fav { border: 4px solid var(--active-orange); background: #fffcf0; box-shadow: 0 5px 15px rgba(251, 218, 128, 0.3); }

        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; margin-bottom: 10px; position: relative; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(251, 218, 128, 0.9); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; color: var(--deep-brown); font-weight: 900; text-transform: uppercase; padding: 10px; }
        .card:hover .play-overlay { opacity: 1; }

        .card-title { font-weight: 900; font-size: var(--f-card-title); text-transform: uppercase; margin-bottom: 8px; flex-grow: 1; }
        
        /* Przycisk pod tytułem */
        .fav-action-btn { background: #eee; border: 1px solid #ccc; padding: 6px; border-radius: 6px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .is-fav .fav-action-btn { background: var(--active-orange); border-color: var(--deep-brown); color: var(--deep-brown); }

        /* LISTA */
        .list-card { background: var(--card-bg); border: 2px solid rgba(59, 42, 0, 0.1); border-radius: 10px; padding: 10px 15px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .list-card.is-fav { border: 3px solid var(--active-orange); background: #fffcf0; }
        .list-title { font-weight: 800; font-size: var(--f-list-title); text-transform: uppercase; flex: 1; }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/120?text=LOGO'">
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">
            <span class="fav-label">❤️ MOJE ULUBIONE</span>
            <span id="count" style="font-weight:900;">0 UTWORÓW</span>
        </button>
        <div style="margin-top:10px; padding:5px; border: 1px solid var(--deep-brown); border-radius:10px;">
            <button class="size-btn" id="s-std" onclick="updateSize('standard')">LITERY ZWYKŁE</button>
            <button class="size-btn" id="s-big" onclick="updateSize('senior')">LITERY DUŻE</button>
        </div>
    </div>
    <div class="sidebar-scroll">
        <button class="nav-btn" id="cat-all" onclick="setView('all')">WSZYSTKIE PIEŚNI</button>
        <div id="cat-list"></div>
    </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-padding">
            <input type="text" id="search" class="search-box" placeholder="SZUKAJ PIEŚNI..." onkeyup="doSearch()">
            <div class="btn-group">
                <button class="ctrl-btn" id="s-new" onclick="setSort('newest')">OD NAJNOWSZYCH</button>
                <button class="ctrl-btn" id="s-old" onclick="setSort('oldest')">OD NAJSTARSZYCH</button>
                <button class="ctrl-btn" id="s-az" onclick="setSort('az')">A DO Z</button>
                <button class="ctrl-btn" id="s-za" onclick="setSort('za')">Z DO A</button>
            </div>
            <div class="btn-group">
                <button class="ctrl-btn" id="m-grid" onclick="setMode('grid')">WIDOK MINIATURY</button>
                <button class="ctrl-btn" id="m-list" onclick="setMode('list')">WIDOK LISTA</button>
            </div>
            <div class="ad-placeholder">MIEJSCE NA REKLAMĘ</div>
        </div>
        <div id="alpha-shelf" class="alpha-shelf"><div id="alpha-row"></div></div>
    </div>
    <div id="main-display"></div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    const STORAGE_KEY = 'melodia_wiary_v51_storage'; 
    let songs = [], cart = [], currentView = 'all', displayMode = 'grid', query = "", sortType = 'newest';

    function openYT(id) {
        const w = 800, h = 600;
        const l = (window.screen.width/2)-(w/2), t = (window.screen.height/2)-(h/2);
        window.open(`https://www.youtube.com/watch?v=${id}`, 'YT', `width=${w},height=${h},top=${t},left=${l}`);
    }

    function updateSize(s) { document.body.className = s; localStorage.setItem('mv_font', s); }

    async function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved) cart = JSON.parse(saved);
        updateSize(localStorage.getItem('mv_font') || 'standard');

        const alpha = "ABCDEFGHIJKLŁMNOPRSTUWZŻ".split("");
        const row = document.getElementById('alpha-row');
        alpha.forEach(l => {
            const b = document.createElement('button'); b.className = 'alpha-btn'; b.innerText = l;
            b.onclick = () => { sortType = 'az'; render(); /* scroll logic here */ };
            row.appendChild(b);
        });

        const r = await fetch(CSV + '&cb=' + Date.now());
        const text = await r.text();
        const rows = text.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
        let catsSet = new Set();
        songs = rows.map((line, index) => {
            const cols = line.split(","); 
            const cat = cols[1] || "Inne";
            catsSet.add(cat);
            return { tytul: cols[0], kategorie: [cat], yt: cols[2], originalIndex: index };
        });
        
        const catBox = document.getElementById('cat-list');
        Array.from(catsSet).sort().forEach(cat => {
            const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = cat; 
            b.onclick = () => setView(cat); catBox.appendChild(b);
        });
        render();
    }

    function toggleFav(tytul) {
        const idx = cart.findIndex(x => x.tytul === tytul);
        if(idx > -1) cart.splice(idx, 1);
        else { const s = songs.find(x => x.tytul === tytul); if(s) cart.push(s); }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
        render();
    }

    function render() {
        const out = document.getElementById('main-display'); out.innerHTML = '';
        document.getElementById('count').innerText = cart.length + " UTWORÓW";
        
        document.getElementById('alpha-shelf').style.display = (displayMode === 'list') ? 'block' : 'none';

        let list = (currentView === 'cart') ? [...cart] : (currentView === 'all' ? [...songs] : songs.filter(s => s.kategorie.includes(currentView)));
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));

        if(sortType === 'newest') list.sort((a,b) => b.originalIndex - a.originalIndex);
        else if(sortType === 'az') list.sort((a,b) => a.tytul.localeCompare(b.tytul, 'pl'));

        const header = document.createElement('div');
        header.className = 'view-title-header';
        header.innerText = currentView === 'all' ? 'WSZYSTKIE PIEŚNI' : (currentView === 'cart' ? '❤️ MOJE ULUBIONE' : currentView);
        out.appendChild(header);

        const container = document.createElement('div');
        container.className = 'display-padding items-grid';
        
        list.forEach(s => {
            const isFav = cart.some(x => x.tytul === s.tytul);
            const item = document.createElement('div');
            item.className = isFav ? 'card is-fav' : 'card';
            
            if(displayMode === 'grid') {
                item.onclick = () => openYT(s.yt);
                item.innerHTML = `
                    <div class="thumb-container">
                        <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                        <div class="play-overlay">KLIKNIJ, ABY OTWORZYĆ NA YOUTUBE 🎶</div>
                    </div>
                    <div class="card-title">${s.tytul}</div>
                    <button class="fav-action-btn" onclick="event.stopPropagation(); toggleFav('${s.tytul.replace(/'/g, "\\'")}')">
                        ${isFav ? '⭐ JEST W ULUBIONYCH' : '➕ DODAJ DO ULUBIONYCH'}
                    </button>
                `;
            } else {
                item.className = isFav ? 'list-card is-fav' : 'list-card';
                item.onclick = () => openYT(s.yt);
                item.innerHTML = `
                    <span class="list-title">${s.tytul}</span>
                    <button class="fav-action-btn" onclick="event.stopPropagation(); toggleFav('${s.tytul.replace(/'/g, "\\'")}')">
                        ${isFav ? '⭐ ULUBIONA' : 'DODAJ'}
                    </button>
                `;
            }
            container.appendChild(item);
        });
        out.appendChild(container);
    }

    // TWOJA KLUCZOWA FUNKCJA (v51)
    function setView(v) { 
        currentView = v; 
        if (v === 'cart') { 
            displayMode = 'grid'; 
            sortType = 'newest'; 
        }
        render(); 
        window.scrollTo(0,0);
    }

    function setMode(m) { displayMode = m; render(); }
    function setSort(s) { sortType = s; render(); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    init();
</script>
</body>
</html>
