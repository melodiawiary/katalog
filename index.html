<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodia Wiary - Prosty Konfigurator</title>
    <style>
        :root { --gold: #d4af37; --bg: #020617; --sidebar: #0f172a; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Arial', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: 22px; }

        /* PANEL BOCZNY - BARDZO WYRAŹNY */
        #sidebar { 
            width: 320px; background: var(--sidebar); border-right: 3px solid var(--gold); 
            padding: 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000;
            box-sizing: border-box; overflow-y: auto;
        }
        .logo-img { width: 100%; height: auto; margin-bottom: 30px; border-radius: 50%; border: 4px solid var(--gold); }
        .nav-btn { 
            width: 100%; background: #1e293b; border: 3px solid transparent; color: white; 
            text-align: left; padding: 20px; border-radius: 12px; cursor: pointer; margin-bottom: 10px; 
            font-size: 24px; font-weight: bold; text-transform: uppercase;
        }
        .nav-btn:hover, .nav-btn.active { border-color: var(--gold); background: var(--gold); color: black; }

        /* TREŚĆ GŁÓWNA */
        #main-content { margin-left: 320px; flex: 1; padding: 0 40px 40px 40px; }
        .toolbar { position: sticky; top: 0; z-index: 900; background: var(--bg); padding: 30px 0; border-bottom: 2px solid var(--gold); margin-bottom: 40px; }
        
        .view-title { color: var(--gold); font-size: 42px; margin: 0 0 20px 0; text-align: center; font-weight: 900; }
        .search-large { width: 100%; padding: 20px; font-size: 28px; border-radius: 40px; border: 4px solid var(--gold); background: #000; color: white; text-align: center; }

        /* ASYSTENT UKŁADANIA */
        .assistant-box { background: #1e293b; border: 5px solid var(--gold); border-radius: 25px; padding: 30px; margin-bottom: 40px; text-align: center; }
        .assistant-btns { display: flex; gap: 20px; margin-top: 25px; }
        .big-opt-btn { flex: 1; padding: 30px; font-size: 24px; font-weight: bold; border-radius: 15px; border: none; cursor: pointer; background: #0f172a; color: var(--gold); border: 3px solid var(--gold); }
        .big-opt-btn:hover { background: var(--gold); color: black; }

        /* PŁYTA CD - SEKCJA */
        .cd-unit { background: rgba(255,255,255,0.05); border: 4px solid var(--gold); border-radius: 30px; padding: 30px; margin-bottom: 50px; }
        .cd-header { display: flex; align-items: center; gap: 30px; margin-bottom: 30px; }
        .cd-circle { width: 120px; height: 120px; border-radius: 50%; border: 6px solid var(--gold); position: relative; flex-shrink: 0; }
        .cd-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 50px; font-weight: 900; color: var(--gold); }

        .song-item { background: #000; padding: 20px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .song-title { font-size: 26px; font-weight: bold; color: #fff; }
        .btn-remove-big { background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* SIATKA UTWORÓW */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .card { background: #0f172a; border: 3px solid #333; border-radius: 20px; padding: 20px; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: scale(1.02); }
        .thumb { width: 100%; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--gold); }
        .card-title { font-size: 28px; font-weight: bold; margin-bottom: 20px; text-align: center; min-height: 70px; display: flex; align-items: center; justify-content: center; }
        .btn-add-huge { width: 100%; padding: 25px; font-size: 26px; font-weight: 900; background: var(--gold); border: none; border-radius: 15px; cursor: pointer; }

        .order-final-btn { width: 100%; padding: 40px; font-size: 36px; font-weight: 900; background: #22c55e; color: white; border: none; border-radius: 20px; cursor: pointer; margin-top: 40px; box-shadow: 0 10px 0 #166534; }
        .order-final-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #166534; }
    </style>
</head>
<body>

<div id="sidebar">
    <img src="https://lh3.googleusercontent.com/u/0/d/1lGrhzfxzTIAlH2iaHahCjWAZYuqxknP7" alt="Logo" class="logo-img">
    <button class="nav-btn active" id="btn-all" onclick="showView('all')">WSZYSTKIE PIEŚNI</button>
    <button class="nav-btn" id="btn-cart" onclick="showView('cart')">MÓJ WYBÓR (<span id="count">0</span>)</button>
    <div style="margin-top:20px; border-top: 2px solid #333; padding-top:20px;" id="category-list"></div>
</div>

<div id="main-content">
    <div class="toolbar">
        <h1 id="view-name" class="view-title">Wybierz Pieśni</h1>
        <input type="text" id="search-input" class="search-large" placeholder="TU WPISZ NAZWĘ PIEŚNI..." onkeyup="handleSearch()">
    </div>

    <div id="container"></div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    let rawData = []; let cart = []; let currentView = 'all'; let searchQuery = "";
    let organizeMode = 'order'; // 'order' lub 'category'

    function timeToSec(t) { if(!t || !t.includes(':')) return 0; const [m, s] = t.split(':').map(Number); return (m*60)+s; }

    async function load() {
        const saved = localStorage.getItem('mv_cart_pro'); if(saved) cart = JSON.parse(saved);
        try {
            const r = await fetch(SHEET_URL + '&cb=' + Date.now());
            const txt = await r.text();
            const rows = txt.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            const cats = new Set();
            rawData = rows.map(line => {
                let c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let catsArr = (c[1]||"Inne").split(',').map(x => x.trim());
                catsArr.forEach(cat => cats.add(cat));
                return { tytul: c[0].replace(/"/g,''), kategorie: catsArr, yt: (c[2]||"").trim(), czas: (c[3]||"0:00").trim() };
            });
            const catDiv = document.getElementById('category-list');
            Array.from(cats).sort().forEach(cat => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = cat;
                b.onclick = () => { currentView = cat; render(); };
                catDiv.appendChild(b);
            });
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        const container = document.getElementById('container'); container.innerHTML = '';
        document.getElementById('count').innerText = cart.length;

        if(currentView === 'cart') {
            renderCart(container);
        } else {
            let list = currentView === 'all' ? rawData : rawData.filter(s => s.kategorie.includes(currentView));
            if(searchQuery) list = list.filter(s => s.tytul.toLowerCase().includes(searchQuery));
            const grid = document.createElement('div'); grid.className = 'grid';
            list.forEach(s => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                        <div class="card-title">${s.tytul}</div>
                        <button class="btn-add-huge" onclick="add('${s.tytul.replace(/'/g,"")}')">DODAJ DO LISTY</button>
                    </div>`;
            });
            container.appendChild(grid);
        }
    }

    function renderCart(container) {
        if(cart.length === 0) { container.innerHTML = "<h2 style='text-align:center;'>Twoja lista jest pusta. Wróć do 'Wszystkie Pieśni' i dodaj coś.</h2>"; return; }

        // ASYSTENT
        const assist = document.createElement('div'); assist.className = 'assistant-box';
        assist.innerHTML = `
            <h2 style="font-size:36px; margin:0;">POMOCNIK UKŁADANIA PŁYT</h2>
            <p>Wybierz, jak system ma rozdzielić Twoje pieśni na płyty CD:</p>
            <div class="assistant-btns">
                <button class="big-opt-btn" onclick="setOrganize('order')">WEDŁUG KOLEJNOŚCI DODAWANIA</button>
                <button class="big-opt-btn" onclick="setOrganize('category')">POŁĄCZ TEMATAMI (NP. PSALMY RAZEM)</button>
            </div>
        `;
        container.appendChild(assist);

        // LOGIKA PODZIAŁU
        let cdGroups = {};
        if(organizeMode === 'order') {
            let curCD = 1; let curSec = 0; cdGroups[1] = [];
            cart.forEach(s => {
                let sSec = timeToSec(s.czas);
                if(curSec + sSec > 3900) { curCD++; curSec = sSec; cdGroups[curCD] = [s]; }
                else { curSec += sSec; cdGroups[curCD].push(s); }
            });
        } else {
            cart.forEach(s => {
                let cat = s.kategorie[0]; if(!cdGroups[cat]) cdGroups[cat] = [];
                cdGroups[cat].push(s);
            });
        }

        // RENDEROWANIE SEKCJI
        Object.keys(cdGroups).forEach((key, idx) => {
            const sec = document.createElement('div'); sec.className = 'cd-unit';
            let songsTotal = cdGroups[key].reduce((a,b)=>a+timeToSec(b.czas),0);
            let minUsed = Math.ceil(songsTotal/60);

            let songsHTML = cdGroups[key].map(s => `
                <div class="song-item">
                    <span class="song-title">${s.tytul}</span>
                    <button class="btn-remove-big" onclick="removeGlobal('${s.tytul}')">USUŃ</button>
                </div>`).join('');

            sec.innerHTML = `
                <div class="cd-header">
                    <div class="cd-circle"><div class="cd-num">${idx+1}</div></div>
                    <div>
                        <h2 style="font-size:32px; color:var(--gold); margin:0;">PŁYTA: ${organizeMode==='category'?key:('NR '+(idx+1))}</h2>
                        <span style="font-size:24px;">Zapełniona: <b>${minUsed} z 65 minut</b></span>
                    </div>
                </div>
                ${songsHTML}
                ${minUsed < 45 ? `<div style="background:rgba(212,175,55,0.2); padding:15px; border-radius:10px; margin-top:20px; text-align:center; font-weight:bold; color:var(--gold);">Mamy tu jeszcze sporo miejsca! Może dodasz więcej pieśni?</div>` : ''}
            `;
            container.appendChild(sec);
        });

        container.innerHTML += `<button class="order-final-btn" onclick="sendOrder()">ZAMAWIAM TE PŁYTY</button>`;
    }

    function setOrganize(m) { organizeMode = m; render(); }
    function add(t) { if(cart.find(x=>x.tytul===t)) return; cart.push(rawData.find(x=>x.tytul===t)); save(); }
    function removeGlobal(t) { cart = cart.filter(x=>x.tytul!==t); save(); }
    function save() { localStorage.setItem('mv_cart_pro', JSON.stringify(cart)); render(); }
    function showView(v) { currentView = v; render(); }
    function handleSearch() { searchQuery = document.getElementById('search-input').value.toLowerCase(); render(); }
    function sendOrder() {
        let body = "ZAMAWIAM NASTĘPUJĄCE PŁYTY:\n\n";
        window.location.href = `mailto:melodiawiary@gmail.com?subject=Zamówienie&body=${encodeURIComponent(body)}`;
    }
    load();
</script>
</body>
</html>
