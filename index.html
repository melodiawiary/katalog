<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodia Wiary - Katalog i Kalkulator CD</title>
    <style>
        :root { --gold: #d4af37; --bg: #020617; --sidebar: #0f172a; --teal-bright: #00e5ff; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; }

        /* PANEL BOCZNY */
        #sidebar { 
            width: 280px; background: var(--sidebar); border-right: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000;
            box-sizing: border-box; overflow-y: auto;
        }
        .logo-img { width: 100%; height: auto; margin-bottom: 25px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); flex-shrink: 0; }
        .nav-group { margin-bottom: 25px; flex-shrink: 0; }
        .nav-btn { width: 100%; background: none; border: 1px solid transparent; color: #ccc; text-align: left; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; font-size: 14px; text-transform: uppercase; }
        .nav-btn:hover, .nav-btn.active { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); color: var(--gold); }

        /* GŁÓWNA TREŚĆ */
        #main-content { margin-left: 280px; flex: 1; padding: 30px; position: relative; }
        .toolbar { position: sticky; top: 0; z-index: 900; background: var(--bg); padding: 25px 0 20px 0; border-bottom: 1px solid rgba(212, 175, 55, 0.2); margin-bottom: 30px; text-align: center; }
        .view-title { color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin: 0 0 15px 0; font-size: 22px; font-weight: bold; }

        /* KALKULATOR PŁYT Z LOGO */
        .cart-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.2); padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        .cd-list { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        
        .cd-item { text-align: center; width: 110px; }
        .cd-miniature { position: relative; width: 90px; height: 90px; margin: 0 auto; }
        .cd-logo { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #eee; object-fit: cover; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        
        /* Numer płyty nakładany na logo */
        .cd-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; font-size: 24px; text-shadow: 0 0 10px #000; }
        .cd-label { font-size: 11px; color: #aaa; margin-top: 10px; font-weight: bold; text-transform: uppercase; }

        .multiplier { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px dashed var(--gold); }
        .qty-input { width: 60px; padding: 10px; background: #000; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; text-align: center; border-radius: 5px; font-size: 16px; }

        /* SIATKA UTWORÓW */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; border: 2px solid rgba(212, 175, 55, 0.3); }
        .card:hover .thumb { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        .title { font-weight: bold; font-size: 14px; margin: 15px 0; text-transform: uppercase; text-align: center; min-height: 35px; }
        .duration-tag { font-size: 11px; color: #64748b; text-align: center; margin-bottom: 10px; }

        .btn-action { width: 100%; padding: 12px; border-radius: 6px; border: 2px solid var(--gold); background: none; color: var(--gold); cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .btn-action:hover { background: var(--gold); color: black; }
        .btn-remove { border-color: #ef4444; color: #ef4444; margin-top: 10px; }

        @media (max-width: 768px) { #sidebar { width: 100%; height: auto; position: relative; } #main-content { margin-left: 0; } }
    </style>
</head>
<body>

<div id="sidebar">
    <img src="https://lh3.googleusercontent.com/u/0/d/1lGrhzfxzTIAlH2iaHahCjWAZYuqxknP7" alt="Melodia Wiary" class="logo-img">
    <div class="nav-group">
        <span class="nav-label">Menu</span>
        <button class="nav-btn active" id="btn-all" onclick="showView('all')">🏠 WSZYSTKIE UTWORY</button>
        <button class="nav-btn" id="btn-my-list" onclick="showView('cart')">⭐ MÓJ WYBÓR (<span id="count">0</span>)</button>
    </div>
    <div id="category-list"></div>
</div>

<div id="main-content">
    <div class="toolbar">
        <h1 id="view-name" class="view-title">Wszystkie Utwory</h1>
        <input type="text" id="search-input" style="width: 100%; max-width: 400px; padding: 10px; border-radius: 20px; border: 1px solid var(--gold); background: #1e293b; color: #fff;" placeholder="Wyszukaj tytuł..." onkeyup="handleSearch()">
    </div>

    <div id="cart-panel" class="cart-panel" style="display:none;">
        <h2 style="color:var(--gold); margin-top:0;">PODSUMOWANIE TWOJEGO ALBUMU</h2>
        <p id="total-stats"></p>
        
        <div class="cd-list" id="cd-list">
            </div>

        <div class="multiplier">
            <label style="font-size:14px; color:#aaa;">ZAMÓW DUPLIKAT (NP. NA PREZENT):</label>
            <input type="number" id="order-sets" class="qty-input" value="1" min="1" onchange="renderCartSummary()">
            <div id="physical-discs-total" style="font-weight:bold; color:var(--gold);"></div>
        </div>
        
        <button class="btn-action" style="margin-top:20px; background:var(--gold); color:black; font-size:16px;" onclick="sendOrder()">✉ WYŚLIJ MOJE ZAMÓWIENIE</button>
    </div>

    <div id="catalog-grid" class="grid"></div>
</div>

<script>
    // TWOJE DANE (Upewnij się, że masz Kolumnę D z czasem "MM:SS")
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    
    // TWOJE LOGO (Podmienimy na plik z Twojej wiadomości)
    const LOGO_CD_URL = 'https://lh3.googleusercontent.com/u/0/d/1lGrhzfxzTIAlH2iaHahCjWAZYuqxknP7'; 

    let rawSongs = []; let cart = []; let currentView = 'all';

    function timeToSeconds(t) { if(!t || !t.includes(':')) return 0; const [m, s] = t.split(':').map(Number); return (m*60)+s; }

    async function loadData() {
        const saved = localStorage.getItem('melodiaWiaryCart'); if (saved) cart = JSON.parse(saved);
        updateCartCount();
        try {
            const resp = await fetch(SHEET_URL + '&cb=' + Date.now());
            const text = await resp.text();
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
            
            rawSongs = rows.map((r, index) => {
                let cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    tytul: cols[0].replace(/"/g, '').trim(),
                    kategorie: (cols[1] || "Inne").split(',').map(c => c.trim()),
                    idYT: (cols[2] || "").trim(),
                    czas: (cols[3] || "0:00").trim(), // KOLUMNA D
                    order: index
                };
            });
            render();
        } catch (e) { console.error(e); }
    }

    function renderCartSummary() {
        const cartPanel = document.getElementById('cart-panel');
        const cdList = document.getElementById('cd-list');
        const totalStats = document.getElementById('total-stats');
        const physicalDiscsText = document.getElementById('physical-discs-total');
        
        if(currentView === 'cart' && cart.length > 0) {
            cartPanel.style.display = 'block';
            
            let totalSec = cart.reduce((acc, s) => acc + timeToSeconds(s.czas), 0);
            let totalMin = Math.ceil(totalSec / 60);
            let numCDs = Math.ceil(totalMin / 65); // LIMIT 65 MINUT
            let setsQty = parseInt(document.getElementById('order-sets').value) || 1;

            totalStats.innerHTML = `Łączny czas wybranych utworów: <strong>${totalMin} min</strong>.<br>W jednym komplecie zmieszczą się na: <strong>${numCDs} płyty/płyt CD</strong>.`;
            physicalDiscsText.innerText = `ŁĄCZNIE DO NAGRANIA: ${numCDs * setsQty} PŁYT`;

            cdList.innerHTML = '';
            // Generujemy ikonki płyt z numerami nakładanymi na logo
            for(let i=1; i<=numCDs; i++) {
                cdList.innerHTML += `
                    <div class="cd-item">
                        <div class="cd-miniature">
                            <img src="${LOGO_CD_URL}" class="cd-logo" alt="Logo">
                            <div class="cd-number">${i}</div>
                        </div>
                        <div class="cd-label">PłytA CD ${i}</div>
                    </div>`;
            }
        } else {
            cartPanel.style.display = 'none';
        }
    }

    function render() {
        const grid = document.getElementById('catalog-grid'); grid.innerHTML = '';
        renderCartSummary();

        let list = currentView === 'all' ? rawSongs : (currentView === 'cart' ? cart : rawSongs.filter(s => s.kategorie.includes(currentView)));
        
        list.forEach((s, idx) => {
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `
                <img class="thumb" src="https://img.youtube.com/vi/${s.idYT}/mqdefault.jpg" onclick="window.open('https://youtube.com/watch?v=${s.idYT}')">
                <div class="title">${s.tytul}</div>
                <div class="duration-tag">⏱ ${s.czas}</div>
                <button class="btn-action" onclick="addToCart('${s.tytul.replace(/'/g, "\\'")}')">DODAJ</button>
                ${currentView === 'cart' ? `<button class="btn-action btn-remove" onclick="removeFromCart(${idx})">USUŃ</button>` : ''}
            `;
            grid.appendChild(card);
        });
    }

    function addToCart(t) { 
        if(cart.find(x => x.tytul === t)) return alert("Ta pieśń jest już na Twojej liście!");
        const s = rawSongs.find(x => x.tytul === t); 
        cart.push(s); save(); 
    }
    function removeFromCart(i) { cart.splice(i, 1); save(); }
    function save() { localStorage.setItem('melodiaWiaryCart', JSON.stringify(cart)); updateCartCount(); render(); }
    function updateCartCount() { document.getElementById('count').innerText = cart.length; }
    function showView(v) { currentView = v; render(); }
    function sendOrder() {
        let setsQty = document.getElementById('order-sets').value;
        let orderDetails = `ZAMÓWIENIE ALBUMU (Kompletów: ${setsQty})\n\n`;
        orderDetails += cart.map(s => `- ${s.tytul} (${s.czas})`).join('\n');
        window.location.href = `mailto:melodiawiary@gmail.com?subject=Zamówienie Zestawu Pieśni&body=${encodeURIComponent(orderDetails)}`;
    }
    loadData();
</script>
</body>
</html>
