<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Melodia Wiary - v33</title>

<style>
:root { 
    --active-orange: #fbda80; 
    --bg: #f4f9f8; 
    --card-bg: #f9fffe;
    --soft-cyan: #d2e9e6; 
    --deep-brown: #3b2a00; 
    --sidebar-width: 220px; 
}

body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; }
body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; }

body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); overflow-x: hidden; }

/* SIDEBAR */
#sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; }
.sidebar-top { padding: 15px 10px; text-align: center; }
.sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }

.logo-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--active-orange); }

.nav-btn, .size-btn {
    width: 100%; padding: 12px; margin-bottom: 8px;
    border-radius: 8px; border: 1px solid var(--deep-brown);
    cursor: pointer; font-weight: 800;
    background: var(--soft-cyan);
}

.nav-btn.active { background: var(--active-orange); }

/* MAIN */
#main-content { margin-left: var(--sidebar-width); flex: 1; }

.header-sticky { position: sticky; top: 0; background: var(--bg); }

.top-padding { padding: 20px; }

.top-layout {
    display: flex;
    justify-content: center;
}

.controls-area {
    width: 100%;
    max-width: 800px;
}

.search-box { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--deep-brown); }

.btn-group { display: flex; gap: 5px; flex-wrap: wrap; }

.ctrl-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--deep-brown);
    background: var(--soft-cyan);
    font-weight: 800;
    cursor: pointer;
}

.items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: var(--card-bg);
    padding: 10px;
    border-radius: 12px;
}

.thumb-container { cursor: pointer; }

</style>
</head>

<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img">

        <button class="nav-btn" id="btn-cart" onclick="setView('cart')">
            ❤️ ULUBIONE (<span id="count">0</span>)
        </button>
    </div>

    <div class="sidebar-scroll">
        <button class="nav-btn" onclick="setView('all')">WSZYSTKIE</button>
        <div id="cat-list"></div>
    </div>
</div>

<div id="main-content">

    <div class="header-sticky">
        <div class="top-padding">
            <div class="top-layout">
                <div class="controls-area">

                    <input type="text" id="search" class="search-box" placeholder="SZUKAJ..." onkeyup="doSearch()">

                    <div class="btn-group">
                        <button class="ctrl-btn" onclick="setSort('az')">A-Z</button>
                        <button class="ctrl-btn" onclick="setSort('za')">Z-A</button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div id="main-display"></div>

</div>

<script>

const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';

let songs = [], cart = [], currentView = 'all', query = "", sortType = 'az';

function playSong(ytId) {
    window.open(`https://www.youtube.com/watch?v=${ytId}`, '_blank');
}

async function init() {
    const r = await fetch(CSV);
    const text = await r.text();
    const rows = text.split("\n").slice(1);

    songs = rows.map(line => {
        let [title, cat, yt] = line.split(",");
        return { tytul: title, yt: yt };
    });

    render();
}

function render() {
    const out = document.getElementById('main-display');
    out.innerHTML = "";

    songs.forEach(s => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div class="thumb-container" onclick="playSong('${s.yt}')">
                ${s.tytul}
            </div>
        `;
        out.appendChild(div);
    });
}

function doSearch() {
    query = document.getElementById('search').value.toLowerCase();
    render();
}

function setView(v){ currentView = v; render(); }
function setSort(s){ sortType = s; render(); }

init();

</script>

</body>
</html>
