<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Melodia Wiary - Edycja v18</title>
    <style>
        :root { 
            --active-orange: #fbda80; 
            --bg: #fdfdfd; 
            --sidebar-bg: #ffffff; 
            --soft-cyan: #d2e9e6; 
            --deep-brown: #3b2a00; 
            --sidebar-border: #e2e8f0;
            --sidebar-width: 250px; 
        }
        
        body.standard { --f-size: 16px; --f-btn: 13px; --f-ctrl: 11px; --f-search: 1.1em; }
        body.senior { --f-size: 22px; --f-btn: 18px; --f-ctrl: 16px; --f-search: 1.4em; }

        body { background: var(--bg); color: var(--deep-brown); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; font-size: var(--f-size); }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); border-right: 4px solid var(--active-orange); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .sidebar-top { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .logo-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--active-orange); background: white; object-fit: cover; margin-bottom: 5px; }
        
        .section-label { font-size: 18px; font-weight: 900; color: var(--deep-brown); text-transform: uppercase; margin: 25px 0 10px 5px; display: block; border-bottom: 3px solid var(--active-orange); padding-bottom: 5px; }

        .nav-btn { width: 100%; padding: 12px 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--deep-brown); cursor: pointer; font-weight: 700; text-align: left; text-transform: uppercase; font-size: var(--f-btn); color: var(--deep-brown); background: var(--soft-cyan); transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover, .nav-btn.active { background: var(--active-orange) !important; border: 2px solid var(--deep-brown) !important; }
        .nav-btn.fav-btn { background: #fff1f1; border-color: #ffb3b3; margin-top: 10px; }

        .size-box { border: 2px solid var(--deep-brown); padding: 10px; border-radius: 12px; margin: 15px 5px; background: #f9f9f9; }

        /* MAIN CONTENT */
        #main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
        .header-sticky { position: sticky; top: 0; z-index: 900; background: var(--bg); padding: 15px 25px; border-bottom: 3px solid var(--active-orange); width: 100%; box-sizing: border-box; }
        .top-layout { display: flex; gap: 20px; align-items: flex-start; }
        .controls-area { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        
        #player-section { width: 480px; background: #000; aspect-ratio: 16/9; border: 3px solid var(--deep-brown); border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        .search-box { width: 100%; padding: 10px; border-radius: 15px; border: 2px solid var(--deep-brown); font-size: var(--f-search); font-weight: bold; text-align: center; }
        
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .ctrl-btn { flex: 1; padding: 10px 4px; border: 1px solid var(--deep-brown); background: var(--soft-cyan); color: var(--deep-brown); font-weight: 800; cursor: pointer; border-radius: 6px; text-transform: uppercase; font-size: var(--f-ctrl); min-width: 140px; }
        .ctrl-btn:hover, .ctrl-btn.active { background: var(--active-orange) !important; border: 2px solid var(--deep-brown); }

        /* ALFABET FIXED */
        #alpha-bar { width: 45px; display: flex; flex-direction: column; gap: 2px; position: fixed; left: calc(var(--sidebar-width) + 15px); top: 350px; max-height: calc(100vh - 370px); overflow-y: auto; z-index: 850; padding-right: 5px; scrollbar-width: none; }
        #alpha-bar::-webkit-scrollbar { display: none; }
        .alpha-btn { width: 100%; padding: 6px 0; font-size: 13px; font-weight: 900; border: 1px solid var(--deep-brown); background: var(--soft-cyan); cursor: pointer; border-radius: 4px; text-align: center; }
        .alpha-btn:hover, .alpha-btn.active { background: var(--active-orange); border: 2px solid var(--deep-brown); }

        #main-display { flex: 1; margin-left: 65px; padding: 20px; }

        /* NAGŁÓWKI LITER */
        .alpha-header { grid-column: 1 / -1; background: var(--active-orange); padding: 8px 20px; border-radius: 8px; font-weight: 900; margin: 20px 0 10px 0; border: 2px solid var(--deep-brown); font-size: 1.2em; text-align: left; }

        /* KARTY */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: #fff; border: 2px solid #ddd; padding: 12px; border-radius: 15px; text-align: center; position: relative; transition: 0.2s; display: flex; flex-direction: column; }
        .card:hover { background: var(--active-orange); border: 2px solid var(--deep-brown); transform: translateY(-3px); }
        .fav-heart { position: absolute; top: 10px; right: 10px; z-index: 10; font-size: 28px; cursor: pointer; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

        .thumb-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; cursor: pointer; margin-bottom: 10px; border: 1px solid #ddd; position: relative; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(251, 218, 128, 0.9); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; color: var(--deep-brown); font-weight: 900; text-align: center; padding: 10px; box-sizing: border-box; }
        .thumb-container:hover .play-overlay { opacity: 1; }
        
        /* LISTA */
        .list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 12px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #fff; border: 2px solid #ddd; border-radius: 10px; transition: 0.2s; cursor: pointer; }
        .list-item:hover { background: var(--active-orange); border: 2px solid var(--deep-brown); }
        .list-item:hover .list-title::before { content: "▶ KLIKNIJ, ABY POSŁUCHAĆ: "; font-size: 0.8em; color: var(--deep-brown); }
        
        .heart-btn { background: none; border: none; font-size: 26px; cursor: pointer; }

        .size-btn { width: 100%; padding: 8px; margin-top: 5px; font-weight: 900; cursor: pointer; border: 1px solid var(--deep-brown); background: var(--soft-cyan); border-radius: 8px; }
        .size-btn.active { background: var(--active-orange); border: 2px solid var(--deep-brown); }

        @media (max-width: 1200px) { #alpha-bar { display: none; } #main-display { margin-left: 0; } }
    </style>
</head>
<body class="standard">

<div id="sidebar">
    <div class="sidebar-top">
        <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/110?text=LOGO'">
        <div style="font-weight: 900; font-size: 14px;">MELODIA WIARY</div>
        <button class="nav-btn fav-btn" id="btn-cart" onclick="setView('cart')">❤️ MOJE ULUBIONE (<span id="count">0</span>)</button>
        <div class="size-box">
            <div style="font-size: 10px; font-weight: 900; margin-bottom: 5px;">ROZMIAR TEKSTU</div>
            <button class="size-btn" id="s-std" onclick="updateSize('standard')">ZWYKŁE</button>
            <button class="size-btn" id="s-big" onclick="updateSize('senior')">DUŻE</button>
        </div>
    </div>
    <div class="sidebar-scroll">
        <span class="section-label">KATEGORIE</span>
        <button class="nav-btn" id="cat-all" onclick="setView('all')">🏠 WSZYSTKIE PIEŚNI</button>
        <div id="cat-list"></div>
    </div>
</div>

<div id="main-content">
    <div class="header-sticky">
        <div class="top-layout">
            <div class="controls-area">
                <input type="text" id="search" class="search-box" placeholder="SZUKAJ W KATALOGU MELODII WIARY. WPISZ LITERKI Z TYTUŁU..." onkeyup="doSearch()">
                <div class="btn-group">
                    <button class="ctrl-btn" id="s-new" onclick="setSort('newest')">SORTUJ OD NAJNOWSZYCH</button>
                    <button class="ctrl-btn" id="s-old" onclick="setSort('oldest')">SORTUJ OD NAJSTARSZYCH</button>
                    <button class="ctrl-btn" id="s-az" onclick="setSort('az')">SORTUJ OD A DO Z</button>
                    <button class="ctrl-btn" id="s-za" onclick="setSort('za')">SORTUJ OD Z DO A</button>
                </div>
                <div class="btn-group">
                    <button class="ctrl-btn" id="m-grid" onclick="setMode('grid')">WIDOK MINIATURY FILMÓW</button>
                    <button class="ctrl-btn" id="m-list" onclick="setMode('list')">WIDOK LISTA TYTUŁÓW FILMÓW</button>
                </div>
            </div>
            <div id="player-section">
                <div id="yt-player-container" style="height:100%; background:#000; color:#fff; display:flex; align-items:center; justify-content:center; text-align:center; padding:20px;">
                    KLIKNIJ W PIEŚŃ, BY ZACZĄĆ ODTWARZANIE 🎶
                </div>
            </div>
        </div>
    </div>

    <div class="content-with-alpha">
        <div id="alpha-bar"></div>
        <div id="main-display"></div>
    </div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    const STORAGE_KEY = 'mv_ulubione_v18'; 
    let songs = [], cart = [], currentView = 'all', displayMode = 'grid', query = "", sortType = 'newest', alphaFilter = "";

    function parseCSVLine(text) {
        const result = []; let cur = '', inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim()); return result;
    }

    function updateSize(s) { 
        document.body.className = s; 
        document.getElementById('s-std').classList.toggle('active', s==='standard'); 
        document.getElementById('s-big').classList.toggle('active', s==='senior'); 
        localStorage.setItem('mv_font_pref', s);
    }

    function playSong(ytId) {
        document.getElementById('yt-player-container').innerHTML = 
            `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    }

    async function init() {
        const savedCart = localStorage.getItem(STORAGE_KEY);
        if(savedCart) cart = JSON.parse(savedCart);
        updateSize(localStorage.getItem('mv_font_pref') || 'standard');
        
        const ab = document.getElementById('alpha-bar');
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
            const b = document.createElement('button'); b.className = 'alpha-btn'; b.innerText = l;
            b.onclick = () => { alphaFilter = l; sortType = 'az'; render(); document.getElementById('alpha-'+l).scrollIntoView({behavior:'smooth', block:'center'}); }; 
            b.id = "alpha-" + l;
            ab.appendChild(b);
        });

        try {
            const r = await fetch(CSV + '&cb=' + Date.now());
            const text = await r.text();
            const rows = text.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            let catsSet = new Set();
            songs = rows.map((line, index) => {
                const cols = parseCSVLine(line);
                let rawCats = (cols[1] || "Inne").split(',').map(c => c.trim()).filter(c => c.length > 2);
                rawCats.forEach(c => catsSet.add(c));
                return { tytul: cols[0] || "Bez tytułu", kategorie: rawCats, yt: (cols[2] || "").trim(), originalIndex: index };
            });
            const catBox = document.getElementById('cat-list');
            Array.from(catsSet).sort().forEach(cat => {
                const b = document.createElement('button'); b.className = 'nav-btn'; b.innerText = cat; 
                b.id = "btn-" + cat.replace(/\s/g, ''); b.onclick = () => setView(cat); catBox.appendChild(b);
            });
            render();
        } catch(e) { console.error(e); }
    }

    function setMode(m) { 
        displayMode = m; 
        if(m === 'list') sortType = 'az'; // Automatyczny sort A-Z dla listy
        render(); 
    }

    function toggleFav(t) {
        const idx = cart.findIndex(x => x.tytul === t);
        if(idx > -1) cart.splice(idx, 1);
        else { const s = songs.find(x => x.tytul === t); if(s) cart.push(s); }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
        render();
    }

    function render() {
        const out = document.getElementById('main-display'); out.innerHTML = '';
        document.getElementById('count').innerText = cart.length;
        
        const isListAZ = (displayMode === 'list' && currentView !== 'cart');
        document.getElementById('alpha-bar').style.display = isListAZ ? 'flex' : 'none';
        document.getElementById('main-display').style.marginLeft = isListAZ ? '65px' : '0';

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(currentView === 'all') document.getElementById('cat-all').classList.add('active');
        else if(currentView === 'cart') document.getElementById('btn-cart').classList.add('active');
        else { const b = document.getElementById("btn-" + currentView.replace(/\s/g, '')); if(b) b.classList.add('active'); }

        document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('s-new').classList.toggle('active', sortType === 'newest');
        document.getElementById('s-old').classList.toggle('active', sortType === 'oldest');
        document.getElementById('s-az').classList.toggle('active', sortType === 'az');
        document.getElementById('s-za').classList.toggle('active', sortType === 'za');
        document.getElementById('m-grid').classList.toggle('active', displayMode === 'grid');
        document.getElementById('m-list').classList.toggle('active', displayMode === 'list');

        let list = (currentView === 'cart') ? [...cart] : (currentView === 'all' ? [...songs] : songs.filter(s => s.kategorie.includes(currentView)));
        if(query) list = list.filter(s => s.tytul.toLowerCase().includes(query));

        if(sortType === 'newest') list.sort((a,b) => b.originalIndex - a.originalIndex);
        else if(sortType === 'oldest') list.sort((a,b) => a.originalIndex - b.originalIndex);
        else if(sortType === 'az') list.sort((a,b) => a.tytul.localeCompare(b.tytul, 'pl'));
        else if(sortType === 'za') list.sort((a,b) => b.tytul.localeCompare(a.tytul, 'pl'));

        const container = document.createElement('div');
        container.className = (displayMode === 'grid') ? 'grid' : 'list-container';
        
        let lastChar = "";
        list.forEach(s => {
            const isFav = cart.some(x => x.tytul === s.tytul);
            const jsTytul = s.tytul.replace(/'/g, "\\'");
            const firstChar = s.tytul.charAt(0).toUpperCase();

            // Nagłówki liter tylko w widoku listy A-Z
            if(isListAZ && sortType === 'az' && firstChar !== lastChar && !query) {
                const h = document.createElement('div'); h.className = 'alpha-header'; 
                h.id = "anchor-" + firstChar; h.innerText = firstChar; 
                container.appendChild(h); lastChar = firstChar;
            }

            const item = document.createElement('div');
            if(displayMode === 'grid') {
                item.className = 'card';
                item.innerHTML = `
                    <div class="fav-heart" onclick="toggleFav('${jsTytul}')">${isFav ? '❤️' : '🤍'}</div>
                    <div class="thumb-container" onclick="playSong('${s.yt}')">
                        <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                        <div class="play-overlay">KLIKNIJ, ABY<br>POSŁUCHAĆ 🎶</div>
                    </div>
                    <div style="font-weight:800; font-size:14px; text-transform:uppercase; flex-grow:1;">${s.tytul}</div>
                `;
            } else {
                item.className = 'list-item';
                item.onclick = (e) => { if(!e.target.closest('.heart-btn')) playSong(s.yt); };
                item.innerHTML = `
                    <span class="list-title" style="font-weight:700;">${s.tytul}</span>
                    <button class="heart-btn" onclick="event.stopPropagation(); toggleFav('${jsTytul}')">${isFav ? '❤️' : '🤍'}</button>
                `;
            }
            container.appendChild(item);
        });
        out.appendChild(container);
        
        // Przeskok do wybranej litery jeśli kliknięto w alfa-bar
        if(alphaFilter) {
            const el = document.getElementById("anchor-" + alphaFilter);
            if(el) window.scrollTo({top: el.offsetTop - 180, behavior: 'smooth'});
            alphaFilter = ""; 
        }
    }

    function setSort(s) { sortType = s; render(); }
    function setView(v) { currentView = v; render(); window.scrollTo(0,0); }
    function doSearch() { query = document.getElementById('search').value.toLowerCase(); render(); }
    init();
</script>
</body>
</html>
