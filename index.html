<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodia Wiary - System Zamówień</title>
    <style>
        :root { --gold: #d4af37; --bg: #020617; --sidebar: #0f172a; --green: #22c55e; }
        
        /* BAZA - ZMIENNA CZCIONKA */
        body { background: var(--bg); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        body.senior-mode { font-size: 26px; }
        body.standard-mode { font-size: 16px; }

        /* EKRAN STARTOWY */
        #welcome-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px;
        }
        .start-btn { 
            padding: 30px 60px; font-size: 30px; font-weight: bold; border-radius: 20px; 
            border: 4px solid var(--gold); cursor: pointer; transition: 0.3s; width: 80%; max-width: 500px;
        }
        #btn-standard { background: transparent; color: var(--gold); }
        #btn-senior { background: var(--gold); color: black; }

        /* PANEL BOCZNY - ZABLOKOWANA GÓRA */
        #sidebar { 
            width: 350px; background: var(--sidebar); border-right: 3px solid var(--gold); 
            display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000;
        }
        .sidebar-fixed-top { padding: 20px; flex-shrink: 0; border-bottom: 2px solid #333; background: var(--sidebar); }
        .sidebar-scrollable { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        .logo-img { width: 100%; height: auto; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 20px; }
        .nav-btn { 
            width: 100%; padding: 20px; margin-bottom: 10px; border-radius: 12px; border: none;
            font-weight: bold; text-transform: uppercase; cursor: pointer; text-align: left; font-size: 1.1em;
        }
        .nav-btn-main { background: var(--gold); color: black; }
        .nav-btn-cat { background: #1e293b; color: white; border: 1px solid #333; }
        .nav-btn.active { outline: 4px solid white; }

        /* TREŚĆ GŁÓWNA */
        #main-content { margin-left: 350px; flex: 1; padding: 0 40px; }
        .toolbar { position: sticky; top: 0; z-index: 900; background: var(--bg); padding: 20px 0; border-bottom: 2px solid var(--gold); }
        
        /* PRZEŁĄCZNIK WIDOKU */
        .view-toggle { display: flex; gap: 10px; margin-top: 20px; }
        .toggle-btn { flex: 1; padding: 15px; border: 2px solid var(--gold); background: #000; color: var(--gold); font-weight: bold; cursor: pointer; }
        .toggle-btn.active { background: var(--gold); color: black; }

        /* LISTA I MINIATURY */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-top: 30px; }
        .list-view .card { display: flex; flex-direction: row; align-items: center; gap: 20px; }
        .list-view .thumb { width: 150px; }
        
        .card { background: #0f172a; border: 2px solid #333; padding: 20px; border-radius: 20px; }
        .thumb { width: 100%; border-radius: 10px; border: 1px solid var(--gold); }
        .card-title { font-weight: bold; margin: 15px 0; flex-grow: 1; }

        /* SEKCJA PŁYTY W KOSZYKU */
        .cd-box { border: 4px solid var(--gold); border-radius: 30px; padding: 25px; margin-bottom: 40px; background: rgba(255,255,255,0.03); }
        .cd-header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; }
        
        .qty-control { display: flex; align-items: center; gap: 15px; background: #000; padding: 10px 20px; border-radius: 15px; border: 2px solid var(--gold); }
        .qty-input-big { width: 60px; font-size: 30px; background: transparent; color: var(--gold); border: none; text-align: center; font-weight: bold; }
        
        .btn-order-cd { background: var(--green); color: white; padding: 20px 40px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 1em; }
        
        .search-input { width: 100%; padding: 20px; font-size: 1.2em; border-radius: 40px; border: 3px solid var(--gold); background: #000; color: white; }

        @media (max-width: 900px) { #sidebar { width: 100%; height: auto; position: relative; } #main-content { margin-left: 0; } }
    </style>
</head>
<body class="standard-mode">

<div id="welcome-screen">
    <img src="https://lh3.googleusercontent.com/u/0/d/1lGrhzfxzTIAlH2iaHahCjWAZYuqxknP7" style="width:150px; border-radius:50%;">
    <h1 style="color:var(--gold); font-size:40px;">WITAJ W MELODII WIARY</h1>
    <button class="start-btn" id="btn-standard" onclick="startApp('standard')">WIDOK STANDARDOWY</button>
    <button class="start-btn" id="btn-senior" onclick="startApp('senior')">WIDOK CZYTELNY (DUŻY)</button>
</div>

<div id="sidebar">
    <div class="sidebar-fixed-top">
        <img src="https://lh3.googleusercontent.com/u/0/d/1lGrhzfxzTIAlH2iaHahCjWAZYuqxknP7" class="logo-img">
        <button class="nav-btn nav-btn-main active" id="nav-all" onclick="showView('all')">🏠 WSZYSTKIE PIEŚNI</button>
        <button class="nav-btn nav-btn-main" id="nav-cart" onclick="showView('cart')">⭐ MÓJ WYBÓR (<span id="count">0</span>)</button>
    </div>
    <div class="sidebar-scrollable" id="category-list">
        </div>
</div>

<div id="main-content">
    <div class="toolbar">
        <input type="text" id="search-bar" class="search-input" placeholder="Wyszukaj pieśń..." onkeyup="handleSearch()">
        <div class="view-toggle">
            <button class="toggle-btn active" id="mode-grid" onclick="setMode('grid')">WIDOK Z MINIATURAMI</button>
            <button class="toggle-btn" id="mode-list" onclick="setMode('list')">WIDOK SAMEJ LISTY</button>
        </div>
    </div>
    <div id="display-container"></div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSIMZUO8ZkisiFoqOfypL9hOQBnTbAvtMmBeIuK56_QoiXFu_b7i-de1Jn6Km9symosxJBV6V5PxKO/pub?output=csv';
    let rawData = []; let cart = []; let currentView = 'all'; let displayMode = 'grid'; let searchQuery = "";
    let cdQtys = {};

    function startApp(mode) {
        document.body.className = mode === 'senior' ? 'senior-mode' : 'standard-mode';
        document.getElementById('welcome-screen').style.display = 'none';
        load();
    }

    async function load() {
        const saved = localStorage.getItem('mv_final_cart'); if(saved) cart = JSON.parse(saved);
        try {
            const r = await fetch(SHEET_URL + '&cb=' + Date.now());
            const txt = await r.text();
            const rows = txt.split(/\r?\n/).filter(x => x.trim() !== "").slice(1);
            const cats = new Set();
            rawData = rows.map(line => {
                let c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let catsArr = (c[1]||"Inne").split(',').map(x => x.trim());
                catsArr.forEach(cat => cats.add(cat));
                return { tytul: c[0].replace(/"/g,''), kategorie: catsArr, yt: (c[2]||"").trim(), czas: (c[3]||"0:00").trim() };
            });
            const catDiv = document.getElementById('category-list');
            Array.from(cats).sort().forEach(cat => {
                const b = document.createElement('button'); b.className = 'nav-btn nav-btn-cat'; b.innerText = cat;
                b.onclick = () => { currentView = cat; render(); };
                catDiv.appendChild(b);
            });
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        const container = document.getElementById('display-container');
        container.innerHTML = '';
        document.getElementById('count').innerText = cart.length;

        if(currentView === 'cart') {
            renderCart(container);
        } else {
            let list = currentView === 'all' ? rawData : rawData.filter(s => s.kategorie.includes(currentView));
            if(searchQuery) list = list.filter(s => s.tytul.toLowerCase().includes(searchQuery));
            
            const grid = document.createElement('div');
            grid.className = displayMode === 'grid' ? 'grid' : 'grid list-view';
            list.forEach(s => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="https://img.youtube.com/vi/${s.yt}/mqdefault.jpg" class="thumb">
                        <div class="card-title">${s.tytul}</div>
                        <button class="nav-btn nav-btn-main" style="text-align:center;" onclick="addToCart('${s.tytul.replace(/'/g,"")}')">DODAJ</button>
                    </div>`;
            });
            container.appendChild(grid);
        }
    }

    function renderCart(container) {
        if(cart.length === 0) { container.innerHTML = "<h2>Twoja lista jest pusta.</h2>"; return; }
        
        let curCD = 1; let curSec = 0; let groups = { 1: [] };
        cart.forEach(s => {
            let sSec = (s.czas.split(':').map(Number)[0]*60) + (s.czas.split(':').map(Number)[1]||0);
            if(curSec + sSec > 3900) { curCD++; curSec = sSec; groups[curCD] = [s]; }
            else { curSec += sSec; groups[curCD].push(s); }
        });

        Object.keys(groups).forEach(num => {
            if(!cdQtys[num]) cdQtys[num] = 1;
            const box = document.createElement('div'); box.className = 'cd-box';
            box.innerHTML = `
                <div class="cd-header-row">
                    <h2 style="color:var(--gold); margin:0;">PŁYTA NR ${num}</h2>
                    <div class="qty-control">
                        <span>SZTUK:</span>
                        <input type="number" class="qty-input-big" value="${cdQtys[num]}" id="q-${num}" onchange="cdQtys[${num}]=this.value">
                    </div>
                    <button class="btn-order-cd" onclick="sendCD(${num})">ZAMÓW TĘ PŁYTĘ</button>
                </div>
                <div>${groups[num].map(s => `<div style="padding:10px 0; border-bottom:1px solid #333;">${s.tytul} (${s.czas})</div>`).join('')}</div>
            `;
            container.appendChild(box);
        });
    }

    function addToCart(t) { if(cart.find(x=>x.tytul===t)) return; cart.push(rawData.find(x=>x.tytul===t)); save(); }
    function save() { localStorage.setItem('mv_final_cart', JSON.stringify(cart)); render(); }
    function setMode(m) { displayMode = m; document.getElementById('mode-grid').classList.toggle('active', m==='grid'); document.getElementById('mode-list').classList.toggle('active', m==='list'); render(); }
    function showView(v) { currentView = v; render(); }
    function handleSearch() { searchQuery = document.getElementById('search-bar').value.toLowerCase(); render(); }
    function sendCD(n) { alert("Wysyłam zamówienie na Płytę nr " + n); }
</script>
</body>
</html>
